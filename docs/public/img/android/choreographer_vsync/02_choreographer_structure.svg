<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Choreographer 大框 -->
  <rect x="20" y="20" width="740" height="505" rx="3" fill="#f8f9fa" stroke="#adb5bd"/>
  <text x="40" y="45" font-size="14" font-weight="600" fill="#343a40">Choreographer</text>
  <text x="40" y="62" font-size="9" fill="#868e96">线程单例（sThreadInstance: ThreadLocal），每个 Looper 线程一个实例</text>

  <!-- FrameDisplayEventReceiver -->
  <rect x="40" y="80" width="220" height="100" rx="3" fill="white" stroke="#4a7fb5"/>
  <text x="150" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">FrameDisplayEventReceiver</text>
  <text x="150" y="117" text-anchor="middle" font-size="9" fill="#495057">mDisplayEventReceiver</text>
  <line x1="50" y1="125" x2="250" y2="125" stroke="#ced4da"/>
  <text x="55" y="142" font-size="9" fill="#495057">onVsync() — VSync 到达回调</text>
  <text x="55" y="158" font-size="9" fill="#495057">run() — 触发 doFrame()</text>
  <text x="55" y="174" font-size="9" fill="#868e96">implements Runnable</text>

  <!-- FrameHandler -->
  <rect x="280" y="80" width="220" height="100" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">FrameHandler</text>
  <text x="390" y="117" text-anchor="middle" font-size="9" fill="#495057">mHandler</text>
  <line x1="290" y1="125" x2="490" y2="125" stroke="#ced4da"/>
  <text x="295" y="142" font-size="9" fill="#495057">MSG_DO_FRAME (0)</text>
  <text x="295" y="158" font-size="9" fill="#495057">MSG_DO_SCHEDULE_VSYNC (1)</text>
  <text x="295" y="174" font-size="9" fill="#495057">MSG_DO_SCHEDULE_CALLBACK (2)</text>

  <!-- FrameInfo -->
  <rect x="520" y="80" width="220" height="100" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="630" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">FrameInfo</text>
  <text x="630" y="117" text-anchor="middle" font-size="9" fill="#495057">mFrameInfo</text>
  <line x1="530" y1="125" x2="730" y2="125" stroke="#ced4da"/>
  <text x="535" y="142" font-size="9" fill="#495057">INTENDED_VSYNC / VSYNC</text>
  <text x="535" y="158" font-size="9" fill="#495057">INPUT_START / ANIM_START</text>
  <text x="535" y="174" font-size="9" fill="#495057">TRAVERSAL_START / DEADLINE</text>

  <!-- 5 个 CallbackQueue -->
  <rect x="40" y="205" width="700" height="180" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">mCallbackQueues[5] — 五类回调队列</text>

  <!-- Queue 0: INPUT -->
  <rect x="55" y="242" width="120" height="55" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="115" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b">0 INPUT</text>
  <text x="115" y="278" text-anchor="middle" font-size="8.5" fill="#868e96">输入事件处理</text>
  <text x="115" y="291" text-anchor="middle" font-size="8" fill="#c0392b">最先执行</text>

  <!-- Queue 1: ANIMATION -->
  <rect x="185" y="242" width="120" height="55" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="245" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">1 ANIMATION</text>
  <text x="245" y="278" text-anchor="middle" font-size="8.5" fill="#868e96">动画帧回调</text>
  <text x="245" y="291" text-anchor="middle" font-size="8" fill="#868e96">ValueAnimator</text>

  <!-- Queue 2: INSETS_ANIMATION -->
  <rect x="315" y="242" width="140" height="55" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="385" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">2 INSETS_ANIM</text>
  <text x="385" y="278" text-anchor="middle" font-size="8.5" fill="#868e96">WindowInsets</text>
  <text x="385" y="291" text-anchor="middle" font-size="8" fill="#868e96">动画更新</text>

  <!-- Queue 3: TRAVERSAL -->
  <rect x="465" y="242" width="130" height="55" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="530" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">3 TRAVERSAL</text>
  <text x="530" y="278" text-anchor="middle" font-size="8.5" fill="#868e96">布局与绘制</text>
  <text x="530" y="291" text-anchor="middle" font-size="8" fill="#2e7d32">ViewRootImpl</text>

  <!-- Queue 4: COMMIT -->
  <rect x="605" y="242" width="120" height="55" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="665" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">4 COMMIT</text>
  <text x="665" y="278" text-anchor="middle" font-size="8.5" fill="#868e96">帧后处理</text>
  <text x="665" y="291" text-anchor="middle" font-size="8" fill="#868e96">帧时间校正</text>

  <!-- 执行箭头 -->
  <line x1="175" y1="270" x2="183" y2="270" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="305" y1="270" x2="313" y2="270" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="455" y1="270" x2="463" y2="270" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="595" y1="270" x2="603" y2="270" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- CallbackQueue 结构说明 -->
  <text x="55" y="318" font-size="9" fill="#868e96">每个队列是按 dueTime 排序的 CallbackRecord 链表</text>

  <!-- 链表示意 -->
  <rect x="55" y="330" width="90" height="28" rx="3" fill="white" stroke="#ced4da"/>
  <text x="100" y="348" text-anchor="middle" font-size="8.5" fill="#495057">CallbackRecord</text>
  <line x1="145" y1="344" x2="160" y2="344" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="162" y="330" width="90" height="28" rx="3" fill="white" stroke="#ced4da"/>
  <text x="207" y="348" text-anchor="middle" font-size="8.5" fill="#495057">CallbackRecord</text>
  <line x1="252" y1="344" x2="267" y2="344" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="269" y="330" width="90" height="28" rx="3" fill="white" stroke="#ced4da"/>
  <text x="314" y="348" text-anchor="middle" font-size="8.5" fill="#495057">CallbackRecord</text>
  <text x="370" y="348" font-size="9" fill="#868e96">→ null</text>

  <text x="55" y="375" font-size="8.5" fill="#868e96">action: Runnable / FrameCallback / VsyncCallback    token: 标识回调类型    dueTime: 到期时间</text>

  <!-- 核心方法 -->
  <rect x="40" y="400" width="700" height="110" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="55" y="422" font-size="11" font-weight="600" fill="#343a40">核心方法</text>

  <!-- 关键状态 -->
  <rect x="400" y="408" width="230" height="22" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="515" y="423" text-anchor="middle" font-size="9" fill="#4a7fb5">mFrameScheduled: 帧调度去重标志</text>

  <rect x="55" y="440" width="140" height="40" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="125" y="457" text-anchor="middle" font-size="9.5" fill="#495057">scheduleFrameLocked()</text>
  <text x="125" y="472" text-anchor="middle" font-size="8" fill="#868e96">请求下一帧</text>

  <line x1="195" y1="460" x2="208" y2="460" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="210" y="440" width="140" height="40" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="280" y="457" text-anchor="middle" font-size="9.5" fill="#495057">scheduleVsyncLocked()</text>
  <text x="280" y="472" text-anchor="middle" font-size="8" fill="#868e96">请求 VSync 信号</text>

  <line x1="350" y1="460" x2="363" y2="460" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="365" y="440" width="110" height="40" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="420" y="457" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">doFrame()</text>
  <text x="420" y="472" text-anchor="middle" font-size="8" fill="#868e96">帧处理核心入口</text>

  <line x1="475" y1="460" x2="488" y2="460" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="490" y="440" width="120" height="40" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="550" y="457" text-anchor="middle" font-size="9.5" fill="#495057">doCallbacks()</text>
  <text x="550" y="472" text-anchor="middle" font-size="8" fill="#868e96">执行指定类型回调</text>

  <rect x="625" y="440" width="100" height="40" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="675" y="457" text-anchor="middle" font-size="9.5" fill="#495057">postCallback()</text>
  <text x="675" y="472" text-anchor="middle" font-size="8" fill="#868e96">注册回调</text>

  <line x1="610" y1="460" x2="623" y2="460" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
</svg>