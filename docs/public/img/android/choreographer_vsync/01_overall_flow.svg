<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#4a7fb5"/>
    </marker>
  </defs>

  <!-- SurfaceFlinger 进程 -->
  <rect x="20" y="20" width="150" height="480" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="95" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">surfaceflinger 进程</text>

  <rect x="35" y="65" width="120" height="50" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="95" y="86" text-anchor="middle" font-size="10" fill="#495057">SurfaceFlinger</text>
  <text x="95" y="101" text-anchor="middle" font-size="8.5" fill="#868e96">生成 VSync 信号</text>

  <!-- 应用进程 Native 层 -->
  <rect x="200" y="20" width="210" height="480" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="305" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">应用进程 — Native 层</text>

  <rect x="215" y="65" width="180" height="50" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="305" y="86" text-anchor="middle" font-size="10" fill="#495057">DisplayEventDispatcher</text>
  <text x="305" y="101" text-anchor="middle" font-size="8.5" fill="#868e96">监听 BitTube fd</text>

  <rect x="215" y="145" width="180" height="50" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="305" y="166" text-anchor="middle" font-size="10" fill="#495057">NativeDisplayEventReceiver</text>
  <text x="305" y="181" text-anchor="middle" font-size="8.5" fill="#868e96">dispatchVsync() → JNI</text>

  <!-- 应用进程 Java 层 -->
  <rect x="440" y="20" width="360" height="480" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="620" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">应用进程 — Java 层</text>

  <rect x="455" y="65" width="180" height="50" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="545" y="86" text-anchor="middle" font-size="10" fill="#495057">FrameDisplayEventReceiver</text>
  <text x="545" y="101" text-anchor="middle" font-size="8.5" fill="#868e96">onVsync() → run()</text>

  <rect x="455" y="145" width="180" height="70" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="545" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Choreographer</text>
  <text x="545" y="178" text-anchor="middle" font-size="9" fill="#495057">doFrame()</text>
  <text x="545" y="193" text-anchor="middle" font-size="8.5" fill="#868e96">按序执行 5 类回调</text>

  <!-- 5 类回调 -->
  <rect x="455" y="240" width="330" height="130" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="470" y="258" font-size="9.5" font-weight="600" fill="#343a40">回调执行顺序</text>

  <rect x="465" y="268" width="140" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="535" y="284" text-anchor="middle" font-size="9" fill="#495057">① CALLBACK_INPUT</text>

  <rect x="465" y="296" width="140" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="535" y="312" text-anchor="middle" font-size="9" fill="#495057">② CALLBACK_ANIMATION</text>

  <rect x="465" y="324" width="182" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="556" y="340" text-anchor="middle" font-size="9" fill="#495057">③ CALLBACK_INSETS_ANIMATION</text>

  <rect x="620" y="268" width="155" height="24" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="697" y="284" text-anchor="middle" font-size="9" fill="#2e7d32">④ CALLBACK_TRAVERSAL</text>

  <rect x="620" y="296" width="155" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="697" y="312" text-anchor="middle" font-size="9" fill="#495057">⑤ CALLBACK_COMMIT</text>

  <!-- ViewRootImpl -->
  <rect x="455" y="395" width="180" height="85" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="545" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ViewRootImpl</text>
  <text x="545" y="434" text-anchor="middle" font-size="9" fill="#495057">doTraversal()</text>
  <text x="545" y="449" text-anchor="middle" font-size="9" fill="#495057">→ performTraversals()</text>
  <text x="545" y="464" text-anchor="middle" font-size="8.5" fill="#868e96">measure → layout → draw</text>

  <!-- 箭头连线 -->
  <!-- SF → DisplayEventDispatcher -->
  <line x1="155" y1="90" x2="213" y2="90" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="183" y="83" text-anchor="middle" font-size="8" fill="#868e96">BitTube</text>

  <!-- DisplayEventDispatcher → NativeDisplayEventReceiver -->
  <line x1="305" y1="115" x2="305" y2="143" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- NativeDisplayEventReceiver → FrameDisplayEventReceiver -->
  <line x1="395" y1="170" x2="453" y2="90" stroke="#4a7fb5" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="432" y="120" text-anchor="middle" font-size="8" fill="#4a7fb5">JNI 回调</text>

  <!-- FrameDisplayEventReceiver → Choreographer -->
  <line x1="545" y1="115" x2="545" y2="143" stroke="#4a7fb5" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="570" y="132" font-size="8" fill="#4a7fb5">run()</text>

  <!-- Choreographer → 回调列表 -->
  <line x1="545" y1="215" x2="545" y2="238" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="570" y="229" font-size="8" fill="#868e96">doCallbacks()</text>

  <!-- TRAVERSAL → ViewRootImpl -->
  <path d="M697,292 L697,360 L545,360 L545,393" fill="none" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="700" y="355" font-size="8" fill="#2e7d32">TraversalRunnable</text>

  <!-- VSync 请求回路 -->
  <path d="M455,180 L430,180 L430,430 L215,430 L215,195" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="320" y="445" text-anchor="middle" font-size="8" fill="#868e96">scheduleVsync() — 请求下一次 VSync</text>
</svg>