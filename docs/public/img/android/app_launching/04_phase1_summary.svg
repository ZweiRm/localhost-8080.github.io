<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="pf" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>

  <!-- Launcher 进程 -->
  <rect x="20" y="15" width="250" height="370" rx="4" fill="#eef1f5" fill-opacity="0.4" stroke="#4a7fb5" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="145" y="35" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">Launcher 进程</text>

  <rect x="50" y="55" width="190" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="145" y="76" text-anchor="middle" font-size="10" fill="#343a40">构建 ActivityOptions</text>

  <line x1="145" y1="87" x2="145" y2="110" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>

  <rect x="50" y="110" width="190" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="145" y="131" text-anchor="middle" font-size="10" fill="#343a40">startActivityForResult</text>

  <line x1="240" y1="126" x2="370" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#pf)"/>
  <text x="300" y="92" font-size="8" fill="#868e96">Bundle (IPC)</text>

  <!-- system_server 进程 -->
  <rect x="330" y="15" width="470" height="370" rx="4" fill="#fef8ee" fill-opacity="0.4" stroke="#e07070" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="565" y="35" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">system_server 进程</text>

  <rect x="370" y="55" width="195" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="467" y="76" text-anchor="middle" font-size="10" fill="#343a40">解析参数 → Request</text>

  <line x1="467" y1="87" x2="467" y2="110" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>

  <rect x="370" y="110" width="195" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="467" y="131" text-anchor="middle" font-size="10" fill="#343a40">创建 ActivityRecord</text>
  <text x="580" y="131" font-size="8" fill="#868e96">含 Token</text>

  <line x1="467" y1="142" x2="467" y2="165" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>

  <rect x="370" y="165" width="195" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="467" y="186" text-anchor="middle" font-size="10" fill="#343a40">创建 Task 并挂载</text>

  <line x1="467" y1="197" x2="467" y2="220" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>

  <rect x="370" y="220" width="195" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="467" y="241" text-anchor="middle" font-size="10" fill="#343a40">AR 挂载到 Task</text>

  <line x1="467" y1="252" x2="467" y2="275" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>

  <rect x="370" y="275" width="195" height="32" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="467" y="296" text-anchor="middle" font-size="10" fill="#343a40">Task 移到栈顶</text>

  <line x1="467" y1="307" x2="467" y2="327" stroke="#555" stroke-width="1"/>

  <!-- 分叉 -->
  <line x1="467" y1="327" x2="390" y2="350" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>
  <line x1="467" y1="327" x2="620" y2="350" stroke="#555" stroke-width="1" marker-end="url(#pf)"/>

  <rect x="340" y="350" width="100" height="28" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="390" y="369" text-anchor="middle" font-size="9.5" fill="#c0392b">触发 pause</text>

  <rect x="580" y="350" width="130" height="28" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="645" y="369" text-anchor="middle" font-size="9.5" fill="#2e7d32">触发创建进程</text>

  <!-- 回到 Launcher -->
  <line x1="340" y1="364" x2="240" y2="300" stroke="#e07070" stroke-width="1" marker-end="url(#pf)" stroke-dasharray="4,2"/>
  <rect x="50" y="280" width="190" height="32" rx="3" fill="white" stroke="#e07070" stroke-width="1"/>
  <text x="145" y="301" text-anchor="middle" font-size="10" fill="#c0392b">执行 pause (阶段二)</text>

  <!-- 标注异步 -->
  <text x="510" y="340" font-size="9" fill="#868e96" font-style="italic">异步</text>
</svg>