<svg viewBox="0 0 280 230" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <!-- DefaultTaskDisplayArea -->
  <rect x="10" y="10" width="260" height="210" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="20" y="26" font-size="9" fill="#868e96">DefaultTaskDisplayArea</text>

  <!-- Task (Target App - on top) -->
  <rect x="40" y="36" width="200" height="78" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="140" y="52" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2e7d32">Task (目标应用, 新建, 栈顶)</text>
  <rect x="62" y="60" width="156" height="42" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="140" y="78" text-anchor="middle" font-size="9" fill="#495057">ActivityRecord</text>
  <text x="140" y="92" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">TargetActivity</text>

  <!-- Task (Launcher - below) -->
  <rect x="40" y="128" width="200" height="78" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="140" y="144" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">Task (Launcher)</text>
  <rect x="62" y="152" width="156" height="42" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="140" y="170" text-anchor="middle" font-size="9" fill="#495057">ActivityRecord</text>
  <text x="140" y="184" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">Launcher</text>
</svg>
