<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="gf" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>

  <!-- system_server -->
  <rect x="15" y="10" width="395" height="360" rx="4" fill="#fef8ee" fill-opacity="0.4" stroke="#e07070" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="212" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">system_server 进程</text>

  <!-- Target App -->
  <rect x="430" y="10" width="375" height="360" rx="4" fill="#eef5f1" fill-opacity="0.4" stroke="#2e7d32" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="617" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">目标应用进程</text>

  <!-- Phase 3 flow -->
  <rect x="50" y="50" width="185" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="142" y="69" text-anchor="middle" font-size="10" fill="#343a40">触发 Zygote 创建进程</text>
  <line x1="235" y1="64" x2="455" y2="64" stroke="#555" stroke-width="1.2" marker-end="url(#gf)"/>

  <rect x="455" y="50" width="170" height="28" rx="3" fill="white" stroke="#2e7d32" stroke-width="1"/>
  <text x="540" y="69" text-anchor="middle" font-size="10" fill="#2e7d32">进程启动 (main)</text>

  <line x1="540" y1="78" x2="540" y2="105" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <rect x="455" y="105" width="170" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="540" y="124" text-anchor="middle" font-size="10" fill="#343a40">attach → 通知 AMS</text>

  <line x1="455" y1="119" x2="235" y2="119" stroke="#555" stroke-width="1.2" marker-end="url(#gf)"/>
  <text x="345" y="112" font-size="8" fill="#868e96">attachApplication (IPC)</text>

  <rect x="50" y="105" width="185" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="142" y="124" text-anchor="middle" font-size="10" fill="#343a40">attachApplicationLocked</text>

  <line x1="142" y1="133" x2="142" y2="158" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <rect x="50" y="158" width="185" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="142" y="177" text-anchor="middle" font-size="10" fill="#343a40">遍历待启动 Activity</text>

  <line x1="142" y1="186" x2="142" y2="213" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <!-- realStartActivityLocked -->
  <rect x="40" y="213" width="200" height="32" rx="3" fill="#fff0f0" stroke="#c0392b" stroke-width="1.2"/>
  <text x="140" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b">realStartActivityLocked</text>

  <!-- 判断 pause -->
  <path d="M140,262 L195,282 L140,302 L85,282 Z" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="140" y="285" text-anchor="middle" font-size="8.5" fill="#343a40">pause 完成?</text>
  <line x1="140" y1="245" x2="140" y2="262" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>
  <text x="60" y="300" font-size="8" fill="#868e96">否: return</text>

  <!-- 是 → 构建事务 -->
  <line x1="195" y1="282" x2="270" y2="282" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>
  <text x="232" y="275" font-size="8" fill="#343a40">是</text>

  <rect x="270" y="266" width="120" height="30" rx="3" fill="white" stroke="#c0392b" stroke-width="1"/>
  <text x="330" y="285" text-anchor="middle" font-size="9" fill="#c0392b">ClientTransaction</text>

  <line x1="330" y1="296" x2="330" y2="320" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <!-- Phase 4: 应用端创建 Activity -->
  <line x1="330" y1="320" x2="455" y2="320" stroke="#555" stroke-width="1.2" marker-end="url(#gf)"/>
  <text x="393" y="313" font-size="8" fill="#868e96">IPC</text>

  <rect x="455" y="160" width="330" height="195" rx="3" fill="white" fill-opacity="0.5" stroke="#2e7d32" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="620" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">阶段四：创建 Activity</text>

  <rect x="475" y="195" width="155" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="552" y="213" text-anchor="middle" font-size="9.5" fill="#343a40">handleLaunchActivity</text>

  <line x1="552" y1="221" x2="552" y2="238" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <rect x="475" y="238" width="155" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="552" y="256" text-anchor="middle" font-size="9.5" fill="#343a40">newActivity (反射创建)</text>

  <line x1="552" y1="264" x2="552" y2="280" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <rect x="475" y="280" width="155" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="552" y="298" text-anchor="middle" font-size="9.5" fill="#343a40">attach (创建 Window)</text>

  <line x1="552" y1="306" x2="552" y2="322" stroke="#555" stroke-width="1" marker-end="url(#gf)"/>

  <rect x="475" y="322" width="155" height="26" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="552" y="340" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2e7d32">onCreate → onResume</text>

  <!-- bindApplication 回调 -->
  <line x1="235" y1="112" x2="455" y2="145" stroke="#868e96" stroke-width="0.8" marker-end="url(#gf)" stroke-dasharray="3,2"/>
  <rect x="455" y="137" width="145" height="20" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.7"/>
  <text x="527" y="151" text-anchor="middle" font-size="8" fill="#868e96">bindApplication</text>
</svg>