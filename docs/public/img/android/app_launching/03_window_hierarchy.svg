<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="wh" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#868e96"/>
    </marker>
  </defs>

  <!-- ===== LEFT: Before ===== -->
  <text x="190" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">启动前（Launcher 界面）</text>

  <rect x="30" y="35" width="320" height="230" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="190" y="55" text-anchor="middle" font-size="10" fill="#868e96">DefaultTaskDisplayArea</text>

  <rect x="50" y="68" width="150" height="90" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="125" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">Task 1</text>
  <rect x="65" y="96" width="120" height="50" rx="3" fill="#dce4f0" stroke="#4a7fb5" stroke-width="0.8"/>
  <text x="125" y="114" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4a7fb5">Task 8</text>
  <rect x="75" y="122" width="100" height="20" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="125" y="136" text-anchor="middle" font-size="8.5" fill="#495057">AR (Launcher)</text>

  <!-- 用户视角 -->
  <rect x="230" y="75" width="105" height="75" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="282" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">Launcher</text>
  <text x="282" y="117" text-anchor="middle" font-size="8" fill="#868e96">用户视角</text>

  <!-- Arrow -->
  <text x="430" y="145" text-anchor="middle" font-size="20" fill="#868e96">→</text>

  <!-- ===== RIGHT: After ===== -->
  <text x="660" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">启动后（阶段一完成）</text>

  <rect x="480" y="35" width="360" height="230" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="660" y="55" text-anchor="middle" font-size="10" fill="#868e96">DefaultTaskDisplayArea</text>

  <!-- New Task 17 at top -->
  <rect x="500" y="65" width="150" height="55" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="575" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Task 17 (新建)</text>
  <rect x="515" y="92" width="120" height="20" rx="2" fill="white" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="575" y="106" text-anchor="middle" font-size="8.5" fill="#2e7d32">AR (TargetActivity)</text>

  <!-- Old Task 1 below -->
  <rect x="500" y="130" width="150" height="90" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="0.8"/>
  <text x="575" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">Task 1</text>
  <rect x="515" y="158" width="120" height="50" rx="3" fill="#dce4f0" stroke="#4a7fb5" stroke-width="0.7"/>
  <text x="575" y="176" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4a7fb5">Task 8</text>
  <rect x="525" y="184" width="100" height="20" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="575" y="198" text-anchor="middle" font-size="8.5" fill="#495057">AR (Launcher)</text>

  <!-- 用户视角 still Launcher -->
  <rect x="680" y="68" width="145" height="155" rx="3" fill="#eef1f5" stroke="#adb5bd" stroke-width="1"/>
  <rect x="688" y="75" width="130" height="65" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="753" y="105" text-anchor="middle" font-size="9" fill="#2e7d32">TargetActivity</text>
  <text x="753" y="118" text-anchor="middle" font-size="8" fill="#868e96">(未启动)</text>
  <rect x="688" y="148" width="130" height="40" rx="3" fill="#dce4f0" stroke="#4a7fb5" stroke-width="0.8"/>
  <text x="753" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">Launcher</text>
  <text x="753" y="232" text-anchor="middle" font-size="8" fill="#868e96">用户仍看到 Launcher</text>
</svg>