<svg viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Launcher 进程 -->
  <rect x="10" y="10" width="170" height="130" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="95" y="30" text-anchor="middle" font-size="9.5" fill="#868e96">Launcher 进程</text>
  <rect x="28" y="44" width="134" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="95" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">SourceActivity</text>

  <!-- system_server 进程 -->
  <rect x="255" y="10" width="190" height="130" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="350" y="30" text-anchor="middle" font-size="9.5" fill="#868e96">system_server 进程</text>
  <rect x="276" y="44" width="148" height="56" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="350" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">AMS</text>
  <text x="350" y="80" text-anchor="middle" font-size="8.5" fill="#868e96">ActivityTaskManagerService</text>
  <text x="350" y="92" text-anchor="middle" font-size="8.5" fill="#868e96">ActivityManagerService</text>

  <!-- 目标应用进程 -->
  <rect x="520" y="10" width="170" height="130" rx="3" fill="none" stroke="#bbb" stroke-dasharray="5,3"/>
  <text x="605" y="30" text-anchor="middle" font-size="9.5" fill="#868e96">目标应用进程</text>
  <rect x="538" y="44" width="134" height="40" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="605" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">TargetActivity</text>

  <!-- Arrow 1: SA → AMS -->
  <line x1="162" y1="60" x2="274" y2="60" stroke="#555" stroke-width="1.2" marker-end="url(#a1)"/>
  <text x="218" y="52" text-anchor="middle" font-size="9" fill="#495057">① 发起启动请求</text>

  <!-- Arrow 2: AMS → SA (回 pause) -->
  <path d="M300,102 L300,150 L160,150 L160,88" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#a1)"/>
  <text x="230" y="168" text-anchor="middle" font-size="9" fill="#495057">② 通知 pause</text>

  <!-- Arrow 3: AMS → TA -->
  <line x1="424" y1="68" x2="536" y2="64" stroke="#555" stroke-width="1.2" marker-end="url(#a1)"/>
  <text x="480" y="54" text-anchor="middle" font-size="9" fill="#495057">③ 启动进程 &amp;</text>
  <text x="480" y="66" text-anchor="middle" font-size="9" fill="#495057">创建 Activity</text>
</svg>
