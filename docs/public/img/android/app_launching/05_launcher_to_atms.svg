<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#868e96"/>
    </marker>
    <marker id="ad" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5 Z" fill="#868e96"/>
    </marker>
  </defs>

  <!-- Headers -->
  <rect x="12" y="8" width="60" height="30" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="42" y="28" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">用户</text>

  <rect x="118" y="8" width="80" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="158" y="28" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">Launcher</text>

  <rect x="252" y="8" width="80" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="292" y="28" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">Activity.java</text>

  <rect x="388" y="8" width="100" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="438" y="28" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">Instrumentation</text>

  <rect x="538" y="8" width="80" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="578" y="22" text-anchor="middle" font-size="8" fill="#343a40">ActivityTask</text>
  <text x="578" y="34" text-anchor="middle" font-size="8" fill="#343a40">Manager</text>

  <rect x="650" y="8" width="60" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="680" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">ATMS</text>
  <text x="680" y="34" text-anchor="middle" font-size="7" fill="#868e96">system_server</text>

  <!-- Lifelines -->
  <line x1="42" y1="38" x2="42" y2="330" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="158" y1="38" x2="158" y2="330" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="292" y1="38" x2="292" y2="330" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="438" y1="38" x2="438" y2="330" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="578" y1="38" x2="578" y2="330" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="680" y1="38" x2="680" y2="330" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- User → Launcher -->
  <line x1="42" y1="66" x2="152" y2="66" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="97" y="59" text-anchor="middle" font-size="9" fill="#495057">点击应用图标</text>

  <!-- Launcher self-call -->
  <path d="M158,90 L196,90 L196,112 L163,112" stroke="#868e96" stroke-width="1" fill="none" marker-end="url(#ag)"/>
  <text x="204" y="98" font-size="8" fill="#495057">startActivitySafely()</text>
  <text x="204" y="110" font-size="7.5" fill="#868e96">添加 FLAG_ACTIVITY_NEW_TASK</text>

  <!-- Launcher → Activity -->
  <line x1="158" y1="132" x2="286" y2="132" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="222" y="125" text-anchor="middle" font-size="8.5" fill="#495057">startActivity(intent, options)</text>

  <!-- Activity self-call -->
  <path d="M292,152 L336,152 L336,172 L297,172" stroke="#868e96" stroke-width="1" fill="none" marker-end="url(#ag)"/>
  <text x="344" y="164" font-size="8" fill="#495057">startActivityForResult(intent, -1)</text>

  <!-- Activity → Instrumentation -->
  <line x1="292" y1="196" x2="432" y2="196" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="362" y="189" text-anchor="middle" font-size="8.5" fill="#495057">execStartActivity(...)</text>

  <!-- Instrumentation → ATM -->
  <line x1="438" y1="222" x2="572" y2="222" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="505" y="215" text-anchor="middle" font-size="8" fill="#495057">getService()</text>

  <!-- ATM → Instrumentation (return proxy) -->
  <line x1="578" y1="240" x2="444" y2="240" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <text x="511" y="254" text-anchor="middle" font-size="7.5" fill="#868e96">IActivityTaskManager Proxy</text>

  <!-- Instrumentation → ATMS (Binder IPC) -->
  <line x1="438" y1="278" x2="674" y2="278" stroke="#555" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="556" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#495057">startActivity() [Binder IPC]</text>

  <!-- IPC annotation -->
  <rect x="408" y="296" width="300" height="22" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="558" y="311" text-anchor="middle" font-size="8.5" fill="#868e96">跨进程调用：Launcher 进程 → system_server 进程</text>
</svg>
