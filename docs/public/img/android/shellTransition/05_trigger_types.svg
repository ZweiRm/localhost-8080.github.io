<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 340">
  <defs>
    <marker id="a5t" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <style>text{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}</style>
  </defs>
  <text x="375" y="20" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">Shell Transition 触发方式与类型</text>

  <!-- Core side triggers -->
  <rect x="15" y="40" width="350" height="290" rx="3" fill="none" stroke="#4a7fb5" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="25" y="60" font-size="10" font-weight="600" fill="#4a7fb5">Core 侧触发（WM Operations）</text>

  <rect x="30" y="75" width="150" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="105" y="93" font-size="9.5" fill="#495057" text-anchor="middle">startActivity</text>

  <rect x="195" y="75" width="155" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="272" y="93" font-size="9.5" fill="#495057" text-anchor="middle">finishActivity</text>

  <rect x="30" y="115" width="150" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="105" y="133" font-size="9.5" fill="#495057" text-anchor="middle">moveTaskToFront</text>

  <rect x="195" y="115" width="155" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="272" y="133" font-size="9.5" fill="#495057" text-anchor="middle">configuration change</text>

  <rect x="30" y="155" width="150" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="105" y="173" font-size="9.5" fill="#495057" text-anchor="middle">setVisibility</text>

  <rect x="195" y="155" width="155" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="272" y="173" font-size="9.5" fill="#495057" text-anchor="middle">rotation change</text>

  <!-- Transition types -->
  <rect x="30" y="200" width="320" height="120" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="40" y="220" font-size="10" font-weight="600" fill="#343a40">Transition 类型 (TRANSIT_xxx)</text>
  <rect x="45" y="230" width="70" height="22" rx="3" fill="white" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="80" y="245" font-size="8.5" fill="#2e7d32" text-anchor="middle">OPEN (1)</text>
  <rect x="125" y="230" width="70" height="22" rx="3" fill="white" stroke="#e07070" stroke-width="0.8"/>
  <text x="160" y="245" font-size="8.5" fill="#c0392b" text-anchor="middle">CLOSE (2)</text>
  <rect x="205" y="230" width="70" height="22" rx="3" fill="white" stroke="#4a7fb5" stroke-width="0.8"/>
  <text x="240" y="245" font-size="8.5" fill="#4a7fb5" text-anchor="middle">TO_FRONT</text>
  <rect x="45" y="260" width="70" height="22" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="275" font-size="8.5" fill="#495057" text-anchor="middle">TO_BACK</text>
  <rect x="125" y="260" width="70" height="22" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="160" y="275" font-size="8.5" fill="#495057" text-anchor="middle">CHANGE</text>
  <rect x="205" y="260" width="70" height="22" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="240" y="275" font-size="8.5" fill="#495057" text-anchor="middle">WAKE</text>
  <rect x="45" y="290" width="70" height="22" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="305" font-size="8.5" fill="#495057" text-anchor="middle">SLEEP</text>
  <rect x="125" y="290" width="70" height="22" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="160" y="305" font-size="8.5" fill="#495057" text-anchor="middle">KEYGUARD</text>

  <!-- Shell side triggers -->
  <rect x="385" y="40" width="350" height="140" rx="3" fill="none" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="395" y="60" font-size="10" font-weight="600" fill="#868e96">Shell 侧触发（via WCT）</text>

  <rect x="400" y="75" width="155" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="477" y="93" font-size="9.5" fill="#495057" text-anchor="middle">PIP enter/exit</text>

  <rect x="565" y="75" width="155" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="642" y="93" font-size="9.5" fill="#495057" text-anchor="middle">Split screen</text>

  <rect x="400" y="115" width="155" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="477" y="133" font-size="9.5" fill="#495057" text-anchor="middle">Freeform mode</text>

  <rect x="565" y="115" width="155" height="28" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="642" y="133" font-size="9.5" fill="#495057" text-anchor="middle">Desktop mode</text>

  <!-- Change primitives -->
  <rect x="385" y="200" width="350" height="120" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="395" y="220" font-size="10" font-weight="600" fill="#343a40">Change 模式 (每个参与窗口)</text>
  <rect x="400" y="235" width="155" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="477" y="254" font-size="9" fill="#2e7d32" text-anchor="middle">OPEN: 新窗口出现</text>
  <rect x="565" y="235" width="155" height="30" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="642" y="254" font-size="9" fill="#c0392b" text-anchor="middle">CLOSE: 窗口关闭</text>
  <rect x="400" y="275" width="155" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="0.8"/>
  <text x="477" y="294" font-size="9" fill="#4a7fb5" text-anchor="middle">TO_FRONT: 移至前台</text>
  <rect x="565" y="275" width="155" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="642" y="294" font-size="9" fill="#495057" text-anchor="middle">TO_BACK: 移至后台</text>
</svg>