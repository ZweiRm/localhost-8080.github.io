<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="12">
  <rect width="950" height="700" fill="#f8f9fa" rx="3"/>

  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">动画执行流程 (Playing 阶段详细)</text>

  <!-- Column headers -->
  <rect x="30" y="45" width="200" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="130" y="65" text-anchor="middle" font-weight="600" fill="#4a7fb5">WM Core (Transition)</text>

  <rect x="270" y="45" width="200" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="370" y="65" text-anchor="middle" font-weight="600" fill="#2e7d32">Shell (Transitions)</text>

  <rect x="510" y="45" width="200" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="610" y="65" text-anchor="middle" font-weight="600" fill="#adb5bd">DefaultTransitionHandler</text>

  <rect x="750" y="45" width="170" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="835" y="65" text-anchor="middle" font-weight="600" fill="#4a7fb5">SurfaceFlinger</text>

  <!-- Timeline lines -->
  <line x1="130" y1="75" x2="130" y2="680" stroke="#4a7fb5" stroke-width="1" stroke-dasharray="3"/>
  <line x1="370" y1="75" x2="370" y2="680" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3"/>
  <line x1="610" y1="75" x2="610" y2="680" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3"/>
  <line x1="835" y1="75" x2="835" y2="680" stroke="#4a7fb5" stroke-width="1" stroke-dasharray="3"/>

  <!-- Step 1: onTransactionReady -->
  <rect x="50" y="95" width="160" height="50" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="130" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#333">onTransactionReady()</text>
  <text x="130" y="128" text-anchor="middle" font-size="10" fill="#555">commitVisibleActivities</text>
  <text x="130" y="140" text-anchor="middle" font-size="10" fill="#555">calculateTargets/Info</text>

  <!-- Arrow to Shell -->
  <line x1="210" y1="120" x2="290" y2="160" stroke="#4a7fb5" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="250" y="130" font-size="10" fill="#4a7fb5">IPC: player.</text>
  <text x="245" y="142" font-size="10" fill="#4a7fb5">onTransitionReady</text>

  <!-- Step 2: Shell receives -->
  <rect x="290" y="155" width="160" height="40" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="370" y="173" text-anchor="middle" font-size="11" font-weight="600" fill="#333">onTransitionReady()</text>
  <text x="370" y="188" text-anchor="middle" font-size="10" fill="#555">activeIdx / dispatchReady</text>

  <!-- Step 3: setupStartState -->
  <rect x="290" y="210" width="160" height="55" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="370" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#333">setupStartState()</text>
  <text x="370" y="243" text-anchor="middle" font-size="10" fill="#555">OPEN/TO_FRONT: show leash</text>
  <text x="370" y="255" text-anchor="middle" font-size="10" fill="#555">CLOSE/TO_BACK: finishT.hide</text>
  <line x1="370" y1="195" x2="370" y2="210" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrowGr)"/>

  <!-- Step 4: setupAnimHierarchy -->
  <rect x="290" y="280" width="160" height="55" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="370" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#333">setupAnimHierarchy()</text>
  <text x="370" y="313" text-anchor="middle" font-size="10" fill="#555">reparent(leash, rootLeash)</text>
  <text x="370" y="325" text-anchor="middle" font-size="10" fill="#555">setLayer (z-order)</text>
  <line x1="370" y1="265" x2="370" y2="280" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrowGr)"/>

  <!-- Step 5: playTransition -->
  <rect x="290" y="350" width="160" height="40" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="370" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#333">playTransition()</text>
  <text x="370" y="383" text-anchor="middle" font-size="10" fill="#555">遍历 Handler 链</text>
  <line x1="370" y1="335" x2="370" y2="350" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrowGr)"/>

  <!-- Arrow to DefaultHandler -->
  <line x1="450" y1="370" x2="530" y2="410" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <text x="490" y="383" font-size="10" fill="#adb5bd">startAnimation()</text>

  <!-- Step 6: DefaultHandler startAnimation -->
  <rect x="530" y="405" width="160" height="60" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="610" y="423" text-anchor="middle" font-size="11" font-weight="600" fill="#333">startAnimation()</text>
  <text x="610" y="438" text-anchor="middle" font-size="10" fill="#555">loadAttributeAnimation</text>
  <text x="610" y="450" text-anchor="middle" font-size="10" fill="#555">创建 ValueAnimator</text>
  <text x="610" y="462" text-anchor="middle" font-size="10" fill="#555">startT.apply()</text>

  <!-- Step 7: Animation loop -->
  <rect x="530" y="480" width="160" height="50" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="610" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#333">ValueAnimator 逐帧</text>
  <text x="610" y="513" text-anchor="middle" font-size="10" fill="#555">setMatrix / setAlpha</text>
  <text x="610" y="525" text-anchor="middle" font-size="10" fill="#555">setWindowCrop / setPosition</text>
  <line x1="610" y1="465" x2="610" y2="480" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrowGr)"/>

  <!-- Arrow to SF -->
  <line x1="690" y1="505" x2="770" y2="505" stroke="#4a7fb5" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="730" y="498" font-size="10" fill="#4a7fb5">Transaction</text>

  <!-- SF box -->
  <rect x="770" y="490" width="130" height="35" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="835" y="512" text-anchor="middle" font-size="11" fill="#333">Layer 合成渲染</text>

  <!-- Step 8: animEnd -->
  <rect x="530" y="548" width="160" height="35" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="610" y="570" text-anchor="middle" font-size="11" font-weight="600" fill="#333">onAnimationEnd</text>
  <line x1="610" y1="530" x2="610" y2="548" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrowGr)"/>

  <!-- Arrow back to Shell onFinish -->
  <line x1="530" y1="566" x2="450" y2="600" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGn)"/>
  <text x="490" y="590" font-size="10" fill="#2e7d32">finishCallback</text>

  <!-- Step 9: Shell onFinish -->
  <rect x="290" y="595" width="160" height="40" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="370" y="613" text-anchor="middle" font-size="11" font-weight="600" fill="#333">onFinish()</text>
  <text x="370" y="628" text-anchor="middle" font-size="10" fill="#555">merge finishT, IPC finish</text>

  <!-- Arrow back to Core -->
  <line x1="290" y1="615" x2="210" y2="645" stroke="#4a7fb5" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="235" y="628" font-size="10" fill="#4a7fb5">finishTransition</text>

  <!-- Step 10: Core finishTransition -->
  <rect x="50" y="640" width="160" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="130" y="658" text-anchor="middle" font-size="11" font-weight="600" fill="#333">finishTransition()</text>
  <text x="130" y="673" text-anchor="middle" font-size="10" fill="#555">commitVisibility, validate</text>

  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a7fb5"/>
    </marker>
    <marker id="arrowGn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/>
    </marker>
    <marker id="arrowGr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/>
    </marker>
  </defs>
</svg>
