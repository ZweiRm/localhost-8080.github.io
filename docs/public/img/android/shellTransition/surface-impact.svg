<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="12">
  <rect width="900" height="520" fill="#f8f9fa" rx="3"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Transition 对 Surface / Layer 可见性的影响</text>

  <!-- Normal state (left) -->
  <rect x="30" y="55" width="260" height="220" rx="3" fill="white" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="160" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">正常状态 (无 Transition)</text>

  <rect x="55" y="90" width="210" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="160" y="110" text-anchor="middle" font-size="11" fill="#333">DisplayContent (root)</text>

  <rect x="75" y="130" width="170" height="25" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="160" y="147" text-anchor="middle" font-size="11" fill="#333">TaskDisplayArea</text>

  <rect x="95" y="165" width="130" height="25" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="160" y="182" text-anchor="middle" font-size="11" fill="#333">Task A (VISIBLE)</text>

  <rect x="115" y="200" width="110" height="22" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="170" y="215" text-anchor="middle" font-size="10" fill="#333">ActivityRecord</text>

  <rect x="115" y="230" width="110" height="22" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="170" y="245" text-anchor="middle" font-size="10" fill="#333">WindowState</text>

  <text x="160" y="270" text-anchor="middle" font-size="11" fill="#2e7d32">Layer 可见, InputDispatcher 可派发</text>

  <!-- During transition (middle) -->
  <rect x="320" y="55" width="260" height="340" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#adb5bd">动画期间 (Playing)</text>

  <rect x="340" y="90" width="220" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="450" y="110" text-anchor="middle" font-size="11" fill="#333">rootLeash (动画根)</text>

  <!-- Opening task -->
  <rect x="345" y="130" width="100" height="25" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="395" y="147" text-anchor="middle" font-size="10" fill="#333">Task B leash</text>
  <text x="395" y="162" text-anchor="middle" font-size="10" fill="#2e7d32">show + alpha=0->1</text>
  <text x="345" y="176" font-size="10" fill="#2e7d32">OPEN/TO_FRONT</text>

  <!-- Closing task -->
  <rect x="460" y="130" width="100" height="25" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="510" y="147" text-anchor="middle" font-size="10" fill="#333">Task A leash</text>
  <text x="510" y="162" text-anchor="middle" font-size="10" fill="#b44">finishT.hide</text>
  <text x="460" y="176" font-size="10" fill="#b44">CLOSE/TO_BACK</text>

  <!-- reparent explanation -->
  <rect x="340" y="195" width="225" height="80" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="452" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#b44">Surface 变化 (关键!)</text>
  <text x="350" y="230" font-size="10" fill="#555">1. reparent: leash 移至 rootLeash 下</text>
  <text x="350" y="245" font-size="10" fill="#555">2. CLOSE: finishT 中注册 hide(leash)</text>
  <text x="350" y="260" font-size="10" fill="#555">3. 动画期间 Layer 脱离原始层级</text>
  <text x="350" y="270" font-size="10" fill="#555">   InputDispatcher 认为 NOT_VISIBLE</text>

  <!-- Arrow showing reparent -->
  <rect x="340" y="290" width="225" height="90" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="452" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">setupAnimHierarchy 效果</text>
  <text x="350" y="325" font-size="10" fill="#555">t.reparent(leash, root.getLeash())</text>
  <text x="350" y="340" font-size="10" fill="#555">t.setLayer(leash, layer)  // z-order</text>
  <text x="350" y="355" font-size="10" fill="#555">t.setPosition(leash, startAbsBounds)</text>
  <text x="350" y="370" font-size="10" fill="#555">动画完成后 reparent 还原到原父节点</text>

  <!-- Abnormal state (right) -->
  <rect x="610" y="55" width="260" height="340" rx="3" fill="white" stroke="#e07070" stroke-width="1.5"/>
  <text x="740" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#b44">异常场景</text>

  <!-- Scenario 1: Animation not finished -->
  <rect x="625" y="90" width="230" height="80" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="740" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#b44">场景 1: 动画未完成</text>
  <text x="635" y="125" font-size="10" fill="#555">- finishT 未被 apply</text>
  <text x="635" y="140" font-size="10" fill="#555">- CLOSE 的 leash 保持 visible</text>
  <text x="635" y="155" font-size="10" fill="#555">- OPEN 的 leash alpha 可能停在中间</text>
  <text x="635" y="167" font-size="10" fill="#b44">影响: 残影 / 黑屏 / 无焦点</text>

  <!-- Scenario 2: reparent not restored -->
  <rect x="625" y="182" width="230" height="80" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="740" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#b44">场景 2: reparent 未还原</text>
  <text x="635" y="217" font-size="10" fill="#555">- leash 仍在 rootLeash 下</text>
  <text x="635" y="232" font-size="10" fill="#555">- 脱离 WindowContainer 层级</text>
  <text x="635" y="247" font-size="10" fill="#555">- InputDispatcher 无法定位</text>
  <text x="635" y="259" font-size="10" fill="#b44">影响: 无焦点窗口 ANR</text>

  <!-- Scenario 3: accumulation -->
  <rect x="625" y="274" width="230" height="80" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="740" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#b44">场景 3: Transition 堆积</text>
  <text x="635" y="309" font-size="10" fill="#555">- 400+ transitions 在 readyQueue</text>
  <text x="635" y="324" font-size="10" fill="#555">- dispatchReady 直接返回</text>
  <text x="635" y="339" font-size="10" fill="#555">- 后续动画被 abort</text>
  <text x="635" y="351" font-size="10" fill="#b44">影响: 卡顿 / 内存暴涨</text>

  <!-- Fix mechanism box -->
  <rect x="30" y="400" width="560" height="100" rx="3" fill="white" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="310" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">修复 / 防护机制</text>

  <rect x="45" y="435" width="165" height="50" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="127" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#333">mStateValidators</text>
  <text x="127" y="467" text-anchor="middle" font-size="9" fill="#555">transition 结束后校验</text>
  <text x="127" y="480" text-anchor="middle" font-size="9" fill="#555">Surface 可见性一致性</text>

  <rect x="225" y="435" width="165" height="50" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="307" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#333">mValidateCommitVis</text>
  <text x="307" y="467" text-anchor="middle" font-size="9" fill="#555">visibleRequested 与</text>
  <text x="307" y="480" text-anchor="middle" font-size="9" fill="#555">实际 visibility 对齐</text>

  <rect x="405" y="435" width="170" height="50" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="490" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#333">cleanupTransaction</text>
  <text x="490" y="467" text-anchor="middle" font-size="9" fill="#555">动画结束后还原 reparent</text>
  <text x="490" y="480" text-anchor="middle" font-size="9" fill="#555">恢复 Surface 到原层级</text>

  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a7fb5"/>
    </marker>
  </defs>
</svg>
