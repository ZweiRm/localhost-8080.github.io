<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#4a7fb5"/>
    </marker>
  </defs>

  <!-- Java 层 -->
  <rect x="20" y="15" width="740" height="140" rx="3" fill="none" stroke="#adb5bd" stroke-dasharray="5,3"/>
  <text x="35" y="35" font-size="11" font-weight="600" fill="#868e96">Java 层</text>

  <rect x="50" y="50" width="200" height="90" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="90" y="72" font-size="11" font-weight="600" fill="#343a40">SurfaceControl.java</text>
  <line x1="50" y1="80" x2="250" y2="80" stroke="#ced4da"/>
  <text x="60" y="96" font-size="9.5" fill="#495057">mNativeObject: long</text>
  <text x="60" y="110" font-size="9.5" fill="#495057">mNativeHandle: long</text>
  <text x="60" y="124" font-size="9.5" fill="#495057">getLayerId(): int</text>

  <rect x="300" y="50" width="200" height="90" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="325" y="72" font-size="11" font-weight="600" fill="#343a40">Transaction (内部类)</text>
  <line x1="300" y1="80" x2="500" y2="80" stroke="#ced4da"/>
  <text x="310" y="96" font-size="9.5" fill="#495057">mNativeObject: long</text>
  <text x="310" y="110" font-size="9.5" fill="#495057">reparent() / setPosition()</text>
  <text x="310" y="124" font-size="9.5" fill="#495057">apply() / merge()</text>

  <!-- 包含关系标注 -->
  <text x="258" y="100" font-size="9" fill="#868e96">⊳</text>

  <!-- JNI 层 -->
  <rect x="20" y="175" width="740" height="70" rx="3" fill="none" stroke="#adb5bd" stroke-dasharray="5,3"/>
  <text x="35" y="195" font-size="11" font-weight="600" fill="#868e96">JNI 层</text>

  <rect x="120" y="190" width="320" height="40" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="155" y="215" font-size="10" fill="#495057">android_view_SurfaceControl.cpp</text>
  <text x="450" y="215" font-size="9" fill="#868e96">nativeXXXX 方法实现</text>

  <!-- Java → JNI 箭头 -->
  <line x1="150" y1="140" x2="230" y2="190" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="140" x2="330" y2="190" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Native 层 -->
  <rect x="20" y="265" width="740" height="240" rx="3" fill="none" stroke="#adb5bd" stroke-dasharray="5,3"/>
  <text x="35" y="285" font-size="11" font-weight="600" fill="#868e96">Native 层 (同一进程)</text>

  <rect x="50" y="295" width="200" height="60" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="75" y="318" font-size="11" font-weight="600" fill="#343a40">SurfaceControl (C++)</text>
  <text x="60" y="340" font-size="9.5" fill="#495057">mHandle / mLayerId</text>

  <rect x="300" y="295" width="220" height="60" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="313" y="318" font-size="11" font-weight="600" fill="#343a40">Transaction (C++)</text>
  <text x="310" y="340" font-size="9.5" fill="#495057">mComposerStates 无序表</text>

  <rect x="560" y="295" width="180" height="60" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="573" y="318" font-size="11" font-weight="600" fill="#343a40">SurfaceComposerClient</text>
  <text x="570" y="340" font-size="9" fill="#868e96">Binder 客户端</text>

  <!-- JNI → Native 箭头 -->
  <line x1="230" y1="230" x2="150" y2="295" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="330" y1="230" x2="400" y2="295" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Transaction → SurfaceComposerClient -->
  <line x1="520" y1="325" x2="555" y2="325" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- SurfaceFlinger (远程进程) -->
  <rect x="500" y="400" width="240" height="85" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="555" y="422" font-size="11" font-weight="600" fill="#343a40">SurfaceFlinger</text>
  <line x1="500" y1="430" x2="740" y2="430" stroke="#ced4da"/>
  <text x="510" y="448" font-size="9.5" fill="#495057">TransactionHandler</text>
  <text x="510" y="462" font-size="9.5" fill="#495057">LayerLifecycleManager</text>
  <text x="510" y="476" font-size="9.5" fill="#495057">LayerSnapshotBuilder</text>

  <!-- 进程分隔 -->
  <text x="380" y="420" font-size="9" fill="#868e96">Binder IPC</text>
  <line x1="650" y1="355" x2="620" y2="396" stroke="#4a7fb5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- 远程进程标注 -->
  <rect x="500" y="385" width="240" height="15" rx="2" fill="#eef1f5" stroke="none"/>
  <text x="565" y="396" font-size="8" fill="#4a7fb5">独立进程 (surfaceflinger)</text>
</svg>
