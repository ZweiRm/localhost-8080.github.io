<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Participants -->
  <rect x="10" y="10" width="110" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="65" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ValueAnimator</text>
  <line x1="65" y1="38" x2="65" y2="310" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="155" y="10" width="115" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="212" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ObjectAnimator</text>
  <line x1="212" y1="38" x2="212" y2="310" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="305" y="10" width="150" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="380" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">PropertyValuesHolder</text>
  <line x1="380" y1="38" x2="380" y2="310" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="490" y="10" width="150" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="565" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">FloatPropValuesHolder</text>
  <line x1="565" y1="38" x2="565" y2="310" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="675" y="10" width="160" height="28" rx="3" fill="#f8f9fa" stroke="#adb5bd"/>
  <text x="755" y="29" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">JNI (PropertyValuesHolder.cpp)</text>
  <line x1="755" y1="38" x2="755" y2="310" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <!-- Step 1: doAnimationFrame (from Choreographer) -->
  <text x="2" y="72" font-size="9" fill="#868e96">1</text>
  <line x1="15" y1="66" x2="60" y2="66" stroke="#e07070" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="65" y="82" font-size="8.5" fill="#495057">doAnimationFrame()</text>

  <!-- Step 2: animateBasedOnTime -->
  <text x="2" y="108" font-size="9" fill="#868e96">2</text>
  <rect x="40" y="96" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="65" y="108" text-anchor="middle" font-size="8.5" fill="#495057">animateBasedOnTime()</text>

  <!-- Step 3: super.animateValue -->
  <text x="2" y="140" font-size="9" fill="#868e96">3</text>
  <line x1="65" y1="134" x2="207" y2="134" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="135" y="130" text-anchor="middle" font-size="9" fill="#495057">animateValue(fraction)</text>

  <!-- Step 4: ObjectAnimator.animateValue calls super -->
  <text x="2" y="170" font-size="9" fill="#868e96">4</text>
  <rect x="187" y="158" width="50" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="212" y="170" text-anchor="middle" font-size="8.5" fill="#c0392b">super.animateValue()</text>
  <text x="270" y="170" font-size="8" fill="#868e96">插值 + calculateValue + onAnimationUpdate</text>

  <!-- Step 5: setAnimatedValue on PVH -->
  <text x="2" y="206" font-size="9" fill="#868e96">5</text>
  <line x1="212" y1="200" x2="375" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="293" y="196" text-anchor="middle" font-size="9" fill="#495057">mValues[i].setAnimatedValue(target)</text>

  <!-- Step 6: FloatPVH.setAnimatedValue -->
  <text x="2" y="236" font-size="9" fill="#868e96">6</text>
  <line x1="380" y1="230" x2="560" y2="230" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="470" y="226" text-anchor="middle" font-size="9" fill="#495057">setAnimatedValue(target)</text>

  <!-- Step 7: nCallFloatMethod (JNI) -->
  <text x="2" y="266" font-size="9" fill="#868e96">7</text>
  <line x1="565" y1="260" x2="750" y2="260" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="658" y="256" text-anchor="middle" font-size="9" fill="#495057">nCallFloatMethod(target, setter, value)</text>
  <text x="755" y="282" text-anchor="middle" font-size="8" fill="#868e96">CallVoidMethod(target, setterID, value)</text>
</svg>
