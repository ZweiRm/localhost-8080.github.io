<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="120" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="80" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Choreographer</text>
  <line x1="80" y1="38" x2="80" y2="370" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="215" y="10" width="140" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="285" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">AnimationHandler</text>
  <line x1="285" y1="38" x2="285" y2="370" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="430" y="10" width="120" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="490" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ValueAnimator</text>
  <line x1="490" y1="38" x2="490" y2="370" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <!-- Step 1: VSYNC arrives, doFrame -->
  <text x="8" y="72" font-size="9" fill="#868e96">1</text>
  <text x="15" y="72" font-size="9.5" fill="#c0392b">VSYNC</text>
  <line x1="50" y1="76" x2="75" y2="76" stroke="#e07070" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="55" y="80" width="50" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="80" y="92" text-anchor="middle" font-size="8.5" fill="#c0392b">doFrame()</text>

  <!-- Step 2: mFrameCallback.doFrame -->
  <text x="8" y="120" font-size="9" fill="#868e96">2</text>
  <line x1="80" y1="114" x2="280" y2="114" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="180" y="110" text-anchor="middle" font-size="9" fill="#495057">mFrameCallback.doFrame()</text>

  <!-- Step 3: doAnimationFrame(frameTime) -->
  <text x="8" y="148" font-size="9" fill="#868e96">3</text>
  <rect x="260" y="136" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="285" y="148" text-anchor="middle" font-size="8.5" fill="#495057">doAnimationFrame(frameTime)</text>

  <!-- Step 4: callback.doAnimationFrame -->
  <text x="8" y="178" font-size="9" fill="#868e96">4</text>
  <line x1="285" y1="172" x2="485" y2="172" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="385" y="168" text-anchor="middle" font-size="9" fill="#495057">callback.doAnimationFrame(frameTime)</text>

  <!-- Step 5: animateBasedOnTime -->
  <text x="8" y="208" font-size="9" fill="#868e96">5</text>
  <rect x="465" y="196" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="490" y="208" text-anchor="middle" font-size="8.5" fill="#495057">animateBasedOnTime(currentTime)</text>

  <!-- Step 6: animateValue -->
  <text x="8" y="238" font-size="9" fill="#868e96">6</text>
  <rect x="465" y="226" width="50" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="490" y="238" text-anchor="middle" font-size="8.5" fill="#c0392b">animateValue(fraction)</text>

  <!-- Step 7: calculateValue -->
  <text x="8" y="268" font-size="9" fill="#868e96">7</text>
  <rect x="465" y="256" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="490" y="268" text-anchor="middle" font-size="8.5" fill="#495057">calculateValue(fraction)</text>

  <!-- Step 8: onAnimationUpdate -->
  <text x="8" y="298" font-size="9" fill="#868e96">8</text>
  <rect x="465" y="286" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="490" y="298" text-anchor="middle" font-size="8.5" fill="#495057">onAnimationUpdate()</text>

  <!-- Re-register: postFrameCallback -->
  <text x="8" y="338" font-size="9" fill="#868e96">9</text>
  <line x1="285" y1="332" x2="85" y2="332" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="185" y="328" text-anchor="middle" font-size="9" fill="#495057">postFrameCallback(this)</text>
  <text x="185" y="348" text-anchor="middle" font-size="8" fill="#868e96">动画未结束，重新注册 VSYNC</text>
</svg>
