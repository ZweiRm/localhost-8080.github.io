<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Participants -->
  <rect x="15" y="10" width="120" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="75" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ObjectAnimator</text>
  <line x1="75" y1="38" x2="75" y2="430" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="175" y="10" width="150" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="250" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">PropertyValuesHolder</text>
  <line x1="250" y1="38" x2="250" y2="430" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="365" y="10" width="170" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="450" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">FloatPropertyValuesHolder</text>
  <line x1="450" y1="38" x2="450" y2="430" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="580" y="10" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="630" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">KeyframeSet</text>
  <line x1="630" y1="38" x2="630" y2="430" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <!-- Step 1: ofFloat -->
  <text x="4" y="72" font-size="9" fill="#868e96">1</text>
  <text x="15" y="72" font-size="9.5" fill="#495057">ofFloat(target, propertyName, values)</text>

  <!-- Step 2-3: setTarget + setPropertyName (grouped) -->
  <rect x="50" y="82" width="50" height="50" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="4" y="98" font-size="9" fill="#868e96">2</text>
  <text x="60" y="98" font-size="8.5" fill="#495057">setTarget()</text>
  <text x="4" y="122" font-size="9" fill="#868e96">3</text>
  <text x="60" y="122" font-size="8.5" fill="#495057">setPropertyName()</text>

  <!-- Step 4: setFloatValues -->
  <text x="4" y="156" font-size="9" fill="#868e96">4</text>
  <rect x="50" y="144" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="75" y="156" text-anchor="middle" font-size="8.5" fill="#495057">setFloatValues(values)</text>

  <!-- Step 5: PropertyValuesHolder.ofFloat -->
  <text x="4" y="186" font-size="9" fill="#868e96">5</text>
  <line x1="75" y1="180" x2="245" y2="180" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="160" y="176" text-anchor="middle" font-size="9" fill="#495057">ofFloat("", values)</text>

  <!-- Step 6: new FloatPropertyValuesHolder -->
  <text x="4" y="216" font-size="9" fill="#868e96">6</text>
  <line x1="250" y1="210" x2="445" y2="210" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="348" y="206" text-anchor="middle" font-size="9" fill="#495057">new FloatPropertyValuesHolder</text>

  <!-- Step 7: setFloatValues in FPVH -->
  <text x="4" y="246" font-size="9" fill="#868e96">7</text>
  <rect x="425" y="234" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="450" y="246" text-anchor="middle" font-size="8.5" fill="#495057">setFloatValues</text>

  <!-- Step 8: super.setFloatValues -->
  <text x="4" y="276" font-size="9" fill="#868e96">8</text>
  <line x1="450" y1="270" x2="255" y2="270" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="350" y="266" text-anchor="middle" font-size="9" fill="#495057">super.setFloatValues</text>

  <!-- Step 9: KeyframeSet.ofFloat -->
  <text x="4" y="306" font-size="9" fill="#868e96">9</text>
  <line x1="250" y1="300" x2="625" y2="300" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="438" y="296" text-anchor="middle" font-size="9" fill="#495057">KeyframeSet.ofFloat(values)</text>

  <!-- Step 10: return keyframes -->
  <text x="4" y="336" font-size="9" fill="#868e96">10</text>
  <line x1="630" y1="330" x2="255" y2="330" stroke="#868e96" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="443" y="326" text-anchor="middle" font-size="9" fill="#868e96">return new FloatKeyframeSet(keyframes)</text>

  <!-- Step 11: return FPVH -->
  <text x="4" y="366" font-size="9" fill="#868e96">11</text>
  <line x1="250" y1="360" x2="80" y2="360" stroke="#868e96" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="165" y="356" text-anchor="middle" font-size="9" fill="#868e96">return FloatPropertyValuesHolder</text>

  <!-- Step 12: setValues -->
  <text x="4" y="396" font-size="9" fill="#868e96">12</text>
  <rect x="50" y="384" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="75" y="396" text-anchor="middle" font-size="8.5" fill="#495057">setValues(pvh)</text>
  <text x="110" y="410" font-size="8" fill="#868e96">mValues = values; mValuesMap.put(...)</text>
</svg>
