<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="120" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="80" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ValueAnimator</text>
  <line x1="80" y1="38" x2="80" y2="510" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="230" y="10" width="140" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="300" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">AnimationHandler</text>
  <line x1="300" y1="38" x2="300" y2="510" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="440" y="10" width="150" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="515" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">PropertyValuesHolder</text>
  <line x1="515" y1="38" x2="515" y2="510" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="630" y="10" width="70" height="28" rx="3" fill="#f8f9fa" stroke="#adb5bd"/>
  <text x="665" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Animator</text>
  <line x1="665" y1="38" x2="665" y2="510" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <!-- Step 1: start -->
  <text x="8" y="72" font-size="9" fill="#868e96">1</text>
  <text x="25" y="72" font-size="9.5" fill="#495057">start()</text>
  <line x1="25" y1="76" x2="75" y2="76" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: start(playBackwards) -->
  <text x="8" y="100" font-size="9" fill="#868e96">2</text>
  <rect x="55" y="88" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="100" text-anchor="middle" font-size="8.5" fill="#495057">start(false)</text>

  <!-- Step 3: addAnimationCallback -->
  <text x="8" y="130" font-size="9" fill="#868e96">3</text>
  <line x1="80" y1="124" x2="295" y2="124" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="185" y="120" text-anchor="middle" font-size="9" fill="#495057">addAnimationCallback(0)</text>

  <!-- Step 4: addAnimationFrameCallback -->
  <text x="8" y="158" font-size="9" fill="#868e96">4</text>
  <rect x="275" y="146" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="300" y="158" text-anchor="middle" font-size="8.5" fill="#495057">postFrameCallback → Choreographer</text>

  <!-- Separator: registration done -->
  <line x1="15" y1="180" x2="700" y2="180" stroke="#ced4da" stroke-dasharray="6,3"/>
  <text x="360" y="194" text-anchor="middle" font-size="8.5" fill="#868e96">VSYNC 回调已注册，开始初始化</text>

  <!-- Step 5: startAnimation -->
  <text x="8" y="220" font-size="9" fill="#868e96">5</text>
  <rect x="55" y="208" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="220" text-anchor="middle" font-size="8.5" fill="#495057">startAnimation()</text>

  <!-- Step 6: initAnimation -->
  <text x="8" y="250" font-size="9" fill="#868e96">6</text>
  <rect x="55" y="238" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="250" text-anchor="middle" font-size="8.5" fill="#495057">initAnimation()</text>

  <!-- Step 7: PropertyValuesHolder.init -->
  <text x="8" y="278" font-size="9" fill="#868e96">7</text>
  <line x1="80" y1="272" x2="510" y2="272" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="295" y="268" text-anchor="middle" font-size="9" fill="#495057">mValues[i].init()</text>

  <!-- Step 8: notifyStartListeners -->
  <text x="8" y="308" font-size="9" fill="#868e96">8</text>
  <line x1="80" y1="302" x2="660" y2="302" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="370" y="298" text-anchor="middle" font-size="9" fill="#495057">notifyStartListeners(mReversing)</text>

  <!-- Separator -->
  <line x1="15" y1="325" x2="700" y2="325" stroke="#ced4da" stroke-dasharray="6,3"/>
  <text x="360" y="339" text-anchor="middle" font-size="8.5" fill="#868e96">设置起始进度</text>

  <!-- Step 9: setCurrentPlayTime -->
  <text x="8" y="365" font-size="9" fill="#868e96">9</text>
  <rect x="55" y="353" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="365" text-anchor="middle" font-size="8.5" fill="#495057">setCurrentPlayTime(0)</text>

  <!-- Step 10: setCurrentFraction -->
  <text x="8" y="393" font-size="9" fill="#868e96">10</text>
  <rect x="55" y="381" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="393" text-anchor="middle" font-size="8.5" fill="#495057">setCurrentFraction(0)</text>

  <!-- Step 11: animateValue -->
  <text x="8" y="423" font-size="9" fill="#868e96">11</text>
  <rect x="55" y="411" width="50" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="80" y="423" text-anchor="middle" font-size="8.5" fill="#c0392b">animateValue(0)</text>

  <!-- Step 12: calculateValue -->
  <text x="8" y="453" font-size="9" fill="#868e96">12</text>
  <line x1="80" y1="447" x2="510" y2="447" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="295" y="443" text-anchor="middle" font-size="9" fill="#495057">mValues[i].calculateValue(fraction)</text>

  <!-- Step 13: onAnimationUpdate -->
  <text x="8" y="483" font-size="9" fill="#868e96">13</text>
  <rect x="55" y="471" width="50" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="80" y="483" text-anchor="middle" font-size="8.5" fill="#495057">onAnimationUpdate()</text>
</svg>
