<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="120" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="80" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ValueAnimator</text>
  <line x1="80" y1="38" x2="80" y2="410" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="195" y="10" width="150" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="270" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">PropertyValuesHolder</text>
  <line x1="270" y1="38" x2="270" y2="410" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="400" y="10" width="180" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="490" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">FloatPropertyValuesHolder</text>
  <line x1="490" y1="38" x2="490" y2="410" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <rect x="635" y="10" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="685" y="29" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">KeyframeSet</text>
  <line x1="685" y1="38" x2="685" y2="410" stroke="#adb5bd" stroke-dasharray="4,3"/>

  <!-- Step 1: ofFloat -->
  <text x="15" y="68" font-size="9" fill="#868e96">1</text>
  <text x="90" y="68" font-size="9.5" fill="#495057">ofFloat(values)</text>
  <line x1="80" y1="72" x2="80" y2="82" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: setFloatValues -->
  <text x="15" y="96" font-size="9" fill="#868e96">2</text>
  <text x="90" y="96" font-size="9.5" fill="#495057">setFloatValues(values)</text>
  <line x1="80" y1="100" x2="80" y2="110" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: PropertyValuesHolder.ofFloat -->
  <text x="15" y="126" font-size="9" fill="#868e96">3</text>
  <line x1="80" y1="120" x2="265" y2="120" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="160" y="116" text-anchor="middle" font-size="9" fill="#495057">ofFloat("", values)</text>

  <!-- Step 4: new FloatPropertyValuesHolder -->
  <text x="15" y="156" font-size="9" fill="#868e96">4</text>
  <line x1="270" y1="150" x2="485" y2="150" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="380" y="146" text-anchor="middle" font-size="9" fill="#495057">new FloatPropertyValuesHolder(name, values)</text>

  <!-- Step 5: setFloatValues in FPVH -->
  <text x="15" y="186" font-size="9" fill="#868e96">5</text>
  <line x1="490" y1="180" x2="490" y2="190" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="500" y="186" font-size="9" fill="#495057">setFloatValues(values)</text>

  <!-- Step 6: super.setFloatValues -->
  <text x="15" y="216" font-size="9" fill="#868e96">6</text>
  <line x1="490" y1="210" x2="275" y2="210" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="380" y="206" text-anchor="middle" font-size="9" fill="#495057">super.setFloatValues(values)</text>

  <!-- Step 7: KeyframeSet.ofFloat -->
  <text x="15" y="246" font-size="9" fill="#868e96">7</text>
  <line x1="270" y1="240" x2="680" y2="240" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="475" y="236" text-anchor="middle" font-size="9" fill="#495057">KeyframeSet.ofFloat(values)</text>

  <!-- Step 8: create keyframes -->
  <text x="15" y="276" font-size="9" fill="#868e96">8</text>
  <line x1="685" y1="270" x2="685" y2="280" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="695" y="276" font-size="9" fill="#495057">Keyframe.ofFloat(fraction, value) x N</text>

  <!-- Step 9: return FloatKeyframeSet -->
  <text x="15" y="306" font-size="9" fill="#868e96">9</text>
  <line x1="685" y1="300" x2="275" y2="300" stroke="#868e96" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="480" y="296" text-anchor="middle" font-size="9" fill="#868e96">return new FloatKeyframeSet(keyframes)</text>

  <!-- Step 10: return to ValueAnimator -->
  <text x="15" y="336" font-size="9" fill="#868e96">10</text>
  <line x1="270" y1="330" x2="85" y2="330" stroke="#868e96" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="175" y="326" text-anchor="middle" font-size="9" fill="#868e96">return FloatPropertyValuesHolder</text>

  <!-- Step 11: setValues -->
  <text x="15" y="366" font-size="9" fill="#868e96">11</text>
  <text x="90" y="366" font-size="9.5" fill="#495057">setValues(pvh)</text>
  <text x="90" y="380" font-size="8.5" fill="#868e96">mValues = values; mValuesMap.put(...)</text>
</svg>
