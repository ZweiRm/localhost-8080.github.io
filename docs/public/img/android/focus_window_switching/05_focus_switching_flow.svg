<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520">
  <defs>
    <marker id="arrow5" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Swimlane headers -->
  <rect x="0" y="0" width="195" height="30" rx="0" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="97" y="20" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">WMS (system_server)</text>

  <rect x="195" y="0" width="195" height="30" rx="0" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="292" y="20" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">SurfaceFlinger</text>

  <rect x="390" y="0" width="195" height="30" rx="0" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="487" y="20" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">InputDispatcher</text>

  <rect x="585" y="0" width="195" height="30" rx="0" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="682" y="20" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">关键日志</text>

  <!-- Vertical dividers -->
  <line x1="195" y1="30" x2="195" y2="520" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="390" y1="30" x2="390" y2="520" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="585" y1="30" x2="585" y2="520" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Step 1: WMS finds focus -->
  <rect x="15" y="50" width="165" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="97" y="65" font-size="9" fill="#495057" text-anchor="middle">updateFocusedWindowLocked</text>
  <text x="97" y="77" font-size="8" fill="#868e96" text-anchor="middle">遍历 canReceiveKeys()</text>

  <!-- Step 2: requestFocus -->
  <rect x="15" y="100" width="165" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="97" y="115" font-size="9" fill="#495057" text-anchor="middle">InputMonitor.requestFocus()</text>
  <text x="97" y="127" font-size="8" fill="#868e96" text-anchor="middle">setFocusedWindow 写入 Transaction</text>

  <line x1="97" y1="85" x2="97" y2="98" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Log: Focus request -->
  <rect x="600" y="100" width="165" height="25" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="682" y="117" font-size="8" fill="#495057" text-anchor="middle">Focus request [窗口名]</text>
  <line x1="180" y1="117" x2="598" y2="117" stroke="#868e96" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- Step 3: Transaction.apply -->
  <rect x="15" y="150" width="165" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="97" y="170" font-size="9" fill="#495057" text-anchor="middle">Transaction.apply()</text>
  <line x1="97" y1="135" x2="97" y2="148" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Arrow to SF -->
  <line x1="180" y1="165" x2="208" y2="165" stroke="#555" stroke-width="1.2" marker-end="url(#arrow5)"/>

  <!-- Step 4: SF receives -->
  <rect x="210" y="150" width="165" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="292" y="165" font-size="9" fill="#495057" text-anchor="middle">setTransactionState</text>
  <text x="292" y="177" font-size="8" fill="#868e96" text-anchor="middle">addInputWindowCommands</text>

  <!-- Step 5: SF updateInputFlinger -->
  <rect x="210" y="210" width="165" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="292" y="225" font-size="9" fill="#495057" text-anchor="middle">updateInputFlinger()</text>
  <text x="292" y="237" font-size="8" fill="#868e96" text-anchor="middle">buildWindowInfos + focusRequests</text>
  <line x1="292" y1="185" x2="292" y2="208" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Arrow to Input -->
  <line x1="375" y1="227" x2="405" y2="290" stroke="#555" stroke-width="1.2" marker-end="url(#arrow5)"/>

  <!-- Step 6: Input setFocusedWindow -->
  <rect x="405" y="280" width="165" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="487" y="295" font-size="9" fill="#495057" text-anchor="middle">setFocusedWindow()</text>
  <text x="487" y="307" font-size="8" fill="#868e96" text-anchor="middle">FocusResolver 解析</text>

  <!-- FocusResolver 解析（AOSP 不产生 event log） -->

  <!-- Step 7: isTokenFocusable -->
  <rect x="405" y="330" width="165" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="487" y="345" font-size="9" fill="#495057" text-anchor="middle">isTokenFocusable()</text>
  <text x="487" y="357" font-size="8" fill="#868e96" text-anchor="middle">检查：存在 + 可见 + 可聚焦</text>
  <line x1="487" y1="315" x2="487" y2="328" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Decision -->
  <path d="M 487 380 L 547 405 L 487 430 L 427 405 Z" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="487" y="409" font-size="9" fill="#495057" text-anchor="middle">OK?</text>
  <line x1="487" y1="365" x2="487" y2="378" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Yes: Focus entering -->
  <rect x="405" y="445" width="165" height="35" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="487" y="460" font-size="9" fill="#2e7d32" text-anchor="middle">onFocusChangedLocked()</text>
  <text x="487" y="472" font-size="8" fill="#868e96" text-anchor="middle">dispatchFocusLocked</text>
  <line x1="487" y1="430" x2="487" y2="443" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="497" y="440" font-size="8" fill="#2e7d32">OK</text>

  <!-- Log: Focus entering -->
  <rect x="600" y="445" width="165" height="25" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="682" y="462" font-size="8" fill="#2e7d32" text-anchor="middle">Focus entering [窗口名]</text>
  <line x1="570" y1="462" x2="598" y2="462" stroke="#2e7d32" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- No: waiting -->
  <rect x="210" y="390" width="165" height="35" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="292" y="405" font-size="9" fill="#c0392b" text-anchor="middle">等待焦点窗口</text>
  <text x="292" y="417" font-size="8" fill="#868e96" text-anchor="middle">NOT_VISIBLE / NO_WINDOW</text>
  <line x1="427" y1="405" x2="377" y2="405" stroke="#e07070" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="405" y="397" font-size="8" fill="#c0392b">失败</text>

  <!-- Failure log -->
  <rect x="600" y="390" width="165" height="25" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="682" y="407" font-size="8" fill="#c0392b" text-anchor="middle">NOT_VISIBLE → 等待窗口可见</text>
  <line x1="375" y1="407" x2="598" y2="407" stroke="#e07070" stroke-width="0.6" stroke-dasharray="3,2"/>
</svg>