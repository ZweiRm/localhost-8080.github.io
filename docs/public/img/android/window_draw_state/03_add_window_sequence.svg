<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 380" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="10" y="10" width="130" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="75" y="29" font-size="9.5" font-weight="600" fill="#343a40" text-anchor="middle">ActivityThread</text>

  <rect x="180" y="10" width="145" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="252" y="29" font-size="9.5" font-weight="600" fill="#343a40" text-anchor="middle">WindowManagerImpl</text>

  <rect x="370" y="10" width="120" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="430" y="29" font-size="9.5" font-weight="600" fill="#343a40" text-anchor="middle">ViewRootImpl</text>

  <rect x="540" y="10" width="130" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="605" y="29" font-size="9.5" font-weight="600" fill="#343a40" text-anchor="middle">IWindowSession</text>

  <rect x="720" y="10" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="770" y="29" font-size="9.5" font-weight="600" fill="#343a40" text-anchor="middle">WMS</text>

  <rect x="870" y="10" width="160" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="950" y="29" font-size="9.5" font-weight="600" fill="#343a40" text-anchor="middle">WindowStateAnimator</text>

  <!-- Lifelines -->
  <line x1="75" y1="38" x2="75" y2="370" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="252" y1="38" x2="252" y2="370" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="430" y1="38" x2="430" y2="370" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="605" y1="38" x2="605" y2="370" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="770" y1="38" x2="770" y2="370" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="950" y1="38" x2="950" y2="370" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Process boundary -->
  <rect x="415" y="175" width="205" height="22" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="517" y="190" font-size="8.5" fill="#868e96" text-anchor="middle">app 进程 → system_server 进程</text>

  <!-- 1. handleResumeActivity -->
  <line x1="75" y1="65" x2="252" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="163" y="60" font-size="9" fill="#495057" text-anchor="middle">1 handleResumeActivity</text>

  <!-- 2. addView -->
  <line x1="252" y1="90" x2="430" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="341" y="85" font-size="9" fill="#495057" text-anchor="middle">2 addView</text>

  <!-- 3. setView -->
  <line x1="430" y1="115" x2="432" y2="125" stroke="#555" stroke-width="1"/>
  <line x1="432" y1="125" x2="428" y2="125" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <text x="436" y="120" font-size="9" fill="#495057">3 setView</text>

  <!-- 4. requestLayout (self) -->
  <line x1="430" y1="140" x2="432" y2="150" stroke="#555" stroke-width="1"/>
  <line x1="432" y1="150" x2="428" y2="150" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <text x="436" y="145" font-size="9" fill="#495057">4 requestLayout</text>

  <!-- 5. addToDisplayAsUser -->
  <line x1="430" y1="205" x2="605" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="517" y="218" font-size="9" fill="#495057" text-anchor="middle">5 addToDisplayAsUser</text>

  <!-- 6. addWindow -->
  <line x1="605" y1="240" x2="770" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="687" y="235" font-size="9" fill="#495057" text-anchor="middle">6 addWindow</text>

  <!-- 7. new WindowState → new WindowStateAnimator -->
  <line x1="770" y1="265" x2="950" y2="265" stroke="#555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="860" y="260" font-size="9" fill="#495057" text-anchor="middle">7 new WindowState → init</text>

  <!-- 8. mDrawState = NO_SURFACE (default) -->
  <rect x="870" y="285" width="160" height="24" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="950" y="301" font-size="9.5" font-weight="600" fill="#c0392b" text-anchor="middle">mDrawState = NO_SURFACE</text>
</svg>
