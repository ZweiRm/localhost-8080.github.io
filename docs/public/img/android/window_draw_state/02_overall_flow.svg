<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- ViewRootImpl 泳道 -->
  <rect x="20" y="30" width="280" height="450" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="160" y="52" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">ViewRootImpl (App 进程)</text>

  <!-- IWindowSession 泳道 -->
  <rect x="320" y="30" width="160" height="450" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="400" y="52" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">IWindowSession</text>

  <!-- WMS 泳道 -->
  <rect x="500" y="30" width="180" height="450" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="590" y="52" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">WMS</text>

  <!-- WindowStateAnimator 泳道 -->
  <rect x="700" y="30" width="380" height="450" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="890" y="52" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">WindowStateAnimator</text>

  <!-- Start -->
  <circle cx="30" cy="90" r="10" fill="#343a40"/>
  <text x="50" y="88" font-size="9.5" fill="#495057">Resume</text>
  <line x1="65" y1="90" x2="90" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- setView -->
  <rect x="90" y="75" width="120" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="150" y="95" font-size="10" fill="#495057" text-anchor="middle">setView</text>

  <!-- setView → addToDisplayAsUser -->
  <line x1="210" y1="90" x2="330" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="270" y="82" font-size="8" fill="#c0392b">2</text>

  <!-- addToDisplayAsUser -->
  <rect x="330" y="75" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="95" font-size="9.5" fill="#495057" text-anchor="middle">addToDisplayAsUser</text>

  <!-- addToDisplayAsUser → addWindow -->
  <line x1="470" y1="90" x2="510" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- addWindow -->
  <rect x="510" y="75" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="580" y="95" font-size="10" fill="#495057" text-anchor="middle">addWindow</text>

  <!-- addWindow → NO_SURFACE -->
  <line x1="650" y1="90" x2="770" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NO_SURFACE -->
  <rect x="770" y="70" width="160" height="40" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1.5"/>
  <text x="850" y="95" font-size="11" font-weight="600" fill="#c0392b" text-anchor="middle">NO_SURFACE</text>

  <!-- requestLayout note -->
  <rect x="40" y="120" width="180" height="50" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="130" y="138" font-size="9" fill="#c0392b" text-anchor="middle">requestLayout →</text>
  <text x="130" y="150" font-size="9" fill="#c0392b" text-anchor="middle">scheduleTraversals →</text>
  <text x="130" y="162" font-size="9" fill="#c0392b" text-anchor="middle">performTraversals</text>

  <!-- setView → relayoutWindow (1) -->
  <line x1="150" y1="105" x2="150" y2="195" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="156" y="120" font-size="8" fill="#c0392b">1</text>

  <!-- relayoutWindow (app) -->
  <rect x="90" y="195" width="120" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="150" y="215" font-size="10" fill="#495057" text-anchor="middle">relayoutWindow</text>

  <!-- relayoutWindow → relayout -->
  <line x1="210" y1="210" x2="330" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- relayout -->
  <rect x="330" y="195" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="215" font-size="10" fill="#495057" text-anchor="middle">relayout</text>

  <!-- relayout → relayoutWindow (server) -->
  <line x1="470" y1="210" x2="510" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- relayoutWindow (server) -->
  <rect x="510" y="195" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="580" y="215" font-size="10" fill="#495057" text-anchor="middle">relayoutWindow</text>

  <!-- relayoutWindow → createSurfaceLocked -->
  <line x1="650" y1="210" x2="770" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="700" y="188" font-size="8.5" fill="#868e96">createSurfaceLocked</text>

  <!-- DRAW_PENDING -->
  <rect x="770" y="160" width="160" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="850" y="185" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">DRAW_PENDING</text>

  <!-- reportDrawFinished (app) -->
  <rect x="90" y="300" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="320" font-size="9.5" fill="#495057" text-anchor="middle">reportDrawFinished</text>

  <!-- Sync note -->
  <rect x="40" y="250" width="180" height="40" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="130" y="266" font-size="9" fill="#c0392b" text-anchor="middle">createSyncIfNeeded →</text>
  <text x="130" y="278" font-size="9" fill="#c0392b" text-anchor="middle">markSyncReady →</text>

  <!-- reportDrawFinished → finishDrawing -->
  <line x1="230" y1="315" x2="330" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- finishDrawing (session) -->
  <rect x="330" y="300" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="320" font-size="10" fill="#495057" text-anchor="middle">finishDrawing</text>

  <!-- finishDrawing → finishDrawingWindow -->
  <line x1="470" y1="315" x2="510" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- finishDrawingWindow -->
  <rect x="510" y="300" width="160" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="590" y="320" font-size="9.5" fill="#495057" text-anchor="middle">finishDrawingWindow</text>

  <!-- finishDrawingWindow → COMMIT_DRAW_PENDING -->
  <line x1="670" y1="315" x2="770" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="710" y="290" font-size="8.5" fill="#868e96">finishDrawingLocked</text>

  <!-- COMMIT_DRAW_PENDING -->
  <rect x="770" y="255" width="200" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="870" y="277" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">COMMIT_DRAW_PENDING</text>

  <!-- performSurfacePlacement -->
  <line x1="870" y1="295" x2="870" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="876" y="325" font-size="8.5" fill="#868e96">performSurfacePlacement</text>

  <!-- READY_TO_SHOW -->
  <rect x="770" y="345" width="200" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="870" y="370" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">READY_TO_SHOW</text>

  <!-- performShowLocked -->
  <line x1="870" y1="385" x2="870" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="876" y="415" font-size="8.5" fill="#868e96">performShowLocked</text>

  <!-- HAS_DRAWN -->
  <rect x="790" y="435" width="160" height="40" rx="8" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="870" y="460" font-size="11" font-weight="600" fill="#2e7d32" text-anchor="middle">HAS_DRAWN</text>
</svg>
