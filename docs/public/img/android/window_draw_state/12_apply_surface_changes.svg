<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a12" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="220" y="10" width="350" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="395" y="30" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">DC#applySurfaceChangesTransaction</text>

  <!-- Level 1: performLayout -->
  <line x1="395" y1="40" x2="395" y2="55" stroke="#555" stroke-width="1.5"/>
  <rect x="310" y="55" width="170" height="26" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="395" y="72" font-size="9.5" fill="#343a40" text-anchor="middle">performLayout</text>

  <!-- performLayout children -->
  <line x1="480" y1="68" x2="530" y2="68" stroke="#555" stroke-width="1"/>
  <rect x="530" y="55" width="200" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="630" y="72" font-size="8.5" fill="#495057" text-anchor="middle">DisplayPolicy#beginLayoutLw</text>

  <line x1="480" y1="68" x2="530" y2="93" stroke="#555" stroke-width="1"/>
  <rect x="530" y="83" width="200" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="630" y="100" font-size="8.5" fill="#495057" text-anchor="middle">mPerformLayout (窗口大小计算)</text>

  <line x1="730" y1="96" x2="760" y2="96" stroke="#555" stroke-width="1"/>
  <rect x="760" y="83" width="130" height="26" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="825" y="100" font-size="8" fill="#868e96" text-anchor="middle">layoutWindowLw</text>

  <!-- mPerformLayoutAttached -->
  <line x1="480" y1="68" x2="530" y2="118" stroke="#555" stroke-width="1"/>
  <rect x="530" y="111" width="230" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="645" y="128" font-size="8.5" fill="#495057" text-anchor="middle">mPerformLayoutAttached (子窗口 layout)</text>

  <!-- Level 2: mApplyPostLayoutPolicy -->
  <line x1="395" y1="81" x2="395" y2="155" stroke="#555" stroke-width="1.5"/>
  <rect x="285" y="155" width="220" height="26" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="395" y="172" font-size="9.5" fill="#343a40" text-anchor="middle">mApplyPostLayoutPolicy</text>

  <line x1="505" y1="168" x2="530" y2="168" stroke="#555" stroke-width="1"/>
  <rect x="530" y="155" width="280" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="670" y="172" font-size="8.5" fill="#495057" text-anchor="middle">DisplayPolicy#beginPostLayoutPolicyLw / finishPostLayoutPolicyLw</text>

  <!-- Level 3: mApplySurfaceChangesTransaction -->
  <line x1="395" y1="181" x2="395" y2="205" stroke="#555" stroke-width="1.5"/>
  <rect x="255" y="205" width="280" height="30" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1.5"/>
  <text x="395" y="224" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">mApplySurfaceChangesTransaction</text>

  <!-- mApplySurfaceChangesTransaction children -->
  <line x1="535" y1="220" x2="560" y2="248" stroke="#555" stroke-width="1"/>
  <rect x="560" y="240" width="280" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="700" y="257" font-size="8.5" fill="#495057" text-anchor="middle">设置 WindowState#mObscured 属性值</text>

  <line x1="535" y1="220" x2="560" y2="278" stroke="#555" stroke-width="1"/>
  <rect x="560" y="270" width="300" height="38" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="710" y="286" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">WindowStateAnimator#commitFinishDrawingLocked</text>
  <text x="710" y="300" font-size="8" fill="#868e96" text-anchor="middle">→ READY_TO_SHOW 的转变</text>

  <!-- Level 4: prepareSurfaces -->
  <line x1="395" y1="235" x2="395" y2="330" stroke="#555" stroke-width="1.5"/>
  <rect x="305" y="330" width="180" height="26" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="395" y="347" font-size="9.5" fill="#343a40" text-anchor="middle">prepareSurfaces</text>

  <!-- prepareSurfaces children -->
  <line x1="485" y1="343" x2="530" y2="370" stroke="#555" stroke-width="1"/>
  <rect x="530" y="360" width="290" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="675" y="377" font-size="8.5" fill="#495057" text-anchor="middle">DisplayContent#prepareSurfaces: 合并 mPendingTransaction</text>

  <line x1="485" y1="343" x2="530" y2="400" stroke="#555" stroke-width="1"/>
  <rect x="530" y="390" width="290" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="675" y="407" font-size="8.5" fill="#495057" text-anchor="middle">ActivityRecord#prepareSurfaces: show/hide SurfaceControl</text>

  <line x1="485" y1="343" x2="530" y2="430" stroke="#555" stroke-width="1"/>
  <rect x="530" y="420" width="200" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="630" y="437" font-size="8.5" fill="#495057" text-anchor="middle">WindowState#prepareSurfaces</text>

  <!-- WindowState#prepareSurfaces children -->
  <line x1="730" y1="433" x2="740" y2="460" stroke="#555" stroke-width="1"/>
  <rect x="580" y="455" width="280" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="720" y="472" font-size="8.5" fill="#495057" text-anchor="middle">WindowState#updateSurfacePosition (setPosition)</text>

  <line x1="730" y1="433" x2="740" y2="495" stroke="#555" stroke-width="1"/>
  <rect x="560" y="488" width="300" height="26" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="710" y="505" font-size="8.5" fill="#495057" text-anchor="middle">WindowStateAnimator#prepareSurfaceLocked</text>

  <!-- prepareSurfaceLocked children -->
  <line x1="710" y1="514" x2="710" y2="530" stroke="#555" stroke-width="1"/>

  <rect x="40" y="530" width="200" height="24" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="140" y="546" font-size="8.5" fill="#868e96" text-anchor="middle">computeShownFrameLocked</text>
  <line x1="710" y1="530" x2="240" y2="542" stroke="#555" stroke-width="1"/>

  <rect x="260" y="530" width="240" height="24" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="380" y="546" font-size="8.5" fill="#868e96" text-anchor="middle">prepareToShowInTransaction (alpha, Matrix)</text>
  <line x1="710" y1="530" x2="500" y2="542" stroke="#555" stroke-width="1"/>

  <rect x="520" y="530" width="200" height="24" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="620" y="546" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">showRobustly</text>
  <line x1="710" y1="530" x2="720" y2="542" stroke="#555" stroke-width="1"/>

  <text x="620" y="565" font-size="8" fill="#868e96" text-anchor="middle">对 Surface 进行显示或隐藏</text>

  <!-- WMS Transaction markers -->
  <rect x="20" y="195" width="170" height="26" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="105" y="212" font-size="8.5" fill="#868e96" text-anchor="middle">WMS#openSurfaceTransaction</text>
  <line x1="190" y1="208" x2="255" y2="220" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="20" y="315" width="170" height="26" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="105" y="332" font-size="8.5" fill="#868e96" text-anchor="middle">WMS#closeSurfaceTransaction</text>
</svg>
