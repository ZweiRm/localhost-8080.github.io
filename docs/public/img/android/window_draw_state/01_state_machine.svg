<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- NO_SURFACE -->
  <circle cx="40" cy="160" r="12" fill="#343a40"/>
  <line x1="52" y1="160" x2="100" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="76" y="152" font-size="9" fill="#868e96" text-anchor="middle">添加窗口</text>

  <rect x="100" y="130" width="140" height="60" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1.5"/>
  <text x="170" y="165" font-size="12" font-weight="600" fill="#c0392b" text-anchor="middle">NO_SURFACE</text>

  <!-- Arrow to DRAW_PENDING -->
  <line x1="240" y1="160" x2="320" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="148" font-size="9" fill="#868e96" text-anchor="middle">创建 Surface</text>

  <!-- DRAW_PENDING -->
  <rect x="320" y="130" width="140" height="60" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="390" y="165" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">DRAW_PENDING</text>

  <!-- Arrow to COMMIT_DRAW_PENDING -->
  <line x1="460" y1="160" x2="540" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="110" font-size="8.5" fill="#868e96" text-anchor="end">窗口第一次完成绘制</text>
  <text x="530" y="122" font-size="8.5" fill="#868e96" text-anchor="end">等待布局系统提交</text>

  <!-- COMMIT_DRAW_PENDING -->
  <rect x="540" y="50" width="180" height="60" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="630" y="77" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">COMMIT_DRAW_</text>
  <text x="630" y="93" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">PENDING</text>

  <!-- Arrow to READY_TO_SHOW -->
  <line x1="720" y1="80" x2="780" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="110" font-size="8.5" fill="#868e96" text-anchor="start">窗口绘制已提交</text>
  <text x="780" y="122" font-size="8.5" fill="#868e96" text-anchor="start">等待同一 WindowToken</text>
  <text x="780" y="134" font-size="8.5" fill="#868e96" text-anchor="start">绘制完成后一起 show</text>

  <!-- READY_TO_SHOW -->
  <rect x="700" y="150" width="160" height="60" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="780" y="185" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">READY_TO_SHOW</text>

  <!-- Arrow to HAS_DRAWN -->
  <line x1="780" y1="210" x2="580" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="248" font-size="9" fill="#868e96" text-anchor="middle">窗口首次显示在屏幕上</text>

  <!-- HAS_DRAWN -->
  <rect x="440" y="245" width="140" height="60" rx="8" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="510" y="280" font-size="12" font-weight="600" fill="#2e7d32" text-anchor="middle">HAS_DRAWN</text>

  <!-- Arrow from HAS_DRAWN back to NO_SURFACE -->
  <line x1="440" y1="275" x2="170" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="290" y="248" font-size="9" fill="#868e96" text-anchor="middle">destroySurface</text>
</svg>
