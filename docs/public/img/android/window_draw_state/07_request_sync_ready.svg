<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a7" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Participants (app side) -->
  <rect x="10" y="10" width="110" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="65" y="29" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">ViewRootImpl</text>

  <rect x="160" y="10" width="140" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="230" y="29" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">SurfaceSyncGroup</text>

  <rect x="340" y="10" width="150" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="415" y="29" font-size="8" font-weight="600" fill="#343a40" text-anchor="middle">TransactionReadyConsumer</text>

  <rect x="520" y="10" width="90" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="565" y="29" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">Session</text>

  <!-- Participants (server side) -->
  <rect x="650" y="10" width="80" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="690" y="29" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">WMS</text>

  <rect x="760" y="10" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="810" y="29" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">WindowState</text>

  <rect x="890" y="10" width="50" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="915" y="29" font-size="7.5" font-weight="600" fill="#343a40" text-anchor="middle">WSA</text>

  <!-- Lifelines -->
  <line x1="65" y1="38" x2="65" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="38" x2="230" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="38" x2="415" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="565" y1="38" x2="565" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="690" y1="38" x2="690" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="810" y1="38" x2="810" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="915" y1="38" x2="915" y2="350" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- performTraversals (self) -->
  <line x1="65" y1="65" x2="67" y2="80" stroke="#555" stroke-width="1"/>
  <text x="71" y="75" font-size="9" fill="#495057">performTraversals</text>

  <!-- Note: mWmsRequestSyncGroup ready -->
  <rect x="5" y="88" width="225" height="22" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="117" y="103" font-size="8.5" fill="#868e96" text-anchor="middle">mWmsRequestSyncGroup ready</text>

  <!-- markSyncReady -->
  <line x1="65" y1="120" x2="230" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="147" y="115" font-size="9" fill="#495057" text-anchor="middle">markSyncReady</text>

  <!-- checkIfSyncIsComplete -->
  <line x1="230" y1="145" x2="232" y2="160" stroke="#555" stroke-width="1"/>
  <text x="236" y="155" font-size="9" fill="#495057">checkIfSyncIsComplete</text>

  <!-- accept -->
  <line x1="230" y1="175" x2="415" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="322" y="170" font-size="9" fill="#495057" text-anchor="middle">accept</text>

  <!-- reportDrawFinished (callback) -->
  <line x1="415" y1="200" x2="65" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="240" y="195" font-size="9" fill="#495057" text-anchor="middle">reportDrawFinished</text>

  <!-- Process boundary -->
  <rect x="445" y="215" width="205" height="22" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="547" y="230" font-size="8.5" fill="#868e96" text-anchor="middle">app 进程 → system_server 进程</text>

  <!-- finishDrawing (IPC) -->
  <line x1="65" y1="250" x2="565" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="315" y="245" font-size="9" fill="#495057" text-anchor="middle">finishDrawing</text>

  <!-- finishDrawingWindow -->
  <line x1="565" y1="275" x2="690" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="627" y="270" font-size="9" fill="#495057" text-anchor="middle">finishDrawingWindow</text>

  <!-- finishDrawing (WindowState) -->
  <line x1="690" y1="300" x2="810" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="750" y="295" font-size="9" fill="#495057" text-anchor="middle">finishDrawing</text>

  <!-- finishDrawingLocked -->
  <line x1="810" y1="325" x2="915" y2="325" stroke="#555" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="862" y="320" font-size="8.5" fill="#495057" text-anchor="middle">finishDrawingLocked</text>

  <!-- State annotation -->
  <rect x="860" y="340" width="90" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.5"/>
  <text x="905" y="352" font-size="7.5" font-weight="600" fill="#c0392b" text-anchor="middle">→ COMMIT_DRAW</text>
</svg>
