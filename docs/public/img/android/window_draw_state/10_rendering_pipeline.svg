<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a10" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- VSync label -->
  <text x="20" y="30" font-size="12" font-weight="600" fill="#343a40">Choreographer</text>
  <text x="20" y="48" font-size="12" font-weight="600" fill="#343a40">VSync</text>

  <!-- Arrow from VSync to UI Thread -->
  <line x1="120" y1="38" x2="175" y2="38" stroke="#555" stroke-width="1.5" marker-end="url(#a10)"/>

  <!-- UI Thread column -->
  <rect x="175" y="10" width="170" height="270" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="260" y="30" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">UI Thread</text>

  <rect x="195" y="45" width="130" height="28" rx="3" fill="#4a7fb5" stroke="none"/>
  <text x="260" y="64" font-size="10" fill="white" text-anchor="middle">input / 输入处理</text>

  <rect x="195" y="80" width="130" height="28" rx="3" fill="#4a7fb5" stroke="none"/>
  <text x="260" y="99" font-size="10" fill="white" text-anchor="middle">Animation / 动画</text>

  <rect x="195" y="115" width="130" height="28" rx="3" fill="#4a7fb5" stroke="none"/>
  <text x="260" y="134" font-size="10" fill="white" text-anchor="middle">measure / 测量</text>

  <rect x="195" y="150" width="130" height="28" rx="3" fill="#4a7fb5" stroke="none"/>
  <text x="260" y="169" font-size="10" fill="white" text-anchor="middle">layout / 布局</text>

  <rect x="195" y="185" width="130" height="28" rx="3" fill="#4a7fb5" stroke="none"/>
  <text x="260" y="204" font-size="10" fill="white" text-anchor="middle">draw / 绘制</text>

  <rect x="195" y="220" width="130" height="28" rx="3" fill="#4a7fb5" stroke="none"/>
  <text x="260" y="239" font-size="10" fill="white" text-anchor="middle">sync / 同步</text>

  <text x="260" y="268" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">CPU</text>

  <!-- Arrow to RenderThread -->
  <line x1="345" y1="234" x2="395" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#a10)"/>

  <!-- RenderThread / GPU column -->
  <rect x="395" y="10" width="180" height="310" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="485" y="30" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">RenderThread</text>

  <rect x="415" y="45" width="140" height="28" rx="3" fill="#2e7d32" stroke="none"/>
  <text x="485" y="64" font-size="10" fill="white" text-anchor="middle">sync / 同步</text>

  <rect x="415" y="80" width="140" height="28" rx="3" fill="#2e7d32" stroke="none"/>
  <text x="485" y="99" font-size="10" fill="white" text-anchor="middle">execute / 执行</text>

  <rect x="415" y="120" width="140" height="28" rx="3" fill="#2e7d32" stroke="none"/>
  <text x="485" y="139" font-size="10" fill="white" text-anchor="middle">get buffer / 获取缓存区</text>

  <rect x="415" y="160" width="140" height="28" rx="3" fill="#2e7d32" stroke="none"/>
  <text x="485" y="179" font-size="10" fill="white" text-anchor="middle">issue / 命令</text>

  <rect x="415" y="200" width="140" height="28" rx="3" fill="#2e7d32" stroke="none"/>
  <text x="485" y="219" font-size="10" fill="white" text-anchor="middle">swap buffer / 交换缓冲区</text>

  <text x="485" y="258" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">GPU</text>

  <!-- SurfaceFlinger / HWC column -->
  <rect x="640" y="10" width="220" height="310" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="750" y="30" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">SurfaceFlinger / HWC</text>

  <rect x="670" y="120" width="160" height="28" rx="3" fill="#e07070" stroke="none"/>
  <text x="750" y="139" font-size="10" fill="white" text-anchor="middle">get buffer / 获取缓存区</text>

  <rect x="670" y="200" width="160" height="28" rx="3" fill="#e07070" stroke="none"/>
  <text x="750" y="219" font-size="10" fill="white" text-anchor="middle">swap buffer / 交换缓冲区</text>

  <rect x="670" y="260" width="160" height="28" rx="3" fill="#e07070" stroke="none"/>
  <text x="750" y="279" font-size="10" fill="white" text-anchor="middle">composite / 合成</text>

  <!-- Arrows between RenderThread and SF -->
  <line x1="555" y1="134" x2="670" y2="134" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="670" y1="134" x2="555" y2="134" stroke="#555" stroke-width="1" marker-end="url(#a10)"/>

  <line x1="555" y1="214" x2="670" y2="214" stroke="#555" stroke-width="1.5" marker-end="url(#a10)"/>

  <!-- 16.6ms annotation -->
  <text x="140" y="155" font-size="14" font-weight="600" fill="#c0392b">16.6ms</text>
  <line x1="140" y1="50" x2="140" y2="275" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Bottom VSync -->
  <text x="20" y="335" font-size="12" font-weight="600" fill="#343a40">Choreographer</text>
  <text x="20" y="353" font-size="12" font-weight="600" fill="#343a40">VSync</text>
  <line x1="120" y1="344" x2="860" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#a10)"/>
</svg>
