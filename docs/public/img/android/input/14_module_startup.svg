<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a14b" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="white"/>
    </marker>
    <marker id="a14d" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- system_server boundary -->
  <rect x="10" y="10" width="540" height="320" rx="4" fill="#4a90d9" stroke="#3a7bc0" stroke-width="1.5"/>
  <text x="25" y="30" font-size="11" font-weight="600" fill="white">system_server</text>

  <!-- Main thread bar (green) -->
  <rect x="40" y="50" width="55" height="260" rx="3" fill="#4caf50"/>
  <text x="67" y="185" text-anchor="middle" font-size="9" fill="white" transform="rotate(-90,67,185)">主线程</text>

  <!-- main() arrow -->
  <text x="115" y="180" font-size="9.5" fill="white">main()</text>
  <line x1="105" y1="176" x2="160" y2="176" stroke="white" stroke-width="1.2" marker-end="url(#a14b)"/>

  <!-- InputManagerService boundary -->
  <rect x="160" y="40" width="370" height="270" rx="4" fill="#2e7d32"/>
  <text x="175" y="60" font-size="10" font-weight="600" fill="white">InputManagerService</text>

  <!-- InputReader (orange) -->
  <rect x="185" y="75" width="320" height="105" rx="3" fill="#f57c00"/>
  <text x="200" y="95" font-size="10" font-weight="600" fill="white">InputReader</text>

  <!-- loopOnce loop inside InputReader -->
  <rect x="250" y="105" width="180" height="50" rx="3" fill="#4a90d9" stroke="#3a7bc0"/>
  <text x="340" y="135" text-anchor="middle" font-size="10" fill="white">loopOnce</text>
  <!-- Loop arrow -->
  <path d="M 440,120 Q 450,100 440,110" fill="none" stroke="white" stroke-width="1.2"/>
  <path d="M 430,105 L 443,110 Q 453,100 443,115 L 443,110" fill="none" stroke="white" stroke-width="1.2"/>
  <path d="M 435,130 C 460,130 460,110 435,110" fill="none" stroke="white" stroke-width="1.2" marker-end="url(#a14b)"/>

  <!-- InputDispatcher (orange) -->
  <rect x="185" y="195" width="320" height="100" rx="3" fill="#f57c00"/>
  <text x="200" y="215" font-size="10" font-weight="600" fill="white">InputDispatcher</text>

  <!-- dispatchOnce loop inside InputDispatcher -->
  <rect x="250" y="225" width="180" height="50" rx="3" fill="#4a90d9" stroke="#3a7bc0"/>
  <text x="340" y="255" text-anchor="middle" font-size="10" fill="white">dispatchOnce</text>
  <!-- Loop arrow -->
  <path d="M 435,250 C 460,250 460,230 435,230" fill="none" stroke="white" stroke-width="1.2" marker-end="url(#a14b)"/>
</svg>