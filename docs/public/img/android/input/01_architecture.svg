<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- /dev/input/event nodes -->
  <rect x="15" y="20" width="140" height="32" rx="3" fill="#4caf50" stroke="#388e3c"/>
  <text x="85" y="41" text-anchor="middle" font-size="10" fill="white">/dev/input/event0</text>

  <rect x="15" y="72" width="140" height="32" rx="3" fill="#4caf50" stroke="#388e3c"/>
  <text x="85" y="93" text-anchor="middle" font-size="10" fill="white">/dev/input/event1</text>

  <rect x="15" y="124" width="140" height="32" rx="3" fill="#4caf50" stroke="#388e3c"/>
  <text x="85" y="145" text-anchor="middle" font-size="10" fill="white">/dev/input/event2</text>

  <!-- Bracket from events -->
  <path d="M 155,36 L 170,36 L 170,88 M 155,88 L 170,88 M 155,140 L 170,140 L 170,88" fill="none" stroke="#555" stroke-width="1.2"/>
  <line x1="170" y1="88" x2="195" y2="88" stroke="#555" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- InputManagerService boundary -->
  <rect x="195" y="5" width="400" height="175" rx="4" fill="#4a90d9" stroke="#3a7bc0" stroke-width="1.5"/>
  <text x="395" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="white">InputManagerService</text>

  <!-- InputReader (contains EventHub) -->
  <rect x="210" y="35" width="170" height="130" rx="3" fill="#f57c00"/>
  <text x="295" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="white">InputReader</text>

  <!-- EventHub nested inside InputReader -->
  <rect x="235" y="65" width="120" height="50" rx="3" fill="#66bb6a" stroke="#4caf50"/>
  <text x="295" y="95" text-anchor="middle" font-size="10" fill="white">EventHub</text>

  <!-- InputDispatcher -->
  <rect x="410" y="35" width="170" height="130" rx="3" fill="#f57c00"/>
  <text x="495" y="95" text-anchor="middle" font-size="10" font-weight="600" fill="white">InputDispatcher</text>

  <!-- Arrow Reader -> Dispatcher -->
  <line x1="380" y1="88" x2="410" y2="88" stroke="white" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Bracket from IMS to apps -->
  <line x1="595" y1="88" x2="620" y2="88" stroke="#555" stroke-width="1.2"/>
  <path d="M 620,36 L 620,88 M 620,88 L 620,140 M 620,36 L 635,36 M 620,88 L 635,88 M 620,140 L 635,140" fill="none" stroke="#555" stroke-width="1.2"/>

  <!-- Apps -->
  <rect x="645" y="20" width="120" height="32" rx="3" fill="#4caf50" stroke="#388e3c"/>
  <text x="705" y="41" text-anchor="middle" font-size="10" fill="white">APP1</text>

  <rect x="645" y="72" width="120" height="32" rx="3" fill="#4caf50" stroke="#388e3c"/>
  <text x="705" y="93" text-anchor="middle" font-size="10" fill="white">APP2</text>

  <rect x="645" y="124" width="120" height="32" rx="3" fill="#4caf50" stroke="#388e3c"/>
  <text x="705" y="145" text-anchor="middle" font-size="10" fill="white">APP3</text>
</svg>