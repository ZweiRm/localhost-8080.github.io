<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <text x="300" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">MotionEvent action 字段结构 (32-bit int)</text>

  <!-- Bit layout -->
  <rect x="30" y="40" width="360" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="210" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#4a7fb5">高 24 位: Pointer Index</text>
  <text x="210" y="72" text-anchor="middle" font-size="8" fill="#868e96">bit 31 ... bit 8</text>

  <rect x="390" y="40" width="180" height="40" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="480" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#c0392b">低 8 位: Action</text>
  <text x="480" y="72" text-anchor="middle" font-size="8" fill="#868e96">bit 7 ... bit 0</text>

  <!-- Divider -->
  <line x1="390" y1="35" x2="390" y2="85" stroke="#343a40" stroke-width="1.5"/>

  <!-- Examples -->
  <text x="30" y="105" font-size="8.5" fill="#495057">示例: POINTER_DOWN 第 2 个指针 → action = (2 &lt;&lt; 8) | POINTER_DOWN = 0x00000205</text>
  <text x="30" y="122" font-size="8.5" fill="#495057">获取 action: getActionMasked() = action &amp; 0xFF     获取 index: getActionIndex() = (action &gt;&gt; 8) &amp; 0xFF</text>
  <text x="30" y="138" font-size="8" fill="#868e96">Split 时需要根据拆分后的指针重新计算 pointer index 并与 action 组合</text>
</svg>