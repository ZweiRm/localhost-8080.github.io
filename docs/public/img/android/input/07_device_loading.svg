<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a7" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <text x="310" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">设备加载流程</text>

  <!-- Step 1 -->
  <rect x="200" y="40" width="220" height="35" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="310" y="62" text-anchor="middle" font-size="9.5" fill="#495057">iNotify 监听 /dev/input 变化</text>
  <line x1="310" y1="75" x2="310" y2="95" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>

  <!-- Step 2 -->
  <rect x="200" y="95" width="220" height="35" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="310" y="117" text-anchor="middle" font-size="9.5" fill="#495057">Epoll epoll_wait 唤醒</text>
  <line x1="310" y1="130" x2="310" y2="150" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>

  <!-- Step 3 -->
  <rect x="180" y="150" width="260" height="50" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="310" y="170" text-anchor="middle" font-size="9.5" fill="#495057">openDeviceLocked(filename)</text>
  <text x="310" y="185" text-anchor="middle" font-size="8" fill="#868e96">open + ioctl 获取设备名称、ID 等信息</text>
  <line x1="310" y1="200" x2="310" y2="220" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>

  <!-- Step 4: Load configs -->
  <rect x="30" y="220" width="160" height="50" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="110" y="240" text-anchor="middle" font-size="9" fill="#495057">加载 idc 配置</text>
  <text x="110" y="255" text-anchor="middle" font-size="7.5" fill="#868e96">输入设备配置文件</text>

  <rect x="220" y="220" width="160" height="50" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="300" y="240" text-anchor="middle" font-size="9" fill="#495057">判断设备类型</text>
  <text x="300" y="255" text-anchor="middle" font-size="7.5" fill="#868e96">键盘/触摸屏/游戏手柄...</text>

  <rect x="410" y="220" width="180" height="50" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="500" y="240" text-anchor="middle" font-size="9" fill="#495057">加载 kl/kcm 配置</text>
  <text x="500" y="255" text-anchor="middle" font-size="7.5" fill="#868e96">按键布局/字符映射</text>

  <!-- Arrows to configs -->
  <line x1="250" y1="215" x2="190" y2="220" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>
  <line x1="310" y1="200" x2="310" y2="220" stroke="#555" stroke-width="1"/>
  <line x1="370" y1="215" x2="430" y2="220" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>

  <!-- Step 5: Two tasks -->
  <line x1="200" y1="270" x2="200" y2="295" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>
  <line x1="420" y1="270" x2="420" y2="295" stroke="#555" stroke-width="1" marker-end="url(#a7)"/>

  <rect x="80" y="295" width="240" height="45" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="200" y="313" text-anchor="middle" font-size="9" fill="#495057">epoll_ctl 添加设备 fd 到监听池</text>
  <text x="200" y="328" text-anchor="middle" font-size="8" fill="#868e96">后续可监听该设备的事件上报</text>

  <rect x="350" y="295" width="240" height="45" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="470" y="313" text-anchor="middle" font-size="9" fill="#495057">InputReader 创建 InputDevice</text>
  <text x="470" y="328" text-anchor="middle" font-size="8" fill="#868e96">为设备创建 InputMapper</text>

  <!-- Bottom note -->
  <rect x="120" y="360" width="380" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="310" y="380" text-anchor="middle" font-size="8.5" fill="#495057">InputMapper: KeyboardInputMapper / TouchInputMapper / CursorInputMapper / ...</text>
</svg>