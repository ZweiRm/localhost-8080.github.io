<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <!-- ContentProvider box (server side) -->
  <rect x="140" y="20" width="240" height="44" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1.5"/>
  <text x="260" y="47" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">ContentProvider</text>
  <text x="260" y="58" text-anchor="middle" font-size="9" fill="#868e96">Server Process</text>
  <!-- IPC arrows -->
  <line x1="170" y1="64" x2="80" y2="120" stroke="#555" stroke-width="1" marker-end="url(#arrow3)"/>
  <text x="110" y="86" font-size="9" fill="#868e96">IPC</text>
  <line x1="260" y1="64" x2="260" y2="120" stroke="#555" stroke-width="1" marker-end="url(#arrow3)"/>
  <text x="270" y="96" font-size="9" fill="#868e96">IPC</text>
  <line x1="350" y1="64" x2="440" y2="120" stroke="#555" stroke-width="1" marker-end="url(#arrow3)"/>
  <text x="405" y="86" font-size="9" fill="#868e96">IPC</text>
  <!-- Client boxes -->
  <rect x="10" y="122" width="140" height="44" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="80" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">IContentProvider</text>
  <text x="80" y="175" text-anchor="middle" font-size="10" fill="#868e96">Client</text>
  <rect x="190" y="122" width="140" height="44" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="260" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">IContentProvider</text>
  <text x="260" y="175" text-anchor="middle" font-size="10" fill="#868e96">Client</text>
  <rect x="370" y="122" width="140" height="44" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="440" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">IContentProvider</text>
  <text x="440" y="175" text-anchor="middle" font-size="10" fill="#868e96">Client</text>
  <!-- Note -->
  <text x="260" y="205" text-anchor="middle" font-size="9.5" fill="#495057">多个客户端通过 Binder 远程接口访问同一个 ContentProvider</text>
</svg>