<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <!-- AMS box -->
  <rect x="180" y="20" width="260" height="48" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="310" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">ActivityManagerService</text>
  <!-- Binder label -->
  <text x="310" y="88" text-anchor="middle" font-size="9" fill="#868e96">Binder IPC</text>
  <!-- Vertical line from AMS -->
  <line x1="310" y1="68" x2="310" y2="100" stroke="#555" stroke-width="1"/>
  <!-- Horizontal distribution line -->
  <line x1="70" y1="100" x2="560" y2="100" stroke="#555" stroke-width="1"/>
  <!-- Four vertical lines down -->
  <line x1="70" y1="100" x2="70" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="230" y1="100" x2="230" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="390" y1="100" x2="390" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="550" y1="100" x2="550" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow1)"/>
  <!-- Four component boxes -->
  <rect x="10" y="132" width="120" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="70" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">startActivity</text>
  <rect x="170" y="132" width="120" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="230" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">startService</text>
  <rect x="330" y="132" width="120" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="390" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">sendBroadcast</text>
  <rect x="480" y="132" width="140" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="550" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">ContentResolver</text>
  <text x="550" y="164" text-anchor="middle" font-size="9" fill="#868e96">insert/delete/update/query</text>
  <!-- Arrows down to APP Process -->
  <line x1="70" y1="172" x2="70" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="230" y1="172" x2="230" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="390" y1="172" x2="390" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="550" y1="172" x2="550" y2="200" stroke="#555" stroke-width="1"/>
  <!-- Merge line -->
  <line x1="70" y1="200" x2="550" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="200" x2="310" y2="225" stroke="#555" stroke-width="1" marker-end="url(#arrow1)"/>
  <!-- APP Process box -->
  <rect x="200" y="227" width="220" height="44" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="310" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">APP Process</text>
</svg>