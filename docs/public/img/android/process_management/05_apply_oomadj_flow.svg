<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 680" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <!-- Start -->
  <rect x="230" y="10" width="100" height="36" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="280" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">开始</text>
  <line x1="280" y1="46" x2="280" y2="66" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Sched group changed -->
  <rect x="190" y="68" width="180" height="40" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="280" y="92" text-anchor="middle" font-size="11" fill="#495057">调度组发生变化</text>
  <line x1="280" y1="108" x2="280" y2="128" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Diamond: should kill? -->
  <path d="M 280,130 L 340,160 L 280,190 L 220,160 Z" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="280" y="157" text-anchor="middle" font-size="10" fill="#495057">是否要</text>
  <text x="280" y="170" text-anchor="middle" font-size="10" fill="#495057">Kill</text>
  <line x1="280" y1="190" x2="280" y2="210" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Map sched group to process -->
  <rect x="180" y="212" width="200" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="280" y="236" text-anchor="middle" font-size="11" fill="#343a40">调度组映射进程</text>
  <line x1="280" y1="252" x2="280" y2="272" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Set process group -->
  <rect x="180" y="274" width="200" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="280" y="298" text-anchor="middle" font-size="11" fill="#343a40">设置进程组</text>
  <!-- Fork -->
  <line x1="280" y1="314" x2="280" y2="334" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="334" x2="420" y2="334" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="334" x2="140" y2="354" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="420" y1="334" x2="420" y2="354" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Left: bg to fg -->
  <rect x="50" y="356" width="180" height="40" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="140" y="380" text-anchor="middle" font-size="11" fill="#2e7d32">后台切换到前台</text>
  <line x1="140" y1="396" x2="140" y2="425" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Right: fg to bg -->
  <rect x="330" y="356" width="180" height="40" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="420" y="380" text-anchor="middle" font-size="11" fill="#c0392b">前台切换到后台</text>
  <line x1="420" y1="396" x2="420" y2="425" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <!-- Left diamond: use SCHED_FIFO? -->
  <path d="M 140,427 L 200,460 L 140,493 L 80,460 Z" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="140" y="455" text-anchor="middle" font-size="9" fill="#495057">是否使用</text>
  <text x="140" y="467" text-anchor="middle" font-size="9" fill="#495057">SCHED_FIFO</text>
  <!-- Left-yes -->
  <text x="65" y="467" font-size="9" fill="#868e96">是</text>
  <line x1="80" y1="460" x2="30" y2="460" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="460" x2="30" y2="510" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <rect x="-30" y="512" width="120" height="56" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="30" y="530" text-anchor="middle" font-size="8.5" fill="#495057">savedPriority=</text>
  <text x="30" y="542" text-anchor="middle" font-size="8.5" fill="#495057">getThreadPriority()</text>
  <text x="30" y="554" text-anchor="middle" font-size="8.5" fill="#495057">setThreadScheduler</text>
  <text x="30" y="565" text-anchor="middle" font-size="8" fill="#868e96">(SCHED_FIFO, 1)</text>
  <!-- Left-no -->
  <text x="215" y="467" font-size="9" fill="#868e96">否</text>
  <line x1="200" y1="460" x2="240" y2="460" stroke="#555" stroke-width="1"/>
  <line x1="240" y1="460" x2="240" y2="510" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <rect x="190" y="512" width="100" height="36" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="240" y="534" text-anchor="middle" font-size="9.5" fill="#495057">setThreadPriority(-10)</text>
  <!-- Right diamond: use SCHED_FIFO? -->
  <path d="M 420,427 L 480,460 L 420,493 L 360,460 Z" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="420" y="455" text-anchor="middle" font-size="9" fill="#495057">是否使用</text>
  <text x="420" y="467" text-anchor="middle" font-size="9" fill="#495057">SCHED_FIFO</text>
  <!-- Right-no -->
  <text x="345" y="467" font-size="9" fill="#868e96">否</text>
  <line x1="360" y1="460" x2="320" y2="460" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="460" x2="320" y2="510" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <rect x="270" y="512" width="100" height="36" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="320" y="534" text-anchor="middle" font-size="9.5" fill="#495057">setThreadPriority(0)</text>
  <!-- Right-yes -->
  <text x="495" y="467" font-size="9" fill="#868e96">是</text>
  <line x1="480" y1="460" x2="530" y2="460" stroke="#555" stroke-width="1"/>
  <line x1="530" y1="460" x2="530" y2="510" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <rect x="460" y="512" width="140" height="56" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="530" y="530" text-anchor="middle" font-size="8.5" fill="#495057">setThreadScheduler</text>
  <text x="530" y="542" text-anchor="middle" font-size="8.5" fill="#495057">(SCHED_OTHER, 0)</text>
  <text x="530" y="557" text-anchor="middle" font-size="8.5" fill="#495057">setThreadPriority</text>
  <text x="530" y="567" text-anchor="middle" font-size="8" fill="#868e96">(savedPriority)</text>
</svg>