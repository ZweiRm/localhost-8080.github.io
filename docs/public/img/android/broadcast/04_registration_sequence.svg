<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380">
  <defs>
    <marker id="arr-s" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
    <marker id="arr-s-r" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5" fill="#868e96"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; }
    </style>
  </defs>

  <!-- 生命线标题 -->
  <rect x="30" y="10" width="100" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="80" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">APP</text>

  <rect x="200" y="10" width="100" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="250" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ContextImpl</text>

  <rect x="380" y="10" width="100" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="430" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">LoadedApk</text>

  <rect x="600" y="10" width="180" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="690" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ActivityManagerService</text>

  <!-- 生命线 -->
  <line x1="80" y1="40" x2="80" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="250" y1="40" x2="250" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="430" y1="40" x2="430" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="690" y1="40" x2="690" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- 激活块 -->
  <rect x="74" y="55" width="12" height="30" fill="#eef1f5" stroke="#4a7fb5" stroke-width="0.8"/>
  <rect x="244" y="80" width="12" height="200" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="424" y="120" width="12" height="60" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="684" y="230" width="12" height="110" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>

  <!-- 消息 -->
  <!-- APP -> ContextImpl: registerReceiver -->
  <line x1="86" y1="70" x2="244" y2="90" stroke="#555" stroke-width="1" marker-end="url(#arr-s)"/>
  <text x="140" y="68" font-size="9" fill="#495057">registerReceiver</text>

  <!-- ContextImpl self: registerReceiverInternal -->
  <path d="M256,100 L270,100 L270,115 L256,115" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr-s)"/>
  <text x="275" y="110" font-size="8.5" fill="#495057">registerReceiverInternal</text>

  <!-- ContextImpl -> LoadedApk: getReceiverDispatcher -->
  <line x1="256" y1="130" x2="424" y2="135" stroke="#555" stroke-width="1" marker-end="url(#arr-s)"/>
  <text x="310" y="126" font-size="8.5" fill="#495057">getReceiverDispatcher</text>

  <!-- LoadedApk -> ContextImpl: IIntentReceiver -->
  <line x1="424" y1="165" x2="256" y2="170" stroke="#868e96" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-s-r)"/>
  <text x="310" y="162" font-size="8.5" fill="#868e96">IIntentReceiver</text>

  <!-- ContextImpl -> AMS: registerReceiverWithFeature -->
  <line x1="256" y1="240" x2="684" y2="245" stroke="#555" stroke-width="1" marker-end="url(#arr-s)"/>
  <text x="430" y="237" font-size="8.5" fill="#495057">registerReceiverWithFeature (Binder call)</text>

  <!-- AMS self: registerReceiverWithFeatureTraced -->
  <path d="M696,260 L720,260 L720,280 L696,280" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr-s)"/>
  <text x="725" y="273" font-size="8.5" fill="#495057">registerReceiverWithFeatureTraced</text>

  <!-- 注释 -->
  <rect x="580" y="300" width="220" height="40" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.6"/>
  <text x="590" y="315" font-size="8" fill="#495057">new ReceiverList</text>
  <text x="590" y="328" font-size="8" fill="#495057">mRegisteredReceivers.put(...)</text>
</svg>