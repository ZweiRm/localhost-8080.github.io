  <line x1="68" y1="204" x2="45" y2="248" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="92" y1="204" x2="115" y2="248" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>

  <circle cx="45" cy="262" r="13" fill="#c0504d" stroke="#333" stroke-width="1"/>
