  <circle cx="380" cy="190" r="14" fill="#4a7fb5" stroke="#333" stroke-width="1"/>
  <text x="380" y="194" text-anchor="middle" font-size="5.5" fill="white" font-weight="600">TDA</text>
  <text x="380" y="218" text-anchor="middle" font-size="8" fill="#495057">TaskDisplayArea</text>

