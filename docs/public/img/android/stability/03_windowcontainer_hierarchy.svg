  <text x="80" y="218" text-anchor="middle" font-size="8" fill="#495057">DisplayArea</text>

  <!-- ImeContainer -->
  <circle cx="210" cy="190" r="14" fill="#4a7fb5" stroke="#333" stroke-width="1"/>
  <text x="210" y="194" text-anchor="middle" font-size="6" fill="white" font-weight="600">Ime</text>
  <text x="210" y="218" text-anchor="middle" font-size="8" fill="#495057">ImeContainer</text>

