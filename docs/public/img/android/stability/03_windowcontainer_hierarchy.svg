<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560">
  <defs>
    <marker id="a3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <text x="380" y="18" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">WindowContainer 实例层级结构</text>

  <!-- RootWindowContainer -->
  <circle cx="380" cy="50" r="16" fill="#4a4a4a" stroke="#333" stroke-width="1"/>
  <text x="380" y="55" text-anchor="middle" font-size="7" fill="white" font-weight="600">Root</text>
  <text x="470" y="55" font-size="9" fill="#495057">RootWindowContainer</text>

  <!-- Lines to DisplayContent -->
  <line x1="365" y1="66" x2="280" y2="100" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="395" y1="66" x2="480" y2="100" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>

  <!-- DisplayContent 0 -->
  <circle cx="280" cy="115" r="16" fill="#4a7fb5" stroke="#333" stroke-width="1"/>
  <text x="280" y="119" text-anchor="middle" font-size="7" fill="white" font-weight="600">DC0</text>
  <text x="310" y="110" font-size="8.5" fill="#495057">DisplayContent</text>

  <!-- DisplayContent 1 -->
  <circle cx="480" cy="115" r="16" fill="#7b68a0" stroke="#333" stroke-width="1"/>
  <text x="480" y="119" text-anchor="middle" font-size="7" fill="white" font-weight="600">DC1</text>
  <text x="510" y="110" font-size="8.5" fill="#868e96">DisplayContent</text>

  <!-- DC0 children -->
  <line x1="220" y1="131" x2="80" y2="175" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="250" y1="131" x2="210" y2="175" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="310" y1="131" x2="380" y2="175" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="340" y1="131" x2="560" y2="175" stroke="#555" stroke-width="1" marker-end="url(#a3)"/>

  <!-- DisplayArea (ABOVE_TASKS) -->
  <circle cx="80" cy="190" r="14" fill="#4a7fb5" stroke="#333" stroke-width="1"/>
