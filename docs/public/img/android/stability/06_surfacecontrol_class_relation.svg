<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100">
  <defs>
    <marker id="diamond" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto">
      <polygon points="0 4, 5 0, 10 4, 5 8" fill="#555"/>
    </marker>
    <marker id="a6" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <!-- Java SurfaceControl -->
  <rect x="10" y="20" width="155" height="55" rx="3" fill="white" stroke="#333" stroke-width="1"/>
  <line x1="10" y1="40" x2="165" y2="40" stroke="#333" stroke-width="0.8"/>
  <text x="92" y="35" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Java.SurfaceControl</text>
  <text x="18" y="55" font-size="8.5" fill="#495057">+mNativeObject: long</text>
  <text x="18" y="67" font-size="8.5" fill="#495057">+mName: String</text>

  <!-- Native SurfaceControl -->
  <rect x="200" y="20" width="165" height="55" rx="3" fill="white" stroke="#333" stroke-width="1"/>
  <line x1="200" y1="40" x2="365" y2="40" stroke="#333" stroke-width="0.8"/>
  <text x="282" y="35" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Native.SurfaceControl</text>
  <text x="208" y="55" font-size="8.5" fill="#495057">+handle: sp&lt;LayerHandle&gt;</text>

  <!-- LayerHandle -->
  <rect x="400" y="20" width="145" height="55" rx="3" fill="white" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="40" x2="545" y2="40" stroke="#333" stroke-width="0.8"/>
  <text x="472" y="35" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">LayerHandle</text>
  <text x="408" y="55" font-size="8.5" fill="#495057">+mLayer: sp&lt;Layer&gt;</text>

  <!-- Layer -->
  <rect x="580" y="20" width="110" height="55" rx="3" fill="white" stroke="#333" stroke-width="1"/>
  <line x1="580" y1="40" x2="690" y2="40" stroke="#333" stroke-width="0.8"/>
  <text x="635" y="35" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Layer</text>
  <text x="588" y="55" font-size="8.5" fill="#495057">显示图层</text>

  <!-- Arrows -->
  <line x1="165" y1="47" x2="200" y2="47" stroke="#555" stroke-width="1.2" marker-end="url(#diamond)"/>
  <line x1="365" y1="47" x2="400" y2="47" stroke="#555" stroke-width="1.2" marker-end="url(#diamond)"/>
  <line x1="545" y1="47" x2="580" y2="47" stroke="#555" stroke-width="1.2" marker-end="url(#diamond)"/>

  <!-- Process labels -->
  <text x="92" y="90" text-anchor="middle" font-size="8" fill="#4a7fb5">App / system_server</text>
  <text x="282" y="90" text-anchor="middle" font-size="8" fill="#868e96">JNI</text>
  <text x="530" y="90" text-anchor="middle" font-size="8" fill="#2e7d32">SurfaceFlinger</text>
</svg>