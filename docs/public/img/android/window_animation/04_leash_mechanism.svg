<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#4a7fb5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="340" fill="white"/>

  <!-- ===== Left: Before Animation ===== -->
  <rect x="15" y="10" width="350" height="310" rx="6" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="190" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">动画前</text>

  <!-- Parent Surface -->
  <rect x="80" y="60" width="220" height="50" rx="6" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="190" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">Parent Surface</text>
  <text x="190" y="98" text-anchor="middle" font-size="9" fill="#868e96">(AnimationLeashParent)</text>

  <!-- Connection line -->
  <line x1="190" y1="110" x2="190" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Window Surface -->
  <rect x="80" y="145" width="220" height="50" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1.5"/>
  <text x="190" y="167" text-anchor="middle" font-size="11" font-weight="600" fill="#27ae60">Window Surface</text>
  <text x="190" y="183" text-anchor="middle" font-size="9" fill="#868e96">(WindowState)</text>

  <!-- Note -->
  <rect x="40" y="220" width="300" height="85" rx="4" fill="white" stroke="#ced4da" stroke-width="0.8"/>
  <text x="55" y="242" font-size="9" fill="#495057">动画操作直接作用在 Window Surface 上</text>
  <text x="55" y="258" font-size="9" fill="#495057">→ 其他逻辑对 Surface 的修改会与动画冲突</text>
  <text x="55" y="278" font-size="9" fill="#c0392b">⚠ 位置/大小修改会干扰动画变换</text>

  <!-- ===== Arrow between diagrams ===== -->
  <line x1="370" y1="160" x2="420" y2="160" stroke="#4a7fb5" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="395" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#4a7fb5">创建</text>
  <text x="395" y="175" text-anchor="middle" font-size="9" font-weight="600" fill="#4a7fb5">Leash</text>

  <!-- ===== Right: During Animation ===== -->
  <rect x="425" y="10" width="380" height="310" rx="6" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="615" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">动画中</text>

  <!-- Parent Surface -->
  <rect x="500" y="60" width="220" height="50" rx="6" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="610" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">Parent Surface</text>
  <text x="610" y="98" text-anchor="middle" font-size="9" fill="#868e96">(AnimationLeashParent)</text>

  <!-- Connection to Leash -->
  <line x1="610" y1="110" x2="610" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Animation Leash -->
  <rect x="500" y="145" width="220" height="50" rx="6" fill="#fff3cd" stroke="#e67e22" stroke-width="2"/>
  <text x="610" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#e67e22">Animation Leash</text>
  <text x="610" y="183" text-anchor="middle" font-size="9" fill="#868e96">(动画操作此 Surface)</text>

  <!-- Connection to Window -->
  <line x1="610" y1="195" x2="610" y2="225" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="620" y="214" font-size="8" fill="#868e96">reparent</text>

  <!-- Window Surface -->
  <rect x="500" y="230" width="220" height="50" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1.5"/>
  <text x="610" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#27ae60">Window Surface</text>
  <text x="610" y="268" text-anchor="middle" font-size="9" fill="#868e96">(WindowState)</text>

  <!-- Annotation: what operates on leash -->
  <rect x="435" y="147" width="58" height="18" rx="3" fill="#e67e22"/>
  <text x="464" y="160" text-anchor="middle" font-size="8" font-weight="600" fill="white">setMatrix</text>
  <rect x="435" y="168" width="58" height="18" rx="3" fill="#e67e22"/>
  <text x="464" y="181" text-anchor="middle" font-size="8" font-weight="600" fill="white">setAlpha</text>

  <!-- Note -->
  <rect x="440" y="295" width="350" height="20" rx="4" fill="white" stroke="#ced4da" stroke-width="0.8"/>
  <text x="455" y="310" font-size="9" fill="#27ae60">✓ 动画结束后 reparent 回 Parent，移除 Leash</text>
</svg>