  <line x1="805" y1="345" x2="945" y2="345" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 13: startAnimations (Choreographer callback) -->
  <text x="855" y="373" font-size="8.5" font-weight="600" fill="#c0392b">13</text>
  <text x="868" y="373" font-size="8.5" fill="#495057">startAnimations (Vsync)</text>
  <path d="M 950,375 L 965,375 L 965,381 L 950,381" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 14: startPendingAnimationsLocked -->
  <text x="855" y="398" font-size="8.5" font-weight="600" fill="#c0392b">14</text>
  <text x="868" y="398" font-size="8.5" fill="#495057">startPendingAnimationsLocked</text>
  <path d="M 950,400 L 965,400 L 965,406 L 950,406" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 15: startAnimationLocked -->
  <text x="855" y="423" font-size="8.5" font-weight="600" fill="#c0392b">15</text>
  <text x="868" y="423" font-size="8.5" fill="#495057">startAnimationLocked</text>
  <path d="M 950,425 L 965,425 L 965,431 L 950,431" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 16: addUpdateListener -->
  <text x="855" y="448" font-size="8.5" font-weight="600" fill="#c0392b">16</text>
  <text x="868" y="448" font-size="8.5" fill="#868e96">(创建 ValueAnimator, 注册 UpdateListener)</text>

  <!-- Step 17: applyTransformation -->
  <text x="855" y="473" font-size="8.5" font-weight="600" fill="#c0392b">17</text>
  <text x="868" y="473" font-size="8.5" fill="#495057">applyTransformation</text>
