  <rect x="5" y="880" width="1090" height="370" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="15" y="894" font-size="10" font-weight="600" fill="#343a40">输出动画帧 (prepareSurfaces)</text>

  <!-- Step 32: WMS -> WA prepareSurfaces (in animate loop) -->
  <text x="12" y="920" font-size="8.5" font-weight="600" fill="#c0392b">32</text>
  <text x="22" y="920" font-size="8.5" fill="#495057">animate 循环内: dc.prepareSurfaces()</text>

  <!-- Step 33: DC.prepareSurfaces -->
