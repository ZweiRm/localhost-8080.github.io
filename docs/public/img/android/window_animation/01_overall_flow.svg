  <text x="437" y="1020" font-size="8.5" font-weight="600" fill="#c0392b">36</text>
  <text x="450" y="1020" font-size="8.5" fill="#495057">showSurfaceRobustlyLocked</text>
  <path d="M 550,1022 L 565,1022 L 565,1028 L 550,1028" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

