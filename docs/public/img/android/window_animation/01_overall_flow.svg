  <!-- Step 39: showSurface -->
  <text x="1340" y="1095" font-size="8.5" font-weight="600" fill="#c0392b">39</text>
  <text x="1353" y="1095" font-size="8.5" fill="#495057">showSurface</text>
  <line x1="1530" y1="1097" x2="1325" y2="1097" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 40: show -->
  <text x="1340" y="1120" font-size="8.5" font-weight="600" fill="#c0392b">40</text>
  <text x="1353" y="1120" font-size="8.5" fill="#495057">show</text>
  <path d="M 1330,1122 L 1345,1122 L 1345,1128 L 1330,1128" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Notes -->
  <rect x="15" y="1160" width="400" height="90" rx="3" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="25" y="1178" font-size="9" font-weight="600" fill="#343a40">执行摘要</text>
  <text x="25" y="1196" font-size="8.5" fill="#495057">1. Choreographer Vsync 回调驱动 WindowAnimator.animate()</text>
