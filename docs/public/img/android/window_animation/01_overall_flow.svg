  <!-- ===== Group 1: 窗口动画流程 (Steps 1-24) ===== -->
  <rect x="5" y="44" width="1090" height="820" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="15" y="58" font-size="10" font-weight="600" fill="#343a40">窗口动画流程</text>

  <!-- Step 1: scheduleAnimationLocked -->
  <text x="12" y="80" font-size="8.5" font-weight="600" fill="#c0392b">1</text>
  <text x="22" y="80" font-size="8.5" fill="#495057">scheduleAnimationLocked</text>
  <line x1="70" y1="82" x2="190" y2="82" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: scheduleAnimation -->
  <text x="142" y="100" font-size="8.5" font-weight="600" fill="#c0392b">2</text>
  <text x="152" y="100" font-size="8.5" fill="#495057">scheduleAnimation</text>
  <path d="M 195,102 L 210,102 L 210,108 L 195,108" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: animate (Choreographer callback) -->
  <text x="142" y="125" font-size="8.5" font-weight="600" fill="#c0392b">3</text>
  <text x="152" y="125" font-size="8.5" fill="#495057">animate (Vsync callback)</text>
  <path d="M 195,127 L 210,127 L 210,133 L 195,133" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: updateWindowsForAnimator -->
  <text x="200" y="150" font-size="8.5" font-weight="600" fill="#c0392b">4</text>
  <text x="210" y="150" font-size="8.5" fill="#495057">updateWindowsForAnimator</text>
  <line x1="195" y1="152" x2="310" y2="152" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 5: performShowLocked -->
  <text x="322" y="170" font-size="8.5" font-weight="600" fill="#c0392b">5</text>
  <text x="332" y="170" font-size="8.5" fill="#495057">performShowLocked</text>
  <line x1="315" y1="172" x2="425" y2="172" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

