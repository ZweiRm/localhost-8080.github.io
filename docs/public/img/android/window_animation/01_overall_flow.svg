  <line x1="1095" y1="525" x2="1325" y2="525" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 20: scheduleApplyTransaction -->
  <text x="855" y="553" font-size="8.5" font-weight="600" fill="#c0392b">20</text>
  <text x="868" y="553" font-size="8.5" fill="#495057">scheduleApplyTransaction</text>
