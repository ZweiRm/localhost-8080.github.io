  <rect x="801" y="316" width="8" height="35" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.5"/>
  <rect x="946" y="341" width="8" height="340" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.5"/>
  <rect x="1091" y="496" width="8" height="35" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.5"/>

  <!-- ===== Group 2: ValueAnimator 工作流程 (Steps 25-34) ===== -->
  <rect x="1100" y="700" width="460" height="320" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1110" y="714" font-size="10" font-weight="600" fill="#343a40">ValueAnimator 工作流程</text>

  <text x="1165" y="740" font-size="8.5" font-weight="600" fill="#c0392b">25</text>
  <text x="1178" y="740" font-size="8.5" fill="#495057">start</text>
  <path d="M 1220,742 L 1235,742 L 1235,748 L 1220,748" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="1165" y="765" font-size="8.5" font-weight="600" fill="#c0392b">26</text>
  <text x="1178" y="765" font-size="8.5" fill="#495057">addAnimationCallback</text>
  <path d="M 1220,767 L 1235,767 L 1235,773 L 1220,773" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="1165" y="790" font-size="8.5" font-weight="600" fill="#c0392b">27</text>
  <text x="1178" y="790" font-size="8.5" fill="#495057">Choreographer.FrameCallback</text>

  <text x="1165" y="820" font-size="8.5" font-weight="600" fill="#c0392b">28</text>
  <text x="1178" y="820" font-size="8.5" fill="#495057">doAnimationFrame</text>
  <path d="M 1220,822 L 1235,822 L 1235,828 L 1220,828" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="1165" y="845" font-size="8.5" font-weight="600" fill="#c0392b">29</text>
  <text x="1178" y="845" font-size="8.5" fill="#495057">animateBasedOnTime</text>
  <path d="M 1220,847 L 1235,847 L 1235,853 L 1220,853" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="1165" y="870" font-size="8.5" font-weight="600" fill="#c0392b">30</text>
  <text x="1178" y="870" font-size="8.5" fill="#495057">animateValue</text>
  <path d="M 1220,872 L 1235,872 L 1235,878 L 1220,878" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="1165" y="895" font-size="8.5" font-weight="600" fill="#c0392b">31</text>
  <text x="1178" y="895" font-size="8.5" fill="#495057">onAnimationUpdate(this)</text>

  <text x="1110" y="930" font-size="8" fill="#868e96">→ 触发 UpdateListener 回调</text>
  <text x="1110" y="945" font-size="8" fill="#868e96">→ applyTransformation → apply</text>
  <text x="1110" y="960" font-size="8" fill="#868e96">→ scheduleApplyTransaction</text>

  <text x="1110" y="985" font-size="8" fill="#868e96">每帧重复 28-31，驱动属性动画</text>

