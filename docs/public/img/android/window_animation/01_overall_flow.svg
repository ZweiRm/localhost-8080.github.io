  <path d="M 950,580 L 965,580 L 965,586 L 950,586" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 22: mFrameTransaction.apply -->
  <text x="960" y="603" font-size="8.5" font-weight="600" fill="#c0392b">22</text>
  <text x="973" y="603" font-size="8.5" fill="#495057">apply</text>
  <line x1="950" y1="605" x2="1325" y2="605" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 23: ValueAnimator.start -->
  <text x="960" y="638" font-size="8.5" font-weight="600" fill="#c0392b">23</text>
  <text x="973" y="638" font-size="8.5" fill="#495057">anim.start()</text>
  <line x1="950" y1="640" x2="1215" y2="640" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 24: doAnimationFrame -->
  <text x="960" y="663" font-size="8.5" font-weight="600" fill="#c0392b">24</text>
  <text x="973" y="663" font-size="8.5" fill="#495057">doAnimationFrame</text>
  <line x1="950" y1="665" x2="1215" y2="665" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

