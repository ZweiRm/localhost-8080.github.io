  <text x="213" y="945" font-size="8.5" fill="#495057">prepareSurfaces</text>
  <line x1="195" y1="947" x2="310" y2="947" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 34: forAllWindows -> WS.prepareSurfaces -->
  <text x="322" y="970" font-size="8.5" font-weight="600" fill="#c0392b">34</text>
  <text x="335" y="970" font-size="8.5" fill="#495057">prepareSurfaces (each window)</text>
  <line x1="315" y1="972" x2="425" y2="972" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 35: WSA.prepareSurfaceLocked -->
  <text x="437" y="995" font-size="8.5" font-weight="600" fill="#c0392b">35</text>
  <text x="450" y="995" font-size="8.5" fill="#495057">prepareSurfaceLocked</text>
  <line x1="430" y1="997" x2="545" y2="997" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

