  <text x="437" y="270" font-size="8.5" font-weight="600" fill="#c0392b">9</text>
  <text x="447" y="270" font-size="8.5" fill="#495057">startAnimation</text>
  <line x1="430" y1="272" x2="670" y2="272" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

