<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="750" height="480" fill="white"/>

  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#343a40">applyAnimationLocked 动画加载决策流程</text>

  <!-- Entry -->
  <rect x="260" y="50" width="230" height="36" rx="18" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="375" y="73" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">applyAnimationLocked(transit)</text>

  <line x1="375" y1="86" x2="375" y2="110" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Decision 1: okToAnimate -->
  <polygon points="375,110 490,145 375,180 260,145" fill="#fff3cd" stroke="#e67e22" stroke-width="1.2"/>
  <text x="375" y="142" text-anchor="middle" font-size="10" font-weight="600" fill="#e67e22">okToAnimate()</text>
  <text x="375" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#e67e22">?</text>

  <!-- No branch -->
  <line x1="490" y1="145" x2="560" y2="145" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="525" y="138" text-anchor="middle" font-size="9" font-weight="600" fill="#c0392b">No</text>
  <rect x="567" y="128" width="140" height="34" rx="6" fill="#f8d7da" stroke="#c0392b" stroke-width="1"/>
  <text x="637" y="150" text-anchor="middle" font-size="10" fill="#c0392b">cancelAnimation()</text>

  <!-- Yes branch -->
  <line x1="375" y1="180" x2="375" y2="210" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="385" y="198" font-size="9" font-weight="600" fill="#27ae60">Yes</text>

  <!-- Decision 2: selectAnimation -->
  <polygon points="375,210 520,250 375,290 230,250" fill="#fff3cd" stroke="#e67e22" stroke-width="1.2"/>
  <text x="375" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#e67e22">DisplayPolicy</text>
  <text x="375" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#e67e22">.selectAnimation()</text>

  <!-- Branch: ANIMATION_NONE -->
  <line x1="520" y1="250" x2="600" y2="250" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="558" y="243" text-anchor="middle" font-size="8" fill="#c0392b">NONE</text>
  <rect x="607" y="233" width="110" height="34" rx="6" fill="#f8d7da" stroke="#c0392b" stroke-width="1"/>
  <text x="662" y="255" text-anchor="middle" font-size="10" fill="#c0392b">无动画</text>

  <!-- Branch: specific anim resource -->
  <line x1="230" y1="250" x2="155" y2="250" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="192" y="243" text-anchor="middle" font-size="8" fill="#495057">资源 ID</text>
  <rect x="20" y="233" width="135" height="34" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1"/>
  <text x="87" y="249" text-anchor="middle" font-size="9" fill="#27ae60">AnimationUtils</text>
  <text x="87" y="261" text-anchor="middle" font-size="9" fill="#27ae60">.loadAnimation()</text>

  <!-- Branch: ANIMATION_STYLEABLE -->
  <line x1="375" y1="290" x2="375" y2="320" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="385" y="308" font-size="8" fill="#495057">STYLEABLE</text>

  <!-- Decision 3: forceHidden -->
  <polygon points="375,320 505,355 375,390 245,355" fill="#fff3cd" stroke="#e67e22" stroke-width="1.2"/>
  <text x="375" y="351" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e67e22">isForceHidden</text>
  <text x="375" y="365" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e67e22">NonSystemOverlay?</text>

  <!-- Yes: alpha fade out -->
  <line x1="505" y1="355" x2="600" y2="355" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="550" y="348" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">Yes</text>
  <rect x="607" y="338" width="130" height="34" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1"/>
  <text x="672" y="354" text-anchor="middle" font-size="9" fill="#27ae60">AlphaAnimation</text>
  <text x="672" y="366" text-anchor="middle" font-size="9" fill="#27ae60">(1→0) 淡出</text>

  <!-- No: load from style -->
  <line x1="375" y1="390" x2="375" y2="420" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="385" y="408" font-size="9" font-weight="600" fill="#c0392b">No</text>

  <rect x="245" y="420" width="260" height="45" rx="6" fill="#cce5ff" stroke="#4a7fb5" stroke-width="1"/>
  <text x="375" y="439" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">从 windowAnimations 样式加载</text>
  <text x="375" y="456" text-anchor="middle" font-size="9" fill="#868e96">ENTER / EXIT / SHOW / HIDE 对应属性</text>

  <!-- Priority labels -->
  <rect x="20" y="50" width="70" height="22" rx="4" fill="#c0392b"/>
  <text x="55" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="white">优先级 1</text>
  <text x="20" y="93" font-size="8.5" fill="#495057">DisplayPolicy</text>
  <text x="20" y="105" font-size="8.5" fill="#495057">特殊动画</text>

  <rect x="20" y="290" width="70" height="22" rx="4" fill="#e67e22"/>
  <text x="55" y="305" text-anchor="middle" font-size="9" font-weight="600" fill="white">优先级 2</text>
  <text x="20" y="323" font-size="8.5" fill="#495057">强制隐藏窗口</text>
  <text x="20" y="335" font-size="8.5" fill="#495057">淡出动画</text>

  <rect x="20" y="420" width="70" height="22" rx="4" fill="#4a7fb5"/>
  <text x="55" y="435" text-anchor="middle" font-size="9" font-weight="600" fill="white">优先级 3</text>
  <text x="20" y="453" font-size="8.5" fill="#495057">窗口样式属性</text>
</svg>