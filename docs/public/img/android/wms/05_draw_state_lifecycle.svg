<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 150" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="stArr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#868e96"/>
    </marker>
  </defs>

  <!-- NO_SURFACE -->
  <rect x="8" y="20" width="130" height="48" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="73" y="41" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">NO_SURFACE</text>
  <text x="73" y="57" text-anchor="middle" font-size="9" fill="#868e96">state = 0</text>

  <line x1="138" y1="44" x2="168" y2="44" stroke="#868e96" stroke-width="1.2" marker-end="url(#stArr)"/>
  <text x="153" y="78" text-anchor="middle" font-size="8" fill="#6c757d">创建 Surface</text>

  <!-- DRAW_PENDING -->
  <rect x="172" y="20" width="130" height="48" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="237" y="41" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">DRAW_PENDING</text>
  <text x="237" y="57" text-anchor="middle" font-size="9" fill="#868e96">state = 1</text>

  <line x1="302" y1="44" x2="332" y2="44" stroke="#868e96" stroke-width="1.2" marker-end="url(#stArr)"/>
  <text x="317" y="78" text-anchor="middle" font-size="8" fill="#6c757d">绘制完成</text>

  <!-- COMMIT_DRAW_PENDING -->
  <rect x="336" y="20" width="150" height="48" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="411" y="37" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">COMMIT_DRAW</text>
  <text x="411" y="51" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">_PENDING</text>
  <text x="411" y="63" text-anchor="middle" font-size="8.5" fill="#868e96">state = 2</text>

  <line x1="486" y1="44" x2="516" y2="44" stroke="#868e96" stroke-width="1.2" marker-end="url(#stArr)"/>
  <text x="501" y="78" text-anchor="middle" font-size="8" fill="#6c757d">提交 WMS</text>

  <!-- READY_TO_SHOW -->
  <rect x="520" y="20" width="140" height="48" rx="3" fill="#eef5f1" stroke="#adb5bd" stroke-width="1"/>
  <text x="590" y="41" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">READY_TO_SHOW</text>
  <text x="590" y="57" text-anchor="middle" font-size="9" fill="#868e96">state = 3</text>

  <line x1="660" y1="44" x2="690" y2="44" stroke="#868e96" stroke-width="1.2" marker-end="url(#stArr)"/>
  <text x="675" y="78" text-anchor="middle" font-size="8" fill="#6c757d">同组就绪</text>

  <!-- HAS_DRAWN -->
  <rect x="694" y="20" width="125" height="48" rx="3" fill="#eef5f1" stroke="#6dae82" stroke-width="1.2"/>
  <text x="756" y="41" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">HAS_DRAWN</text>
  <text x="756" y="57" text-anchor="middle" font-size="9" fill="#868e96">state = 4</text>
</svg>