<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 820" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="inh" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="none" stroke="#868e96" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ===== Level 0: ConfigurationContainer ===== -->
  <rect x="370" y="10" width="230" height="34" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="485" y="22" text-anchor="middle" font-size="9" fill="#868e96" font-style="italic">«abstract»</text>
  <text x="485" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">ConfigurationContainer</text>

  <!-- arrow down -->
  <line x1="485" y1="44" x2="485" y2="62" stroke="#868e96" stroke-width="1.2" marker-end="url(#inh)"/>

  <!-- ===== Level 1: WindowContainer ===== -->
  <rect x="345" y="65" width="280" height="105" rx="3" fill="#eef1f5" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="485" y="83" text-anchor="middle" font-size="11.5" font-weight="600" fill="#343a40">WindowContainer</text>
  <line x1="353" y1="89" x2="617" y2="89" stroke="#ced4da"/>
  <text x="360" y="103" font-size="9.5" fill="#495057">mChildren</text>
  <line x1="353" y1="110" x2="617" y2="110" stroke="#ced4da"/>
  <text x="360" y="124" font-size="9.5" fill="#6c757d">addChild(child, comparator)</text>
  <text x="360" y="137" font-size="9.5" fill="#6c757d">addChild(child, index)</text>
  <text x="360" y="150" font-size="9.5" fill="#6c757d">positionChildAt(position, child, inclu...)</text>
  <text x="360" y="163" font-size="9.5" fill="#6c757d">removeChild(child)</text>

  <!-- ===== Fan-out from WindowContainer to Level 2 ===== -->
  <line x1="485" y1="170" x2="485" y2="190" stroke="#868e96" stroke-width="1"/>
  <line x1="95" y1="190" x2="920" y2="190" stroke="#868e96" stroke-width="1"/>
  <line x1="95" y1="190" x2="95" y2="208" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="290" y1="190" x2="290" y2="208" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="490" y1="190" x2="490" y2="208" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="700" y1="190" x2="700" y2="208" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="920" y1="190" x2="920" y2="208" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>

  <!-- ===== Level 2: RootWindowContainer ===== -->
  <rect x="10" y="210" width="170" height="52" rx="3" fill="#eef5f1" stroke="#adb5bd" stroke-width="1"/>
  <text x="95" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">RootWindowContainer</text>
  <line x1="18" y1="234" x2="172" y2="234" stroke="#ced4da"/>
  <text x="22" y="250" font-size="9" fill="#6c757d">mChildren: List&lt;DisplayContent&gt;</text>

  <!-- ===== Level 2: DisplayArea ===== -->
  <rect x="200" y="210" width="180" height="72" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">DisplayArea</text>
  <line x1="208" y1="234" x2="372" y2="234" stroke="#ced4da"/>
  <text x="212" y="248" font-size="9" fill="#495057">mType: Type</text>
  <text x="212" y="261" font-size="9" fill="#495057">mName: String</text>
  <text x="212" y="274" font-size="9" fill="#495057">mFeatureId: int</text>

  <!-- ===== Level 2: TaskFragment ===== -->
  <rect x="400" y="210" width="185" height="55" rx="3" fill="#f3eef8" stroke="#adb5bd" stroke-width="1"/>
  <text x="492" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">TaskFragment</text>
  <line x1="408" y1="234" x2="577" y2="234" stroke="#ced4da"/>
  <text x="412" y="250" font-size="9" fill="#495057">mChildren: List&lt;ActivityRecord|TaskFragment&gt;</text>

  <!-- ===== Level 2: WindowToken ===== -->
  <rect x="608" y="210" width="185" height="72" rx="3" fill="#eef5f5" stroke="#adb5bd" stroke-width="1"/>
  <text x="700" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">WindowToken</text>
  <line x1="616" y1="234" x2="785" y2="234" stroke="#ced4da"/>
  <text x="620" y="248" font-size="9" fill="#495057">token: IBinder</text>
  <text x="620" y="261" font-size="9" fill="#495057">windowType: int</text>
  <text x="620" y="274" font-size="9" fill="#495057">mChildren: List&lt;WindowState&gt;</text>

  <!-- ===== Level 2: WindowState ===== -->
  <rect x="825" y="210" width="185" height="55" rx="3" fill="#fdf2f2" stroke="#adb5bd" stroke-width="1"/>
  <text x="917" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">WindowState</text>
  <line x1="833" y1="234" x2="1002" y2="234" stroke="#ced4da"/>
  <text x="837" y="250" font-size="9" fill="#495057">mChildren: List&lt;WindowState&gt;</text>

  <!-- ===== Level 3 from DisplayArea ===== -->
  <line x1="290" y1="282" x2="290" y2="300" stroke="#868e96" stroke-width="1"/>
  <line x1="100" y1="300" x2="460" y2="300" stroke="#868e96" stroke-width="1"/>
  <line x1="100" y1="300" x2="100" y2="318" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="280" y1="300" x2="280" y2="318" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="460" y1="300" x2="460" y2="318" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>

  <!-- DisplayArea.Dimmable -->
  <rect x="10" y="320" width="180" height="52" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="100" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">DisplayArea.Dimmable</text>
  <line x1="18" y1="344" x2="182" y2="344" stroke="#ced4da"/>
  <text x="22" y="360" font-size="9" fill="#495057">mChildren: List&lt;DisplayArea&gt;</text>

  <!-- TaskDisplayArea -->
  <rect x="202" y="320" width="160" height="68" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="282" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">TaskDisplayArea</text>
  <line x1="210" y1="344" x2="354" y2="344" stroke="#ced4da"/>
  <text x="212" y="358" font-size="9" fill="#495057">mChildren: List&lt;Task|TaskDisplayArea&gt;</text>
  <line x1="210" y1="365" x2="354" y2="365" stroke="#ced4da"/>
  <text x="212" y="380" font-size="9" fill="#6c757d">ArrayList&lt;Task&gt; getVisibleTasks()</text>

  <!-- DisplayArea.Tokens -->
  <rect x="380" y="320" width="165" height="52" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="462" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">DisplayArea.Tokens</text>
  <line x1="388" y1="344" x2="537" y2="344" stroke="#ced4da"/>
  <text x="392" y="360" font-size="9" fill="#495057">mChildren: List&lt;WindowToken&gt;</text>

  <!-- ===== Level 3 from TaskFragment → Task ===== -->
  <line x1="492" y1="265" x2="640" y2="320" stroke="#868e96" stroke-width="1"/>
  <line x1="640" y1="313" x2="640" y2="320" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>

  <!-- Task -->
  <rect x="565" y="322" width="155" height="52" rx="3" fill="#f3eef8" stroke="#adb5bd" stroke-width="1"/>
  <text x="642" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">Task</text>
  <line x1="573" y1="346" x2="712" y2="346" stroke="#ced4da"/>
  <text x="577" y="362" font-size="9" fill="#495057">mResumedActivity: ActivityRecord</text>

  <!-- ===== Level 3 from WindowToken ===== -->
  <line x1="700" y1="282" x2="700" y2="300" stroke="#868e96" stroke-width="1"/>
  <line x1="700" y1="300" x2="920" y2="300" stroke="#868e96" stroke-width="1"/>
  <line x1="790" y1="300" x2="790" y2="318" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <line x1="920" y1="300" x2="920" y2="460" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>

  <!-- ActivityRecord -->
  <rect x="735" y="320" width="180" height="52" rx="3" fill="#eef5f5" stroke="#adb5bd" stroke-width="1"/>
  <text x="825" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ActivityRecord</text>
  <line x1="743" y1="344" x2="907" y2="344" stroke="#ced4da"/>
  <text x="747" y="360" font-size="9" fill="#495057">mStartingWindow: WindowState</text>

  <!-- WallpaperWindowToken -->
  <rect x="830" y="462" width="180" height="34" rx="3" fill="#eef5f5" stroke="#adb5bd" stroke-width="1"/>
  <text x="920" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">WallpaperWindowToken</text>

  <!-- ===== Level 4 from Dimmable → RootDisplayArea ===== -->
  <line x1="100" y1="372" x2="100" y2="410" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>

  <!-- RootDisplayArea -->
  <rect x="10" y="412" width="180" height="34" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="100" y="434" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">RootDisplayArea</text>

  <!-- arrow down -->
  <line x1="100" y1="446" x2="100" y2="465" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>

  <!-- DisplayContent -->
  <rect x="10" y="467" width="195" height="62" rx="3" fill="#eef5f1" stroke="#adb5bd" stroke-width="1"/>
  <text x="107" y="485" text-anchor="middle" font-size="10.5" font-weight="600" fill="#343a40">DisplayContent</text>
  <line x1="18" y1="491" x2="197" y2="491" stroke="#ced4da"/>
  <text x="22" y="506" font-size="9" fill="#495057">mDisplayId: int</text>
  <text x="22" y="520" font-size="9" fill="#495057">mImeWindowsContainer: ImeContainer</text>

  <!-- ImeContainer from Tokens -->
  <line x1="462" y1="372" x2="462" y2="410" stroke="#868e96" stroke-width="1" marker-end="url(#inh)"/>
  <rect x="380" y="412" width="165" height="34" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="462" y="434" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">ImeContainer</text>

  <!-- DisplayAreaGroup -->
  <rect x="220" y="467" width="155" height="34" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="297" y="489" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">DisplayAreaGroup</text>
</svg>