<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="ac" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="ac-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#4a7fb5"/>
    </marker>
    <marker id="ac-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2e7d32"/>
    </marker>
    <marker id="ac-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Top: ViewRootImpl.setView -->
  <rect x="320" y="8" width="210" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="425" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">ViewRootImpl.setView</text>

  <!-- Branch lines from setView -->
  <line x1="370" y1="38" x2="370" y2="55" stroke="#555" stroke-width="1.2"/>
  <line x1="370" y1="55" x2="160" y2="55" stroke="#555" stroke-width="1.2"/>
  <line x1="160" y1="55" x2="160" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <line x1="480" y1="38" x2="480" y2="55" stroke="#555" stroke-width="1.2"/>
  <line x1="480" y1="55" x2="680" y2="55" stroke="#555" stroke-width="1.2"/>
  <line x1="680" y1="55" x2="680" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <!-- Left branch: requestLayout chain -->
  <rect x="80" y="65" width="160" height="24" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="82" text-anchor="middle" font-size="9" fill="#343a40">requestLayout</text>

  <line x1="160" y1="89" x2="160" y2="103" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <rect x="65" y="103" width="190" height="24" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="120" text-anchor="middle" font-size="9" fill="#343a40">scheduleTraversals</text>

  <line x1="160" y1="127" x2="160" y2="141" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <rect x="55" y="141" width="210" height="24" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="158" text-anchor="middle" font-size="9" fill="#868e96">Choreographer (等待 VSync)</text>

  <line x1="160" y1="165" x2="160" y2="179" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <rect x="70" y="179" width="180" height="24" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="196" text-anchor="middle" font-size="9" fill="#343a40">TraversalRunnable.run</text>

  <line x1="160" y1="203" x2="160" y2="217" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <rect x="85" y="217" width="150" height="24" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="234" text-anchor="middle" font-size="9" fill="#343a40">doTraversal</text>

  <line x1="160" y1="241" x2="160" y2="255" stroke="#555" stroke-width="1.2" marker-end="url(#ac)"/>

  <rect x="65" y="255" width="190" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="160" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">performTraversals</text>

  <!-- Right branch: addWindow -->
  <rect x="580" y="65" width="200" height="24" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="680" y="82" text-anchor="middle" font-size="9" fill="#343a40">Session.addToDisplayAsUser</text>

  <line x1="680" y1="89" x2="680" y2="103" stroke="#4a7fb5" stroke-width="1.2" marker-end="url(#ac-blue)"/>

  <rect x="590" y="103" width="180" height="30" rx="3" fill="#e6f3ff" stroke="#4a7fb5" stroke-width="1.8"/>
  <text x="680" y="123" text-anchor="middle" font-size="10" font-weight="700" fill="#4a7fb5">第一步: addWindow</text>

  <!-- Sub-calls from performTraversals -->
  <!-- Line going down from performTraversals -->
  <line x1="160" y1="283" x2="160" y2="298" stroke="#555" stroke-width="1.2"/>

  <!-- 1. relayoutWindow -->
  <line x1="160" y1="298" x2="360" y2="298" stroke="#555" stroke-width="1"/>
  <line x1="360" y1="298" x2="360" y2="308" stroke="#555" stroke-width="1" marker-end="url(#ac)"/>

  <rect x="280" y="308" width="160" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="360" y="323" text-anchor="middle" font-size="9" fill="#343a40">relayoutWindow</text>

  <line x1="440" y1="319" x2="480" y2="319" stroke="#555" stroke-width="1" marker-end="url(#ac)"/>

  <rect x="480" y="308" width="145" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="552" y="323" text-anchor="middle" font-size="9" fill="#343a40">Session.relayout</text>

  <line x1="625" y1="319" x2="655" y2="319" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#ac-green)"/>

  <rect x="655" y="304" width="185" height="30" rx="3" fill="#e6ffe6" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="747" y="324" text-anchor="middle" font-size="10" font-weight="700" fill="#2e7d32">第二步: relayoutWindow</text>

  <!-- 2. updateBlastSurfaceIfNeeded -->
  <line x1="160" y1="298" x2="160" y2="350" stroke="#555" stroke-width="1"/>
  <line x1="160" y1="350" x2="360" y2="350" stroke="#555" stroke-width="1"/>
  <line x1="360" y1="350" x2="360" y2="345" stroke="#555" stroke-width="0"/>
  <rect x="265" y="342" width="195" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="362" y="357" text-anchor="middle" font-size="8.5" fill="#6c757d">updateBlastSurfaceIfNeeded (获取Surface)</text>

  <!-- 3. setFrame -->
  <line x1="160" y1="375" x2="360" y2="375" stroke="#555" stroke-width="1"/>
  <rect x="280" y="369" width="160" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="360" y="384" text-anchor="middle" font-size="8.5" fill="#6c757d">setFrame (获取窗口大小)</text>

  <!-- 4. performMeasure / performLayout -->
  <line x1="160" y1="400" x2="360" y2="400" stroke="#555" stroke-width="1"/>
  <rect x="265" y="394" width="195" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="362" y="409" text-anchor="middle" font-size="9" fill="#343a40">performMeasure / performLayout</text>

  <!-- 5. createSyncIfNeeded → SSG → finishDrawing chain -->
  <line x1="160" y1="425" x2="360" y2="425" stroke="#555" stroke-width="1"/>
  <rect x="265" y="419" width="160" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="345" y="434" text-anchor="middle" font-size="8.5" fill="#343a40">createSyncIfNeeded</text>

  <line x1="425" y1="430" x2="455" y2="430" stroke="#555" stroke-width="1" marker-end="url(#ac)"/>
  <rect x="455" y="419" width="120" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="515" y="434" text-anchor="middle" font-size="8.5" fill="#343a40">SurfaceSyncGroup</text>

  <line x1="515" y1="441" x2="515" y2="450" stroke="#555" stroke-width="1" marker-end="url(#ac)"/>
  <text x="555" y="448" font-size="8" fill="#6c757d">reportDrawFinished</text>

  <line x1="515" y1="455" x2="610" y2="455" stroke="#c0392b" stroke-width="1.2" marker-end="url(#ac-red)"/>
  <text x="562" y="466" text-anchor="middle" font-size="8" fill="#6c757d">Session.finishDrawing</text>

  <rect x="610" y="443" width="220" height="30" rx="3" fill="#ffe6e6" stroke="#c0392b" stroke-width="1.8"/>
  <text x="720" y="463" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">第三步: finishDrawingWindow</text>

  <!-- 6. performDraw -->
  <line x1="160" y1="450" x2="160" y2="460" stroke="#555" stroke-width="1"/>
  <line x1="160" y1="460" x2="265" y2="460" stroke="#555" stroke-width="1"/>
  <rect x="38" y="454" width="230" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="153" y="469" text-anchor="middle" font-size="8.5" fill="#343a40">performDraw → SurfaceSyncGroup.markSyncReady</text>

  <!-- Numbered labels on the left side of sub-calls -->
  <text x="148" y="302" text-anchor="end" font-size="8" font-weight="600" fill="#4a7fb5">1</text>
  <text x="148" y="355" text-anchor="end" font-size="8" font-weight="600" fill="#6c757d">2</text>
  <text x="148" y="380" text-anchor="end" font-size="8" font-weight="600" fill="#6c757d">3</text>
  <text x="148" y="405" text-anchor="end" font-size="8" font-weight="600" fill="#6c757d">4</text>
  <text x="148" y="430" text-anchor="end" font-size="8" font-weight="600" fill="#c0392b">5</text>
  <text x="148" y="465" text-anchor="end" font-size="8" font-weight="600" fill="#6c757d">6</text>
</svg>