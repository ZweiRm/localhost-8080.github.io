<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="fd" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="fd-ret" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#868e96"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="10" y="8" width="100" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="60" y="26" text-anchor="middle" font-size="9" font-weight="600" fill="#4a7fb5">ViewRootImpl</text>

  <rect x="145" y="8" width="110" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="200" y="26" text-anchor="middle" font-size="9" font-weight="600" fill="#4a7fb5">SurfaceSyncGroup</text>

  <rect x="290" y="8" width="110" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="345" y="20" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">Session</text>
  <text x="345" y="32" text-anchor="middle" font-size="8" fill="#6c757d">/ WMS</text>

  <rect x="440" y="8" width="130" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="505" y="26" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">WindowStateAnimator</text>

  <rect x="610" y="8" width="130" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="675" y="20" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">WindowSurfacePlacer</text>
  <text x="675" y="32" text-anchor="middle" font-size="8" fill="#6c757d">/ RootWindowContainer</text>

  <rect x="785" y="8" width="100" height="28" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="835" y="26" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">Transaction</text>

  <!-- Lifelines -->
  <line x1="60" y1="36" x2="60" y2="510" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="200" y1="36" x2="200" y2="510" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="345" y1="36" x2="345" y2="510" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="505" y1="36" x2="505" y2="510" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="675" y1="36" x2="675" y2="510" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="835" y1="36" x2="835" y2="510" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Step 1: 绘制完成通知 (warm bg) -->
  <rect x="5" y="46" width="885" height="120" rx="3" fill="#fff5e6" fill-opacity="0.5" stroke="#e67700" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="15" y="60" font-size="9" font-weight="600" fill="#e67700">Step 1: 绘制完成通知</text>

  <!-- VRI: create SSG, performDraw -->
  <line x1="60" y1="72" x2="195" y2="72" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="127" y="67" text-anchor="middle" font-size="8" fill="#343a40">createSyncIfNeeded</text>

  <line x1="60" y1="90" x2="95" y2="90" stroke="#555" stroke-width="1.2"/>
  <line x1="95" y1="90" x2="95" y2="100" stroke="#555" stroke-width="1.2"/>
  <line x1="95" y1="100" x2="65" y2="100" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="105" y="92" font-size="8" fill="#343a40">performDraw</text>

  <!-- markSyncReady triggers callback → reportDrawFinished -->
  <line x1="60" y1="110" x2="195" y2="110" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="127" y="105" text-anchor="middle" font-size="8" fill="#343a40">markSyncReady → callback</text>

  <line x1="200" y1="122" x2="340" y2="122" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="270" y="117" text-anchor="middle" font-size="8" fill="#343a40">reportDrawFinished → finishDrawing</text>

  <!-- Session → WMS → WSA -->
  <line x1="345" y1="138" x2="500" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="422" y="133" text-anchor="middle" font-size="8" fill="#343a40">finishDrawingWindow</text>

  <rect x="440" y="144" width="130" height="18" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="505" y="157" text-anchor="middle" font-size="8" fill="#343a40">COMMIT_DRAW_PENDING</text>

  <!-- Step 2: layout flow (green bg) -->
  <rect x="5" y="174" width="885" height="120" rx="3" fill="#e6ffe6" fill-opacity="0.4" stroke="#2e7d32" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="15" y="188" font-size="9" font-weight="600" fill="#2e7d32">Step 2: requestTraversal / layout</text>

  <!-- WSP → RWC -->
  <line x1="345" y1="200" x2="670" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="507" y="195" text-anchor="middle" font-size="8" fill="#343a40">requestTraversal → performSurfacePlacement</text>

  <line x1="675" y1="215" x2="710" y2="215" stroke="#555" stroke-width="1.2"/>
  <line x1="710" y1="215" x2="710" y2="228" stroke="#555" stroke-width="1.2"/>
  <line x1="710" y1="228" x2="680" y2="228" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="720" y="220" font-size="8" fill="#343a40">applySurfaceChangesTransaction</text>

  <!-- RWC → WSA -->
  <line x1="670" y1="245" x2="510" y2="245" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="590" y="240" text-anchor="middle" font-size="8" fill="#343a40">commitFinishDrawingLocked</text>

  <rect x="440" y="253" width="130" height="18" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="505" y="266" text-anchor="middle" font-size="8" fill="#2e7d32">READY_TO_SHOW</text>

  <line x1="505" y1="278" x2="540" y2="278" stroke="#555" stroke-width="1.2"/>
  <line x1="540" y1="278" x2="540" y2="288" stroke="#555" stroke-width="1.2"/>
  <line x1="540" y1="288" x2="510" y2="288" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="548" y="280" font-size="8" fill="#343a40">performShowLocked → HAS_DRAWN</text>

  <!-- Step 3: Surface display (blue bg) -->
  <rect x="5" y="302" width="885" height="90" rx="3" fill="#e6e6ff" fill-opacity="0.4" stroke="#4a7fb5" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="15" y="316" font-size="9" font-weight="600" fill="#4a7fb5">Step 3: Surface 显示</text>

  <line x1="675" y1="330" x2="510" y2="330" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="592" y="325" text-anchor="middle" font-size="8" fill="#343a40">prepareSurfaces</text>

  <line x1="505" y1="348" x2="830" y2="348" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="667" y="343" text-anchor="middle" font-size="8" fill="#343a40">WSC.showRobustly → t.show(surfaceControl)</text>

  <rect x="770" y="356" width="115" height="25" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="827" y="373" text-anchor="middle" font-size="8.5" fill="#2e7d32">Surface visible</text>

  <!-- Step 4: Commit to SF (red bg) -->
  <rect x="5" y="398" width="885" height="108" rx="3" fill="#ffe6e6" fill-opacity="0.4" stroke="#c0392b" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="15" y="412" font-size="9" font-weight="600" fill="#c0392b">Step 4: 提交到 SurfaceFlinger</text>

  <line x1="675" y1="430" x2="830" y2="430" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="752" y="425" text-anchor="middle" font-size="8" fill="#343a40">closeSurfaceTransaction</text>

  <line x1="835" y1="450" x2="870" y2="450" stroke="#555" stroke-width="1.2"/>
  <line x1="870" y1="450" x2="870" y2="463" stroke="#555" stroke-width="1.2"/>
  <line x1="870" y1="463" x2="840" y2="463" stroke="#555" stroke-width="1.2" marker-end="url(#fd)"/>
  <text x="855" y="447" font-size="8" fill="#343a40" text-anchor="middle">applyGlobalTransaction</text>

  <rect x="770" y="472" width="120" height="28" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="830" y="490" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2e7d32">nativeApplyTransaction</text>
</svg>