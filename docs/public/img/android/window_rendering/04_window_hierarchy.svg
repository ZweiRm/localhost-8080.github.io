<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="wh" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>

  <!-- Level 0: RootWindowContainer -->
  <rect x="245" y="8" width="210" height="30" rx="3" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="350" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">RootWindowContainer</text>

  <!-- Line L0 → L1 -->
  <line x1="350" y1="38" x2="350" y2="52" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>

  <!-- Level 1: DisplayContent -->
  <rect x="265" y="55" width="170" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="350" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">DisplayContent</text>

  <!-- Lines L1 → L2 -->
  <line x1="310" y1="85" x2="200" y2="105" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>
  <line x1="390" y1="85" x2="520" y2="105" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>

  <!-- Level 2: DefaultTaskDisplayArea -->
  <rect x="75" y="108" width="250" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="200" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">DefaultTaskDisplayArea</text>

  <!-- Level 2: 其他 DisplayArea -->
  <rect x="420" y="108" width="200" height="30" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="520" y="128" text-anchor="middle" font-size="10" fill="#6c757d">其他 DisplayArea</text>

  <!-- Lines L2 → L3 (two Tasks) -->
  <line x1="145" y1="138" x2="110" y2="158" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>
  <line x1="255" y1="138" x2="310" y2="158" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>

  <!-- Level 3: Task A -->
  <rect x="40" y="161" width="140" height="30" rx="3" fill="#fff3e6" stroke="#e67700" stroke-width="1.2"/>
  <text x="110" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#e67700">Task</text>

  <!-- Level 3: Task B -->
  <rect x="240" y="161" width="140" height="30" rx="3" fill="#fff3e6" stroke="#e67700" stroke-width="1.2"/>
  <text x="310" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#e67700">Task</text>

  <!-- Lines L3 → L4 -->
  <line x1="110" y1="191" x2="110" y2="208" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>
  <line x1="310" y1="191" x2="310" y2="208" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>

  <!-- Level 4: ActivityRecord (WindowToken) -->
  <rect x="18" y="211" width="184" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="110" y="231" text-anchor="middle" font-size="9.5" fill="#4a7fb5">ActivityRecord (即 WindowToken)</text>

  <rect x="218" y="211" width="184" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="310" y="231" text-anchor="middle" font-size="9.5" fill="#4a7fb5">ActivityRecord (即 WindowToken)</text>

  <!-- Lines L4 → L5 -->
  <line x1="65" y1="241" x2="50" y2="258" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>
  <line x1="110" y1="241" x2="110" y2="258" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>
  <line x1="155" y1="241" x2="175" y2="258" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>
  <line x1="310" y1="241" x2="310" y2="258" stroke="#555" stroke-width="1" marker-end="url(#wh)"/>

  <!-- Level 5: WindowState nodes under Task A -->
  <rect x="8" y="261" width="80" height="26" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="48" y="278" text-anchor="middle" font-size="8.5" fill="#343a40">主窗口</text>

  <rect x="98" y="261" width="26" height="26" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="111" y="278" text-anchor="middle" font-size="7" fill="#343a40">...</text>

  <rect x="134" y="261" width="120" height="26" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="194" y="278" text-anchor="middle" font-size="8.5" fill="#343a40">子窗口 / PopupWindow</text>

  <!-- Level 5: WindowState node under Task B -->
  <rect x="264" y="261" width="92" height="26" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="310" y="278" text-anchor="middle" font-size="8.5" fill="#343a40">WindowState</text>

  <!-- Annotation -->
  <text x="350" y="305" text-anchor="middle" font-size="8" fill="#868e96">WindowState = 最终的窗口节点，承载 Surface 和绘制状态</text>
</svg>