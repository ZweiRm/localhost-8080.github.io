<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="rl" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="rl-ret" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#868e96"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="110" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="75" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">ViewRootImpl</text>

  <rect x="185" y="10" width="90" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="230" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">Session</text>

  <rect x="340" y="10" width="90" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="385" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">WMS</text>

  <rect x="500" y="10" width="140" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="570" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WindowStateAnimator</text>

  <rect x="710" y="10" width="170" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="795" y="24" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">SurfaceControl</text>
  <text x="795" y="35" text-anchor="middle" font-size="8" fill="#6c757d">/ SurfaceFlinger</text>

  <!-- Lifelines -->
  <line x1="75" y1="40" x2="75" y2="440" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="230" y1="40" x2="230" y2="440" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="385" y1="40" x2="385" y2="440" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="570" y1="40" x2="570" y2="440" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="795" y1="40" x2="795" y2="440" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Section 1: 创建Surface (blue bg) -->
  <rect x="10" y="52" width="880" height="160" rx="3" fill="#e6f3ff" fill-opacity="0.4" stroke="#4a7fb5" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="20" y="66" font-size="9" font-weight="600" fill="#4a7fb5">创建 Surface</text>

  <!-- VRI → Session: relayout -->
  <line x1="75" y1="80" x2="225" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#rl)"/>
  <text x="150" y="75" text-anchor="middle" font-size="8.5" fill="#343a40">relayout</text>

  <!-- Session → WMS: relayoutWindow -->
  <line x1="230" y1="100" x2="380" y2="100" stroke="#555" stroke-width="1.2" marker-end="url(#rl)"/>
  <text x="305" y="95" text-anchor="middle" font-size="8.5" fill="#343a40">relayoutWindow</text>

  <!-- WMS notes -->
  <rect x="310" y="110" width="150" height="42" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="385" y="124" text-anchor="middle" font-size="8" fill="#343a40">windowForClientLocked</text>
  <text x="385" y="136" text-anchor="middle" font-size="8" fill="#343a40">setRequestedSize</text>
  <text x="385" y="148" text-anchor="middle" font-size="8" fill="#343a40">setViewVisibility</text>

  <!-- WMS → WSA: createSurfaceLocked -->
  <line x1="385" y1="165" x2="565" y2="165" stroke="#555" stroke-width="1.2" marker-end="url(#rl)"/>
  <text x="475" y="160" text-anchor="middle" font-size="8.5" fill="#343a40">createSurfaceLocked()</text>

  <!-- WSA note -->
  <rect x="500" y="173" width="140" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="570" y="188" text-anchor="middle" font-size="8" fill="#343a40">resetDrawState → DRAW_PENDING</text>

  <!-- WSA → SC: build BufferStateLayer -->
  <line x1="570" y1="200" x2="790" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#rl)"/>
  <text x="680" y="195" text-anchor="middle" font-size="8.5" fill="#343a40">build BufferStateLayer</text>

  <!-- Section 2: 计算窗口大小 (green bg) -->
  <rect x="10" y="222" width="880" height="90" rx="3" fill="#e6ffe6" fill-opacity="0.4" stroke="#2e7d32" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="20" y="236" font-size="9" font-weight="600" fill="#2e7d32">计算窗口大小</text>

  <!-- WMS self-call -->
  <line x1="385" y1="250" x2="420" y2="250" stroke="#555" stroke-width="1.2"/>
  <line x1="420" y1="250" x2="420" y2="268" stroke="#555" stroke-width="1.2"/>
  <line x1="420" y1="268" x2="390" y2="268" stroke="#555" stroke-width="1.2" marker-end="url(#rl)"/>
  <text x="430" y="256" font-size="8.5" fill="#343a40">performSurfacePlacement</text>

  <!-- WMS note -->
  <rect x="310" y="278" width="200" height="22" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="410" y="293" text-anchor="middle" font-size="8.5" fill="#2e7d32">layoutWindowLw → computeFrames → setFrames</text>

  <!-- Section 3: 返回给应用端 (orange bg) -->
  <rect x="10" y="322" width="880" height="110" rx="3" fill="#fff3e6" fill-opacity="0.4" stroke="#e67700" stroke-width="0.6" stroke-dasharray="4,2"/>
  <text x="20" y="336" font-size="9" font-weight="600" fill="#e67700">返回给应用端</text>

  <!-- Return surface and frames -->
  <line x1="380" y1="352" x2="235" y2="352" stroke="#868e96" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#rl-ret)"/>
  <text x="307" y="347" text-anchor="middle" font-size="8" fill="#868e96">return surface, frames</text>

  <line x1="225" y1="362" x2="80" y2="362" stroke="#868e96" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#rl-ret)"/>

  <!-- VRI notes -->
  <rect x="15" y="375" width="190" height="42" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="110" y="392" text-anchor="middle" font-size="8.5" fill="#4a7fb5">updateBlastSurfaceIfNeeded</text>
  <text x="110" y="407" text-anchor="middle" font-size="8.5" fill="#4a7fb5">setFrame (获取窗口大小)</text>
</svg>