<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="aw" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="aw-ret" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#868e96"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="30" y="10" width="120" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="90" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">ViewRootImpl</text>

  <rect x="210" y="10" width="100" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="260" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7fb5">Session</text>

  <rect x="380" y="10" width="100" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="430" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">WMS</text>

  <rect x="545" y="10" width="150" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="620" y="24" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">WindowToken</text>
  <text x="620" y="35" text-anchor="middle" font-size="8" fill="#6c757d">(ActivityRecord)</text>

  <rect x="755" y="10" width="110" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="810" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">WindowContainer</text>

  <!-- Lifelines -->
  <line x1="90" y1="40" x2="90" y2="305" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="260" y1="40" x2="260" y2="305" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="430" y1="40" x2="430" y2="305" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="620" y1="40" x2="620" y2="305" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="810" y1="40" x2="810" y2="305" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Step 1: VRI → Session -->
  <line x1="90" y1="65" x2="255" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#aw)"/>
  <text x="172" y="60" text-anchor="middle" font-size="8.5" fill="#343a40">addToDisplayAsUser(mWindow, ...)</text>

  <!-- Step 2: Session → WMS -->
  <line x1="260" y1="90" x2="425" y2="90" stroke="#555" stroke-width="1.2" marker-end="url(#aw)"/>
  <text x="342" y="85" text-anchor="middle" font-size="8.5" fill="#343a40">addWindow(session, client, attrs, ...)</text>

  <!-- Note at WMS -->
  <rect x="355" y="102" width="150" height="38" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="430" y="117" text-anchor="middle" font-size="8.5" fill="#343a40">检查窗口是否已添加</text>
  <text x="430" y="131" text-anchor="middle" font-size="8.5" fill="#343a40">创建 WindowState 对象</text>

  <!-- Step 4: WMS → WindowToken -->
  <line x1="430" y1="155" x2="615" y2="155" stroke="#555" stroke-width="1.2" marker-end="url(#aw)"/>
  <text x="522" y="150" text-anchor="middle" font-size="8.5" fill="#343a40">addWindow(win)</text>

  <!-- Note at WT -->
  <rect x="555" y="167" width="130" height="25" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="620" y="184" text-anchor="middle" font-size="8.5" fill="#343a40">检查是否为子窗口</text>

  <!-- Step 6: WT → WC -->
  <line x1="620" y1="205" x2="805" y2="205" stroke="#555" stroke-width="1.2" marker-end="url(#aw)"/>
  <text x="712" y="200" text-anchor="middle" font-size="8.5" fill="#343a40">addChild(win, mWindowComparator)</text>

  <!-- Note at WC -->
  <rect x="720" y="217" width="180" height="38" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="810" y="232" text-anchor="middle" font-size="8.5" fill="#2e7d32">根据 Comparator 找到插入位置</text>
  <text x="810" y="246" text-anchor="middle" font-size="8.5" fill="#2e7d32">mChildren.add</text>

  <!-- Note at WMS: mWindowMap.put -->
  <rect x="355" y="260" width="150" height="22" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="430" y="275" text-anchor="middle" font-size="8.5" fill="#343a40">mWindowMap.put(client, win)</text>

  <!-- Return arrows -->
  <line x1="425" y1="295" x2="265" y2="295" stroke="#868e96" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#aw-ret)"/>
  <text x="345" y="290" text-anchor="middle" font-size="8" fill="#868e96">return</text>
  <line x1="255" y1="300" x2="95" y2="300" stroke="#868e96" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#aw-ret)"/>
</svg>