<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="ov" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>

  <!-- 三个进程 -->
  <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">App 进程</text>
  <text x="440" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">system_server (WMS)</text>
  <text x="755" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">SurfaceFlinger</text>

  <line x1="255" y1="25" x2="255" y2="270" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="625" y1="25" x2="625" y2="270" stroke="#dee2e6" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Step 1: addWindow -->
  <rect x="15" y="40" width="225" height="55" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="127" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">① addWindow</text>
  <text x="127" y="78" text-anchor="middle" font-size="9" fill="#6c757d">ViewRootImpl.setView</text>
  <line x1="240" y1="67" x2="305" y2="67" stroke="#555" stroke-width="1.2" marker-end="url(#ov)"/>
  <rect x="305" y="40" width="270" height="55" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="440" y="60" text-anchor="middle" font-size="10" fill="#343a40">创建 WindowState</text>
  <text x="440" y="78" text-anchor="middle" font-size="9" fill="#6c757d">挂载到窗口层级树</text>

  <!-- Step 2: relayoutWindow -->
  <rect x="15" y="115" width="225" height="55" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="127" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">② relayoutWindow</text>
  <text x="127" y="153" text-anchor="middle" font-size="9" fill="#6c757d">requestLayout → VSync</text>
  <line x1="240" y1="142" x2="305" y2="142" stroke="#555" stroke-width="1.2" marker-end="url(#ov)"/>
  <rect x="305" y="115" width="270" height="55" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="440" y="135" text-anchor="middle" font-size="10" fill="#343a40">创建 Surface (Buffer 类型)</text>
  <text x="440" y="153" text-anchor="middle" font-size="9" fill="#6c757d">计算窗口大小 / 位置 → 返回应用端</text>
  <line x1="305" y1="150" x2="240" y2="150" stroke="#868e96" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ov)"/>

  <!-- Step 3: finishDrawingWindow -->
  <rect x="15" y="190" width="225" height="55" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="127" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#4a7fb5">③ finishDrawingWindow</text>
  <text x="127" y="228" text-anchor="middle" font-size="9" fill="#6c757d">绘制完成通知 WMS</text>
  <line x1="240" y1="217" x2="305" y2="217" stroke="#555" stroke-width="1.2" marker-end="url(#ov)"/>
  <rect x="305" y="190" width="270" height="55" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="440" y="210" text-anchor="middle" font-size="10" fill="#343a40">Transaction.show + apply</text>
  <text x="440" y="228" text-anchor="middle" font-size="9" fill="#6c757d">状态 → HAS_DRAWN</text>
  <line x1="575" y1="217" x2="640" y2="217" stroke="#555" stroke-width="1.2" marker-end="url(#ov)"/>
  <rect x="640" y="190" width="225" height="55" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="752" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">合成 → 显示到屏幕</text>
  <text x="752" y="228" text-anchor="middle" font-size="9" fill="#6c757d">nativeApplyTransaction</text>
</svg>