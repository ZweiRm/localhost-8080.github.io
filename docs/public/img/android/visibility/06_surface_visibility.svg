<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="as" viewBox="0 0 7 5" refX="7" refY="2.5" markerWidth="7" markerHeight="5" orient="auto-start-auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Stack trace -->
  <rect x="20" y="15" width="600" height="390" rx="3" fill="#f8f9fa" stroke="#ced4da"/>

  <text x="320" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">SurfaceControl 可见性更新调用栈</text>

  <rect x="180" y="60" width="280" height="26" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="320" y="78" text-anchor="middle" font-size="9.5" fill="#495057">WindowSurfacePlacer.performSurfacePlacement</text>
  <line x1="320" y1="86" x2="320" y2="100" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="180" y="100" width="280" height="26" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="320" y="118" text-anchor="middle" font-size="9.5" fill="#495057">RootWindowContainer.performSurfacePlacement</text>
  <line x1="320" y1="126" x2="320" y2="140" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="160" y="140" width="320" height="26" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="320" y="158" text-anchor="middle" font-size="9.5" fill="#495057">RootWindowContainer.performSurfacePlacementNoTrace</text>
  <line x1="320" y1="166" x2="320" y2="180" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="160" y="180" width="320" height="26" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="320" y="198" text-anchor="middle" font-size="9.5" fill="#495057">DisplayContent.applySurfaceChangesTransaction</text>
  <line x1="320" y1="206" x2="320" y2="220" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="200" y="220" width="240" height="26" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="320" y="238" text-anchor="middle" font-size="9.5" fill="#495057">DisplayContent.prepareSurfaces</text>
  <line x1="320" y1="246" x2="320" y2="260" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="200" y="260" width="240" height="26" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="320" y="278" text-anchor="middle" font-size="9.5" fill="#495057">WindowContainer.prepareSurfaces</text>
  <text x="510" y="278" font-size="8" fill="#868e96">逐层递归</text>
  <line x1="320" y1="286" x2="320" y2="300" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="210" y="300" width="220" height="26" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="320" y="318" text-anchor="middle" font-size="9.5" fill="#495057">Task.prepareSurfaces</text>
  <line x1="320" y1="326" x2="320" y2="345" stroke="#555" stroke-width="1" marker-end="url(#as)"/>

  <rect x="140" y="345" width="360" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="320" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#343a40">SurfaceControl.Transaction.setVisibility</text>
  <text x="320" y="390" text-anchor="middle" font-size="8.5" fill="#868e96">最终通过 SurfaceFlinger 更新 Surface 显示状态</text>
</svg>