<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420">
  <defs>
    <marker id="arrow1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Title area -->
  <text x="390" y="24" font-size="13" font-weight="600" fill="#343a40" text-anchor="middle">窗口帧计算总览</text>

  <!-- Input section -->
  <rect x="10" y="40" width="220" height="180" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="120" y="58" font-size="11" font-weight="600" fill="#4a7fb5" text-anchor="middle">输入</text>

  <rect x="20" y="68" width="200" height="22" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="120" y="83" font-size="9.5" fill="#495057" text-anchor="middle">LayoutParams (attrs)</text>

  <rect x="20" y="96" width="200" height="22" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="120" y="111" font-size="9.5" fill="#495057" text-anchor="middle">InsetsState (state)</text>

  <rect x="20" y="124" width="200" height="22" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="120" y="139" font-size="9.5" fill="#495057" text-anchor="middle">DisplayCutoutSafe</text>

  <rect x="20" y="152" width="200" height="22" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="120" y="167" font-size="9.5" fill="#495057" text-anchor="middle">windowBounds / windowingMode</text>

  <rect x="20" y="180" width="200" height="22" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="120" y="195" font-size="9.5" fill="#495057" text-anchor="middle">requestedWidth / Height</text>

  <!-- Core computation -->
  <rect x="270" y="50" width="240" height="310" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="390" y="72" font-size="12" font-weight="600" fill="#343a40" text-anchor="middle">WindowLayout.computeFrames()</text>

  <rect x="285" y="84" width="210" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="100" font-size="9.5" fill="#495057" text-anchor="middle">1. 计算 displayFrame (Insets 约束)</text>

  <rect x="285" y="118" width="210" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="134" font-size="9.5" fill="#495057" text-anchor="middle">2. 确定 parentFrame</text>

  <rect x="285" y="152" width="210" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="168" font-size="9.5" fill="#495057" text-anchor="middle">3. DisplayCutout 裁切</text>

  <rect x="285" y="186" width="210" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="202" font-size="9.5" fill="#495057" text-anchor="middle">4. 计算窗口尺寸 (w × h)</text>

  <rect x="285" y="220" width="210" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="236" font-size="9.5" fill="#495057" text-anchor="middle">5. Gravity 定位 + Display 适配</text>

  <rect x="285" y="262" width="210" height="24" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="390" y="278" font-size="9.5" fill="#495057" text-anchor="middle">extendFrameByCutout (可选)</text>

  <!-- Arrows from steps -->
  <line x1="390" y1="108" x2="390" y2="118" stroke="#868e96" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="390" y1="142" x2="390" y2="152" stroke="#868e96" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="390" y1="176" x2="390" y2="186" stroke="#868e96" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="390" y1="210" x2="390" y2="220" stroke="#868e96" stroke-width="1" marker-end="url(#arrow1)"/>
  <line x1="390" y1="244" x2="390" y2="262" stroke="#868e96" stroke-width="1" marker-end="url(#arrow1)"/>

  <!-- Helper callouts -->
  <rect x="285" y="302" width="100" height="20" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="335" y="316" font-size="8.5" fill="#868e96" text-anchor="middle">Gravity.apply()</text>

  <rect x="395" y="302" width="100" height="20" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="445" y="316" font-size="8.5" fill="#868e96" text-anchor="middle">Gravity.applyDisplay()</text>

  <line x1="335" y1="244" x2="335" y2="302" stroke="#ced4da" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="445" y1="244" x2="445" y2="302" stroke="#ced4da" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow input to core -->
  <line x1="230" y1="130" x2="270" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Output section -->
  <rect x="550" y="60" width="220" height="170" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="660" y="78" font-size="11" font-weight="600" fill="#2e7d32" text-anchor="middle">输出: ClientWindowFrames</text>

  <rect x="560" y="88" width="200" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="660" y="103" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">frame</text>
  <text x="660" y="116" font-size="8.5" fill="#868e96" text-anchor="middle">窗口实际边界 (屏幕坐标)</text>

  <rect x="560" y="128" width="200" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="660" y="143" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">displayFrame</text>
  <text x="660" y="156" font-size="8.5" fill="#868e96" text-anchor="middle">可显示区域 (受 Insets/Cutout 限制)</text>

  <rect x="560" y="168" width="200" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="660" y="183" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">parentFrame</text>
  <text x="660" y="196" font-size="8.5" fill="#868e96" text-anchor="middle">Gravity/MATCH_PARENT 参考帧</text>

  <!-- Arrow core to output -->
  <line x1="510" y1="160" x2="550" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- setFrames section -->
  <rect x="550" y="260" width="220" height="90" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="660" y="280" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">WindowState.setFrames()</text>
  <text x="660" y="298" font-size="9" fill="#495057" text-anchor="middle">→ mWindowFrames.mFrame</text>
  <text x="660" y="312" font-size="9" fill="#495057" text-anchor="middle">→ mWindowFrames.mCompatFrame</text>
  <text x="660" y="326" font-size="9" fill="#495057" text-anchor="middle">→ mWindowFrames.mRelFrame</text>
  <text x="660" y="340" font-size="9" fill="#495057" text-anchor="middle">→ mFrameChangingWindows</text>

  <line x1="660" y1="230" x2="660" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Bottom note -->
  <text x="390" y="400" font-size="9" fill="#868e96" text-anchor="middle">同一 computeFrames() 算法在服务端 (DisplayPolicy) 和客户端 (ViewRootImpl) 都会执行</text>
</svg>
