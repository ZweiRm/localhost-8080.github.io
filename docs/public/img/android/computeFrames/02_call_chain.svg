<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520">
  <defs>
    <marker id="arrow2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="arrow2r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#e07070"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="430" y="22" font-size="13" font-weight="600" fill="#343a40" text-anchor="middle">服务端 Layout 遍历调用链</text>

  <!-- Column labels -->
  <text x="130" y="52" font-size="10" font-weight="600" fill="#868e96" text-anchor="middle">WindowSurfacePlacer</text>
  <text x="370" y="52" font-size="10" font-weight="600" fill="#868e96" text-anchor="middle">DisplayContent</text>
  <text x="600" y="52" font-size="10" font-weight="600" fill="#868e96" text-anchor="middle">DisplayPolicy</text>
  <text x="780" y="52" font-size="10" font-weight="600" fill="#868e96" text-anchor="middle">WindowLayout</text>

  <!-- Vertical dashed lane dividers -->
  <line x1="250" y1="40" x2="250" y2="510" stroke="#ced4da" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="490" y1="40" x2="490" y2="510" stroke="#ced4da" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="690" y1="40" x2="690" y2="510" stroke="#ced4da" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Step 1: performSurfacePlacement -->
  <rect x="20" y="70" width="220" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="130" y="87" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">performSurfacePlacement()</text>
  <text x="130" y="101" font-size="8.5" fill="#868e96" text-anchor="middle">循环最多 6 次</text>

  <line x1="130" y1="110" x2="130" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Step 2: performSurfacePlacementLoop -->
  <rect x="20" y="130" width="220" height="30" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="130" y="150" font-size="9.5" fill="#495057" text-anchor="middle">performSurfacePlacementLoop()</text>

  <line x1="240" y1="145" x2="260" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 3: RootWindowContainer.performSurfacePlacement -->
  <rect x="260" y="130" width="220" height="30" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="370" y="150" font-size="9.5" fill="#495057" text-anchor="middle">RWC.performSurfacePlacement()</text>

  <line x1="370" y1="160" x2="370" y2="180" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Step 4: applySurfaceChangesTransaction -->
  <rect x="260" y="180" width="220" height="30" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="370" y="200" font-size="9.5" fill="#495057" text-anchor="middle">applySurfaceChangesTransaction()</text>

  <line x1="370" y1="210" x2="370" y2="230" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Step 5: performLayout -->
  <rect x="260" y="230" width="220" height="40" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="370" y="248" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">performLayout()</text>
  <text x="370" y="262" font-size="8.5" fill="#868e96" text-anchor="middle">→ performLayoutNoTrace()</text>

  <line x1="370" y1="270" x2="370" y2="295" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Phase 1: mPerformLayout -->
  <rect x="260" y="295" width="220" height="44" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="370" y="313" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">阶段一: mPerformLayout</text>
  <text x="370" y="330" font-size="8.5" fill="#868e96" text-anchor="middle">forAllWindows — 根窗口 (attached=null)</text>

  <line x1="480" y1="317" x2="500" y2="317" stroke="#e07070" stroke-width="1.5" marker-end="url(#arrow2r)"/>

  <!-- layoutWindowLw for phase 1 -->
  <rect x="500" y="300" width="180" height="34" rx="3" fill="white" stroke="#e07070"/>
  <text x="590" y="318" font-size="9.5" fill="#495057" text-anchor="middle">layoutWindowLw(w, null, df)</text>
  <text x="590" y="330" font-size="8" fill="#868e96" text-anchor="middle">attached = null</text>

  <line x1="680" y1="317" x2="700" y2="317" stroke="#e07070" stroke-width="1.5" marker-end="url(#arrow2r)"/>

  <!-- computeFrames -->
  <rect x="700" y="297" width="150" height="40" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="775" y="315" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">computeFrames()</text>
  <text x="775" y="330" font-size="8.5" fill="#868e96" text-anchor="middle">核心帧计算</text>

  <line x1="370" y1="339" x2="370" y2="370" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Phase 2: mPerformLayoutAttached -->
  <rect x="260" y="370" width="220" height="44" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="370" y="388" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">阶段二: mPerformLayoutAttached</text>
  <text x="370" y="405" font-size="8.5" fill="#868e96" text-anchor="middle">forAllWindows — 子窗口 (attached≠null)</text>

  <line x1="480" y1="392" x2="500" y2="392" stroke="#e07070" stroke-width="1.5" marker-end="url(#arrow2r)"/>

  <!-- layoutWindowLw for phase 2 -->
  <rect x="500" y="375" width="180" height="34" rx="3" fill="white" stroke="#e07070"/>
  <text x="590" y="393" font-size="9.5" fill="#495057" text-anchor="middle">layoutWindowLw(w, parent, df)</text>
  <text x="590" y="405" font-size="8" fill="#868e96" text-anchor="middle">attached = parentWindow</text>

  <line x1="680" y1="392" x2="700" y2="392" stroke="#e07070" stroke-width="1.5" marker-end="url(#arrow2r)"/>

  <!-- computeFrames again -->
  <rect x="700" y="372" width="150" height="40" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="775" y="390" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">computeFrames()</text>
  <text x="775" y="405" font-size="8.5" fill="#868e96" text-anchor="middle">核心帧计算</text>

  <!-- setFrames callout -->
  <line x1="590" y1="334" x2="590" y2="352" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>
  <rect x="510" y="352" width="160" height="20" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="590" y="366" font-size="9" fill="#2e7d32" text-anchor="middle">win.setFrames(frames)</text>

  <line x1="590" y1="409" x2="590" y2="427" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>
  <rect x="510" y="427" width="160" height="20" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="590" y="441" font-size="9" fill="#2e7d32" text-anchor="middle">win.setFrames(frames)</text>

  <!-- Post-layout -->
  <line x1="370" y1="414" x2="370" y2="465" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>
  <rect x="260" y="465" width="220" height="30" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="370" y="484" font-size="9.5" fill="#495057" text-anchor="middle">updateInputWindowsLw()</text>
</svg>
