<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580">
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="210" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">applySizeOverrideIfNeeded 决策流程</text>
  <text x="210" y="36" text-anchor="middle" font-size="9" fill="#868e96">ConfigurationContainer.java:229</text>

  <!-- Callers -->
  <rect x="40" y="50" width="340" height="36" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="210" y="63" text-anchor="middle" font-size="8.5" fill="#343a40">调用方：ActivityRecord.resolveOverrideConfiguration()</text>
  <text x="210" y="77" text-anchor="middle" font-size="8.5" fill="#343a40">WindowProcessController.resolveOverrideConfiguration()</text>

  <line x1="210" y1="86" x2="210" y2="108" stroke="#555" stroke-width="1" marker-end="url(#a)"/>

  <!-- Check 1: mInsetsDecoupledConfiguration -->
  <path d="M 210,108 L 370,140 L 210,172 L 50,140 Z" fill="white" stroke="#adb5bd"/>
  <text x="210" y="136" text-anchor="middle" font-size="8.5" font-weight="600" fill="#343a40">mInsetsDecoupled-</text>
  <text x="210" y="150" text-anchor="middle" font-size="8.5" font-weight="600" fill="#343a40">Configuration?</text>

  <!-- Left branch: false (U及之前) — straight down to left diamond top -->
  <line x1="50" y1="140" x2="50" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="50" y1="180" x2="90" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="90" y1="180" x2="90" y2="198" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="30" y="164" font-size="7.5" fill="#868e96">false</text>
  <text x="30" y="176" font-size="7.5" fill="#868e96">(U及之前)</text>

  <!-- Right branch: true (V) — straight down to right diamond top -->
  <line x1="370" y1="140" x2="370" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="370" y1="180" x2="330" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="180" x2="330" y2="198" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="374" y="164" font-size="7.5" fill="#868e96">true</text>
  <text x="374" y="176" font-size="7.5" fill="#868e96">(V)</text>

  <!-- Left: OVERRIDE_ENABLE diamond -->
  <path d="M 90,198 L 180,220 L 90,242 L 0,220 Z" fill="white" stroke="#adb5bd"/>
  <text x="90" y="216" text-anchor="middle" font-size="7.5" fill="#343a40">OVERRIDE_ENABLE_</text>
  <text x="90" y="228" text-anchor="middle" font-size="7.5" fill="#343a40">INSETS_DECOUPLED?</text>

  <!-- Left diamond → true = useOverride=true (bottom exit) -->
  <line x1="90" y1="242" x2="90" y2="270" stroke="#555" stroke-width="1"/>
  <text x="100" y="260" font-size="7.5" fill="#2e7d32">true</text>
  <text x="90" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#2e7d32">useOverride = true</text>

  <!-- Left diamond → false (right exit) -->
  <line x1="180" y1="220" x2="195" y2="220" stroke="#555" stroke-width="1"/>
  <text x="182" y="212" font-size="7.5" fill="#c0392b">false</text>

  <!-- Right: !ENFORCED && !OVERRIDE diamond -->
  <path d="M 330,198 L 410,220 L 330,242 L 250,220 Z" fill="white" stroke="#adb5bd"/>
  <text x="330" y="216" text-anchor="middle" font-size="7.5" fill="#343a40">!ENFORCED &amp;&amp;</text>
  <text x="330" y="228" text-anchor="middle" font-size="7.5" fill="#343a40">!OVERRIDE_ENABLE?</text>

  <!-- Right diamond → true = useOverride=true (bottom exit) -->
  <line x1="330" y1="242" x2="330" y2="270" stroke="#555" stroke-width="1"/>
  <text x="340" y="260" font-size="7.5" fill="#2e7d32">true</text>
  <text x="330" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#2e7d32">useOverride = true</text>

  <!-- Right diamond → false (left exit) -->
  <line x1="250" y1="220" x2="225" y2="220" stroke="#555" stroke-width="1"/>
  <text x="232" y="212" font-size="7.5" fill="#c0392b">false</text>

  <!-- Both false paths converge to return box -->
  <line x1="195" y1="220" x2="210" y2="220" stroke="#555" stroke-width="1"/>
  <line x1="225" y1="220" x2="210" y2="220" stroke="#555" stroke-width="1"/>
  <line x1="210" y1="220" x2="210" y2="240" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <rect x="160" y="240" width="100" height="28" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="210" y="258" text-anchor="middle" font-size="8" fill="#495057">return（E2E config）</text>

  <!-- targetSdk note -->
  <rect x="280" y="288" width="130" height="30" rx="3" fill="#fff8e1" stroke="#f9a825"/>
  <text x="345" y="300" text-anchor="middle" font-size="7.5" fill="#495057">targetSdk ≥ 35 时</text>
  <text x="345" y="312" text-anchor="middle" font-size="7.5" fill="#495057">ENFORCED=true → false 路径</text>

  <!-- Both true paths converge downward -->
  <line x1="90" y1="288" x2="90" y2="345" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="288" x2="330" y2="345" stroke="#555" stroke-width="1"/>
  <line x1="90" y1="345" x2="210" y2="345" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="345" x2="210" y2="345" stroke="#555" stroke-width="1"/>
  <line x1="210" y1="345" x2="210" y2="368" stroke="#555" stroke-width="1" marker-end="url(#a)"/>

  <!-- Check: isFloating / hasCompat / rotation=UNDEFINED -->
  <path d="M 210,368 L 350,396 L 210,424 L 70,396 Z" fill="white" stroke="#adb5bd"/>
  <text x="210" y="392" text-anchor="middle" font-size="8" fill="#343a40">isFloating / hasCompat /</text>
  <text x="210" y="404" text-anchor="middle" font-size="8" fill="#343a40">rotation = UNDEFINED?</text>

  <!-- true → return (right exit to avoid left overflow) -->
  <line x1="350" y1="396" x2="395" y2="396" stroke="#555" stroke-width="1"/>
  <text x="358" y="388" font-size="7.5" fill="#c0392b">true → return</text>

  <!-- false → apply override -->
  <line x1="210" y1="424" x2="210" y2="456" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="220" y="446" font-size="7.5" fill="#2e7d32">false</text>

  <rect x="60" y="456" width="300" height="52" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="210" y="474" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">执行 Override（Legacy Size）</text>
  <text x="210" y="490" text-anchor="middle" font-size="8" fill="#495057">appBounds ∩ mOverrideNonDecorFrame</text>
  <text x="210" y="502" text-anchor="middle" font-size="8" fill="#495057">重写 screenWidthDp / screenHeightDp / orientation</text>

  <!-- Final note -->
  <text x="210" y="530" text-anchor="middle" font-size="8.5" fill="#868e96">使应用看到的 appBounds 仍为去除 Insets 后的 Legacy size</text>
</svg>
