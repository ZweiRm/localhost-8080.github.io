<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480">
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#e07070"/>
    </marker>
  </defs>

  <text x="280" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#343a40">Cutout SVG 路径坐标系</text>

  <!-- Phone outline -->
  <rect x="140" y="50" width="280" height="410" rx="20" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.5"/>

  <!-- Screen area -->
  <rect x="155" y="70" width="250" height="370" rx="3" fill="white" stroke="#ced4da"/>

  <!-- Cutout area (rectangle) -->
  <rect x="252" y="70" width="56" height="26" fill="#fff0f0" stroke="#e07070" stroke-width="1.5"/>

  <!-- Origin point -->
  <circle cx="280" cy="70" r="4" fill="#e07070"/>
  <text x="290" y="65" font-size="9" fill="#e07070" font-weight="600">原点 (0,0)</text>

  <!-- X axis -->
  <line x1="155" y1="70" x2="430" y2="70" stroke="#e07070" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="420" y1="70" x2="430" y2="70" stroke="#e07070" stroke-width="1" marker-end="url(#ar)"/>
  <text x="435" y="74" font-size="10" fill="#e07070" font-weight="600">X</text>

  <!-- Y axis -->
  <line x1="280" y1="50" x2="280" y2="460" stroke="#e07070" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="450" x2="280" y2="460" stroke="#e07070" stroke-width="1" marker-end="url(#ar)"/>
  <text x="284" y="470" font-size="10" fill="#e07070" font-weight="600">Y</text>

  <!-- Width annotation -->
  <text x="280" y="55" text-anchor="middle" font-size="8" fill="#868e96">屏幕宽度/2</text>

  <!-- SVG path annotation - left side -->
  <text x="20" y="110" font-size="10" font-weight="600" fill="#343a40">配置示例</text>

  <rect x="10" y="118" width="122" height="130" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="20" y="136" font-size="8.5" fill="#495057" font-family="monospace">M 0,0</text>
  <text x="20" y="152" font-size="8.5" fill="#495057" font-family="monospace">H -28</text>
  <text x="20" y="168" font-size="8.5" fill="#495057" font-family="monospace">V 94</text>
  <text x="20" y="184" font-size="8.5" fill="#495057" font-family="monospace">H 28</text>
  <text x="20" y="200" font-size="8.5" fill="#495057" font-family="monospace">V 0</text>
  <text x="20" y="216" font-size="8.5" fill="#495057" font-family="monospace">H 0</text>
  <text x="20" y="232" font-size="8.5" fill="#495057" font-family="monospace">Z</text>

  <!-- Step annotations on the cutout -->
  <!-- Point labels -->
  <circle cx="252" cy="70" r="3" fill="#4a7fb5"/>
  <text x="235" y="65" font-size="8" fill="#4a7fb5">(-28,0)</text>

  <circle cx="252" cy="96" r="3" fill="#4a7fb5"/>
  <text x="220" y="104" font-size="8" fill="#4a7fb5">(-28,94)</text>

  <circle cx="308" cy="96" r="3" fill="#4a7fb5"/>
  <text x="312" y="104" font-size="8" fill="#4a7fb5">(28,94)</text>

  <circle cx="308" cy="70" r="3" fill="#4a7fb5"/>
  <text x="312" y="65" font-size="8" fill="#4a7fb5">(28,0)</text>

  <!-- Step numbers -->
  <text x="242" y="82" font-size="7" fill="white" font-weight="600">1</text>
  <rect x="238" y="74" width="12" height="12" rx="6" fill="#4a7fb5" opacity="0.7"/>
  <text x="241" y="83" font-size="7" fill="white" font-weight="600">1</text>

  <!-- Rotation note -->
  <rect x="10" y="280" width="122" height="80" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="71" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">旋转变化</text>
  <text x="71" y="314" text-anchor="middle" font-size="8" fill="#495057">0°: top=94</text>
  <text x="71" y="328" text-anchor="middle" font-size="8" fill="#495057">90°: left=94</text>
  <text x="71" y="342" text-anchor="middle" font-size="8" fill="#495057">270°: right=94</text>

  <!-- Additional configs -->
  <rect x="10" y="380" width="122" height="70" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="71" y="398" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">相关配置</text>
  <text x="20" y="414" font-size="7.5" fill="#495057">status_bar_height</text>
  <text x="20" y="428" font-size="7.5" fill="#495057">≥ cutout 高度</text>
  <text x="20" y="442" font-size="7.5" fill="#495057">config_fillMain...</text>

  <!-- Screen label -->
  <text x="280" y="260" text-anchor="middle" font-size="11" fill="#ced4da">屏幕显示区域</text>
</svg>
