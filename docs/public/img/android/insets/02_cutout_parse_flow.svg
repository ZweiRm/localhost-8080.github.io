<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <marker id="ao" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="7 0, 0 2.5, 7 5" fill="#555"/>
    </marker>
  </defs>

  <text x="450" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Cutout 解析流程（时序图）</text>

  <!-- Participants -->
  <rect x="20" y="34" width="120" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="80" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">LocalDisplayDevice</text>

  <rect x="200" y="34" width="110" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="255" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">DisplayCutout</text>

  <rect x="390" y="34" width="130" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="455" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">CutoutSpecification</text>

  <rect x="600" y="34" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="650" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">PathParser</text>

  <rect x="770" y="34" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="820" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">HWUI (native)</text>

  <!-- Lifelines -->
  <line x1="80" y1="62" x2="80" y2="590" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="255" y1="62" x2="255" y2="590" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="455" y1="62" x2="455" y2="590" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="650" y1="62" x2="650" y2="590" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="820" y1="62" x2="820" y2="590" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Trigger -->
  <text x="10" y="90" font-size="8.5" fill="#c0392b">折叠/解锁/开机</text>

  <!-- getDisplayDeviceInfoLocked -->
  <rect x="76" y="95" width="8" height="30" fill="#eef1f5" stroke="#4a7fb5"/>

  <!-- Call fromResourcesRectApproximation -->
  <line x1="84" y1="110" x2="251" y2="110" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="168" y="105" text-anchor="middle" font-size="8.5" fill="#343a40">fromResourcesRectApproximation()</text>

  <!-- Activation on DisplayCutout -->
  <rect x="251" y="110" width="8" height="430" fill="#eef1f5" stroke="#4a7fb5"/>

  <!-- getDisplayCutoutPath -->
  <line x1="259" y1="140" x2="310" y2="140" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="140" x2="310" y2="158" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="158" x2="259" y2="158" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="316" y="149" font-size="8.5" fill="#343a40">getDisplayCutoutPath()</text>

  <!-- Return config string -->
  <line x1="259" y1="175" x2="310" y2="175" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="316" y="174" font-size="7.5" fill="#868e96">config_mainBuiltInDisplayCutout</text>

  <!-- pathAndDisplayCutoutFromSpec -->
  <line x1="259" y1="200" x2="310" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="200" x2="310" y2="218" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="218" x2="259" y2="218" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="316" y="209" font-size="8.5" fill="#c0392b" font-weight="600">pathAndDisplayCutoutFromSpec()</text>

  <!-- Create Parser -->
  <line x1="259" y1="240" x2="451" y2="240" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="355" y="235" text-anchor="middle" font-size="8.5" fill="#343a40">new CutoutSpecification.Parser()</text>

  <!-- Activation on CutoutSpecification -->
  <rect x="451" y="240" width="8" height="270" fill="#eef1f5" stroke="#4a7fb5"/>

  <!-- parse -->
  <line x1="459" y1="268" x2="510" y2="268" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="268" x2="510" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="286" x2="459" y2="286" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="516" y="277" font-size="8.5" fill="#343a40">parse(spec)</text>

  <!-- parseSpecWithoutDp -->
  <line x1="459" y1="305" x2="510" y2="305" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="305" x2="510" y2="323" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="323" x2="459" y2="323" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="516" y="314" font-size="8.5" fill="#343a40">parseSpecWithoutDp()</text>
  <text x="516" y="328" font-size="7.5" fill="#868e96">识别 @left @right @bottom @bind_left_cutout</text>

  <!-- parseSvgPathSpec -->
  <line x1="459" y1="348" x2="510" y2="348" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="348" x2="510" y2="366" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="366" x2="459" y2="366" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="516" y="357" font-size="8.5" fill="#343a40">parseSvgPathSpec()</text>

  <!-- createPathFromPathData to PathParser -->
  <line x1="459" y1="385" x2="646" y2="385" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="553" y="380" text-anchor="middle" font-size="8.5" fill="#343a40">createPathFromPathData(spec)</text>

  <!-- PathParser to HWUI -->
  <line x1="654" y1="400" x2="816" y2="400" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="735" y="395" text-anchor="middle" font-size="8" fill="#868e96">native 解析 SVG 路径</text>

  <!-- Return path -->
  <line x1="816" y1="415" x2="654" y2="415" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ao)"/>
  <text x="735" y="428" text-anchor="middle" font-size="7.5" fill="#868e96">newPath</text>

  <line x1="646" y1="430" x2="459" y2="430" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ao)"/>

  <!-- computeBoundsRect -->
  <line x1="459" y1="448" x2="510" y2="448" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="448" x2="510" y2="466" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="466" x2="459" y2="466" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="516" y="457" font-size="8" fill="#343a40">computeBoundsRectAndAddToRegion()</text>

  <!-- setEdgeCutout -->
  <line x1="459" y1="483" x2="510" y2="483" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="483" x2="510" y2="498" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="498" x2="459" y2="498" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="516" y="490" font-size="8" fill="#343a40">setEdgeCutout()</text>

  <!-- Return cutoutSpec -->
  <line x1="451" y1="520" x2="259" y2="520" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ao)"/>
  <text x="355" y="515" text-anchor="middle" font-size="7.5" fill="#868e96">cutoutSpec</text>

  <!-- new DisplayCutout -->
  <line x1="259" y1="540" x2="310" y2="540" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="540" x2="310" y2="555" stroke="#555" stroke-width="1"/>
  <line x1="310" y1="555" x2="259" y2="555" stroke="#555" stroke-width="1" marker-end="url(#ao)"/>
  <text x="316" y="548" font-size="8.5" fill="#2e7d32" font-weight="600">new DisplayCutout(...)</text>

  <!-- Return to LocalDisplayDevice -->
  <line x1="251" y1="570" x2="84" y2="570" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ao)"/>
  <text x="168" y="565" text-anchor="middle" font-size="7.5" fill="#868e96">Pair&lt;Path, DisplayCutout&gt;</text>
</svg>
