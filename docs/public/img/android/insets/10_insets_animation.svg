<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500">
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
  </defs>

  <!-- Swimlane headers -->
  <text x="120" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#4a7fb5">Client (应用进程)</text>
  <text x="560" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">Server (system_server)</text>

  <!-- Swimlane divider -->
  <line x1="340" y1="34" x2="340" y2="490" stroke="#ced4da" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Step 1: relayoutWindow -->
  <rect x="30" y="46" width="200" height="36" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="130" y="68" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">ViewRootImpl#relayoutWindow</text>

  <line x1="230" y1="64" x2="380" y2="64" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="305" y="56" text-anchor="middle" font-size="8" fill="#868e96">Binder IPC</text>

  <!-- Server relayoutWindow -->
  <rect x="380" y="46" width="220" height="48" rx="3" fill="#fef8ee" stroke="#adb5bd"/>
  <text x="490" y="64" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WMS#relayoutWindow</text>
  <text x="490" y="80" text-anchor="middle" font-size="8" fill="#495057">fillInsetsState + getInsetsSourceControls</text>

  <!-- Return InsetsState + Controls -->
  <line x1="380" y1="94" x2="230" y2="120" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="305" y="100" text-anchor="middle" font-size="8" fill="#868e96">InsetsState + InsetsSourceControl[]</text>

  <!-- handleInsetsControlChanged -->
  <rect x="30" y="120" width="200" height="36" rx="3" fill="white" stroke="#4a7fb5"/>
  <text x="130" y="142" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">handleInsetsControlChanged</text>

  <line x1="130" y1="156" x2="130" y2="176" stroke="#4a7fb5" stroke-width="1" marker-end="url(#a)"/>

  <!-- InsetsController.onControlsChanged -->
  <rect x="20" y="176" width="220" height="48" rx="3" fill="#fff0f0" stroke="#e07070"/>
  <text x="130" y="194" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">InsetsController#onControlsChanged</text>
  <text x="130" y="210" text-anchor="middle" font-size="8" fill="#495057">遍历 SourceConsumers, 分发 control</text>

  <line x1="130" y1="224" x2="130" y2="244" stroke="#4a7fb5" stroke-width="1" marker-end="url(#a)"/>

  <!-- consumer.setControl -->
  <rect x="30" y="244" width="200" height="48" rx="3" fill="white" stroke="#4a7fb5"/>
  <text x="130" y="262" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">consumer.setControl</text>
  <text x="130" y="278" text-anchor="middle" font-size="8" fill="#495057">收集 showTypes / hideTypes</text>

  <line x1="130" y1="292" x2="130" y2="312" stroke="#4a7fb5" stroke-width="1" marker-end="url(#a)"/>

  <!-- controlAnimation -->
  <rect x="20" y="312" width="220" height="48" rx="3" fill="white" stroke="#4a7fb5"/>
  <text x="130" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">InsetsController#controlAnimation</text>
  <text x="130" y="346" text-anchor="middle" font-size="8" fill="#495057">创建 InsetsAnimationControlRunner</text>

  <line x1="130" y1="360" x2="130" y2="380" stroke="#4a7fb5" stroke-width="1" marker-end="url(#a)"/>

  <!-- Animation loop -->
  <rect x="20" y="380" width="220" height="56" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="130" y="398" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">setInsetsAndAlpha</text>
  <text x="130" y="414" text-anchor="middle" font-size="8" fill="#495057">fraction: 0.0 → 1.0 (~300ms)</text>
  <text x="130" y="428" text-anchor="middle" font-size="8" fill="#495057">通过 mLeash 控制窗口位置</text>

  <line x1="130" y1="436" x2="130" y2="456" stroke="#4a7fb5" stroke-width="1" marker-end="url(#a)"/>

  <!-- onAnimationFinish -->
  <rect x="30" y="456" width="200" height="30" rx="3" fill="#eef5f1" stroke="#2e7d32"/>
  <text x="130" y="476" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">onAnimationFinish</text>

  <!-- Server side: InsetsPolicy interaction -->
  <rect x="380" y="176" width="220" height="48" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="490" y="194" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">InsetsPolicy</text>
  <text x="490" y="210" text-anchor="middle" font-size="8" fill="#495057">updateBarControlTarget</text>

  <line x1="490" y1="224" x2="490" y2="250" stroke="#555" stroke-width="1" marker-end="url(#a)"/>

  <rect x="380" y="250" width="220" height="48" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="490" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">InsetsSourceProvider</text>
  <text x="490" y="284" text-anchor="middle" font-size="8" fill="#495057">分配 InsetsSourceControl 给目标</text>

  <!-- Notify -->
  <line x1="380" y1="274" x2="240" y2="332" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="320" y="296" font-size="7.5" fill="#868e96">控制权变更通知</text>

  <!-- Key objects -->
  <rect x="400" y="330" width="180" height="70" rx="3" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="490" y="348" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">InsetsSourceControl</text>
  <text x="490" y="364" text-anchor="middle" font-size="8" fill="#495057">mType: statusBars|navBars</text>
  <text x="490" y="378" text-anchor="middle" font-size="8" fill="#495057">mLeash: SurfaceControl</text>
  <text x="490" y="392" text-anchor="middle" font-size="8" fill="#495057">mInsetsHint: Insets</text>
</svg>
