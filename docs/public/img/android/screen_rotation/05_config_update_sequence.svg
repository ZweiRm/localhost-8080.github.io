<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="al" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="7,0 0,2.5 7,5" fill="#555"/>
    </marker>
  </defs>

  <text x="480" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">sendNewConfiguration 流程（时序图）</text>

  <!-- Participants -->
  <rect x="15" y="35" width="80" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="55" y="53" text-anchor="middle" font-size="9" fill="#495057">Transition</text>

  <rect x="145" y="35" width="110" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="200" y="53" text-anchor="middle" font-size="9" fill="#495057">DisplayContent</text>

  <rect x="315" y="35" width="170" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="400" y="53" text-anchor="middle" font-size="9" fill="#495057">ActivityTaskManagerService</text>

  <rect x="545" y="35" width="150" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="620" y="53" text-anchor="middle" font-size="9" fill="#495057">RootWindowContainer</text>

  <rect x="755" y="35" width="130" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="820" y="53" text-anchor="middle" font-size="9" fill="#495057">ConfigurationContainer</text>

  <!-- Lifelines -->
  <line x1="55" y1="63" x2="55" y2="410" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="63" x2="200" y2="410" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="63" x2="400" y2="410" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="63" x2="620" y2="410" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="820" y1="63" x2="820" y2="410" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 1 -->
  <line x1="55" y1="90" x2="200" y2="90" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="127" y="85" text-anchor="middle" font-size="9" fill="#495057">sendNewConfiguration()</text>

  <!-- Step 2 -->
  <line x1="200" y1="120" x2="400" y2="120" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="300" y="115" text-anchor="middle" font-size="8.5" fill="#495057">updateDisplayOverrideConfigurationLocked()</text>

  <!-- Step 3 -->
  <line x1="400" y1="150" x2="620" y2="150" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="510" y="145" text-anchor="middle" font-size="9" fill="#495057">updateGlobalConfigurationLocked()</text>

  <!-- Step 4 -->
  <line x1="620" y1="180" x2="820" y2="180" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="720" y="175" text-anchor="middle" font-size="9" fill="#495057">onConfigurationChanged()</text>

  <!-- Step 5 -->
  <line x1="820" y1="210" x2="620" y2="210" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="720" y="205" text-anchor="middle" font-size="9" fill="#495057">dispatchConfigurationToChild()</text>

  <!-- Step 6 -->
  <line x1="620" y1="240" x2="200" y2="240" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="410" y="235" text-anchor="middle" font-size="8.5" fill="#495057">performDisplayOverrideConfigUpdate()</text>

  <!-- Step 7 -->
  <line x1="200" y1="270" x2="200" y2="285" stroke="#555" stroke-width="1"/>
  <rect x="105" y="270" width="190" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.5"/>
  <text x="200" y="281" text-anchor="middle" font-size="8.5" fill="#c0392b">onRequestedOverrideConfigurationChanged()</text>

  <!-- Step 7a -->
  <rect x="105" y="295" width="190" height="16" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.5"/>
  <text x="200" y="306" text-anchor="middle" font-size="8.5" fill="#c0392b">applyRotationAndFinishFixedRotation()</text>

  <!-- Step 8 -->
  <line x1="400" y1="340" x2="400" y2="355" stroke="#555" stroke-width="1"/>
  <rect x="290" y="340" width="220" height="16" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.5"/>
  <text x="400" y="351" text-anchor="middle" font-size="8.5" fill="#495057">ensureConfigAndVisibilityAfterUpdate()</text>

  <!-- Step 9 -->
  <rect x="290" y="370" width="220" height="16" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.5"/>
  <text x="400" y="381" text-anchor="middle" font-size="8.5" fill="#2e7d32">ensureActivityConfiguration() → relaunch?</text>
</svg>
