<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 780" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="al" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="7,0 0,2.5 7,5" fill="#555"/>
    </marker>
  </defs>

  <text x="580" y="18" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Sensor 触发冻屏旋转完整流程（时序图）</text>

  <!-- Participants -->
  <rect x="5" y="30" width="100" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="55" y="48" text-anchor="middle" font-size="8.5" fill="#495057">OrientationListener</text>

  <rect x="130" y="30" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="180" y="48" text-anchor="middle" font-size="8.5" fill="#495057">WMS</text>

  <rect x="260" y="30" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="310" y="48" text-anchor="middle" font-size="8.5" fill="#495057">DisplayContent</text>

  <rect x="395" y="30" width="100" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="445" y="48" text-anchor="middle" font-size="8.5" fill="#495057">DisplayRotation</text>

  <rect x="530" y="30" width="120" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="590" y="48" text-anchor="middle" font-size="8.5" fill="#495057">TransitionController</text>

  <rect x="685" y="30" width="80" height="28" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="725" y="48" text-anchor="middle" font-size="8.5" fill="#495057">Shell</text>

  <rect x="800" y="30" width="130" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="865" y="48" text-anchor="middle" font-size="8.5" fill="#495057">ScreenRotationAnim</text>

  <rect x="965" y="30" width="80" height="28" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="1005" y="48" text-anchor="middle" font-size="8.5" fill="#495057">ATMS</text>

  <!-- Lifelines -->
  <line x1="55" y1="58" x2="55" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="58" x2="180" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="310" y1="58" x2="310" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="445" y1="58" x2="445" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="590" y1="58" x2="590" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="725" y1="58" x2="725" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="865" y1="58" x2="865" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1005" y1="58" x2="1005" y2="770" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Phase divider: 旋转判定 -->
  <rect x="0" y="68" width="1155" height="16" rx="0" fill="#f8f9fa" stroke="none"/>
  <text x="580" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#868e96">阶段一：旋转判定</text>

  <!-- 1. onProposedRotationChanged -->
  <line x1="55" y1="100" x2="180" y2="100" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="117" y="95" text-anchor="middle" font-size="8.5" fill="#495057">1. updateRotation()</text>

  <!-- 2. updateRotationUnchecked (WMS→DC) -->
  <line x1="180" y1="125" x2="310" y2="125" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="245" y="120" text-anchor="middle" font-size="8.5" fill="#495057">2. updateRotationUnchecked()</text>

  <!-- 3. DC → DR -->
  <line x1="310" y1="150" x2="445" y2="150" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="378" y="145" text-anchor="middle" font-size="8.5" fill="#495057">3. updateRotationUnchecked()</text>

  <!-- 4. rotationForOrientation -->
  <rect x="395" y="165" width="100" height="14" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.5"/>
  <text x="445" y="176" text-anchor="middle" font-size="8" fill="#495057">4. rotationForOrientation()</text>

  <!-- 5. mRotation = rotation -->
  <rect x="395" y="190" width="100" height="14" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="0.5"/>
  <text x="445" y="201" text-anchor="middle" font-size="8" fill="#c0392b">5. mRotation = rotation</text>

  <!-- Phase divider: 旋转动画准备 -->
  <rect x="0" y="215" width="1155" height="16" rx="0" fill="#f8f9fa" stroke="none"/>
  <text x="580" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#868e96">阶段二：Transition 创建与动画准备</text>

  <!-- 6. requestChangeTransition -->
  <line x1="445" y1="245" x2="310" y2="245" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="378" y="240" text-anchor="middle" font-size="8.5" fill="#495057">6. requestChangeTransition()</text>

  <!-- 7. requestStartDisplayTransition -->
  <line x1="310" y1="270" x2="590" y2="270" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="450" y="265" text-anchor="middle" font-size="8.5" fill="#495057">7. requestStartDisplayTransition()</text>

  <!-- 8. createTransition + moveToCollecting -->
  <rect x="540" y="282" width="100" height="14" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.5"/>
  <text x="590" y="293" text-anchor="middle" font-size="8" fill="#495057">8. createTransition()</text>

  <!-- 9. requestStartTransition to Shell -->
  <line x1="590" y1="310" x2="725" y2="310" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="658" y="305" text-anchor="middle" font-size="8.5" fill="#495057">9. requestStartTransition()</text>

  <!-- 10. Shell startTransition callback -->
  <line x1="725" y1="340" x2="590" y2="340" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="658" y="335" text-anchor="middle" font-size="8.5" fill="#495057">10. startTransition()</text>

  <!-- 11. collect display change -->
  <line x1="310" y1="365" x2="590" y2="365" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="450" y="360" text-anchor="middle" font-size="8.5" fill="#495057">11. collect(display) + 截图</text>

  <!-- Phase divider: Configuration 更新 -->
  <rect x="0" y="385" width="1155" height="16" rx="0" fill="#f8f9fa" stroke="none"/>
  <text x="580" y="397" text-anchor="middle" font-size="9" font-weight="600" fill="#868e96">阶段三：Configuration 更新</text>

  <!-- 12. sendNewConfiguration -->
  <line x1="310" y1="415" x2="1005" y2="415" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="658" y="410" text-anchor="middle" font-size="8.5" fill="#495057">12. sendNewConfiguration() → updateGlobalConfigurationLocked()</text>

  <!-- 13. onConfigurationChanged cascade -->
  <line x1="1005" y1="440" x2="310" y2="440" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="658" y="435" text-anchor="middle" font-size="8.5" fill="#495057">13. onConfigurationChanged() → applyRotation()</text>

  <!-- 14. ensureActivityConfiguration -->
  <rect x="935" y="455" width="140" height="14" rx="2" fill="white" stroke="#adb5bd" stroke-width="0.5"/>
  <text x="1005" y="466" text-anchor="middle" font-size="8" fill="#495057">14. ensureActivityConfiguration()</text>

  <!-- Phase divider: 动画执行 -->
  <rect x="0" y="480" width="1155" height="16" rx="0" fill="#f8f9fa" stroke="none"/>
  <text x="580" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#868e96">阶段四：旋转动画执行与结束</text>

  <!-- 15. Sync finished → onTransitionReady -->
  <line x1="590" y1="510" x2="725" y2="510" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="658" y="505" text-anchor="middle" font-size="8.5" fill="#495057">15. onTransitionReady(TransitionInfo)</text>

  <!-- 16. startAnimation -->
  <line x1="725" y1="540" x2="865" y2="540" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
  <text x="795" y="535" text-anchor="middle" font-size="8.5" fill="#495057">16. startRotationAnimation()</text>

  <!-- 17. ScreenRotationAnimation -->
  <rect x="800" y="555" width="130" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="0.5"/>
  <text x="865" y="570" text-anchor="middle" font-size="8" fill="#495057">17. buildAnimation()</text>
  <text x="865" y="582" text-anchor="middle" font-size="8" fill="#868e96">ValueAnimator 逐帧驱动</text>
  <text x="865" y="592" text-anchor="middle" font-size="8" fill="#868e96">applyTransformation()</text>

  <!-- 18. Animation finished -->
  <line x1="865" y1="610" x2="725" y2="610" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="795" y="605" text-anchor="middle" font-size="8.5" fill="#495057">18. finishCallback → 动画结束</text>

  <!-- 19. finishTransition -->
  <line x1="725" y1="640" x2="590" y2="640" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="658" y="635" text-anchor="middle" font-size="8.5" fill="#495057">19. finishTransition()</text>

  <!-- Phase divider: 布局更新 -->
  <rect x="0" y="660" width="1155" height="16" rx="0" fill="#f8f9fa" stroke="none"/>
  <text x="580" y="672" text-anchor="middle" font-size="9" font-weight="600" fill="#868e96">阶段五：应用端布局更新</text>

  <!-- 20. reportResized -->
  <line x1="310" y1="695" x2="55" y2="695" stroke="#555" stroke-width="1" marker-end="url(#al)"/>
  <text x="183" y="690" text-anchor="middle" font-size="8.5" fill="#495057">20. WindowState.reportResized() → IPC</text>

  <!-- 21. App performTraversals -->
  <rect x="5" y="710" width="100" height="40" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.5"/>
  <text x="55" y="725" text-anchor="middle" font-size="8" fill="#2e7d32">21. App 端:</text>
  <text x="55" y="737" text-anchor="middle" font-size="8" fill="#2e7d32">performTraversals()</text>
  <text x="55" y="747" text-anchor="middle" font-size="8" fill="#2e7d32">measure→layout→draw</text>
</svg>
