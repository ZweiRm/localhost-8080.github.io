<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="24" font-size="14" fill="#212121" font-weight="700" text-anchor="middle">Window Management Architecture (Android S+)</text>

  <!-- Three columns -->
  <!-- WM Shell -->
  <rect x="20" y="44" width="260" height="230" rx="6" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5"/>
  <rect x="60" y="56" width="180" height="28" rx="14" fill="#1e88e5"/>
  <text x="150" y="75" font-size="12" fill="white" font-weight="600" text-anchor="middle">WM Shell</text>

  <text x="36" y="104" font-size="9.5" fill="#37474f">UI 显示层 / 定制层</text>
  <text x="36" y="122" font-size="9.5" fill="#37474f">运行在 SystemUI 进程</text>
  <text x="36" y="140" font-size="9.5" fill="#37474f">OEM 可进行差异化定制</text>
  <text x="36" y="158" font-size="9.5" fill="#37474f">AOSP 包含默认实现</text>
  <text x="36" y="176" font-size="9.5" fill="#37474f">定制部分可闭源</text>
  <text x="36" y="198" font-size="9.5" fill="#37474f" font-weight="600">Android R 开始，S 完善</text>
  <text x="36" y="220" font-size="9" fill="#78909c">负责: 分屏 / PIP / 小窗</text>
  <text x="36" y="236" font-size="9" fill="#78909c">单手模式 / Transition 动画</text>
  <text x="36" y="252" font-size="9" fill="#78909c">TaskOrganizer / DAOrganizer</text>

  <!-- WM Core -->
  <rect x="300" y="44" width="260" height="230" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5"/>
  <rect x="340" y="56" width="180" height="28" rx="14" fill="#37474f"/>
  <text x="430" y="75" font-size="12" fill="white" font-weight="600" text-anchor="middle">WM Core</text>

  <text x="316" y="104" font-size="9.5" fill="#37474f">策略执行与一致性层</text>
  <text x="316" y="122" font-size="9.5" fill="#37474f">运行在 system_server 进程</text>
  <text x="316" y="140" font-size="9.5" fill="#37474f" font-weight="600">Mainline 模块 (所有设备统一)</text>
  <text x="316" y="158" font-size="9.5" fill="#37474f">在 AOSP 中开发维护</text>
  <text x="316" y="180" font-size="9.5" fill="#37474f" font-weight="600">Android S 开始</text>
  <text x="316" y="202" font-size="9" fill="#78909c">包含: WMS / ATMS</text>
  <text x="316" y="218" font-size="9" fill="#78909c">窗口层级 / 生命周期管理</text>
  <text x="316" y="234" font-size="9" fill="#78909c">DisplayArea 层级构建</text>
  <text x="316" y="250" font-size="9" fill="#78909c">SurfaceControl 管理</text>

  <!-- WM Jetpack -->
  <rect x="580" y="44" width="260" height="230" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <rect x="620" y="56" width="180" height="28" rx="14" fill="#43a047"/>
  <text x="710" y="75" font-size="12" fill="white" font-weight="600" text-anchor="middle">WM Jetpack</text>

  <text x="596" y="104" font-size="9.5" fill="#37474f">API 层 / WM 支持库</text>
  <text x="596" y="122" font-size="9.5" fill="#37474f">运行在 App 进程</text>
  <text x="596" y="140" font-size="9.5" fill="#37474f">在 AOSP 中开发，开源维护</text>
  <text x="596" y="162" font-size="9.5" fill="#37474f" font-weight="600">2020 年启动，独立于平台发布</text>
  <text x="596" y="184" font-size="9" fill="#78909c">提供: WindowManager API</text>
  <text x="596" y="200" font-size="9" fill="#78909c">Activity Embedding</text>
  <text x="596" y="216" font-size="9" fill="#78909c">窗口尺寸类 (WindowSizeClass)</text>
  <text x="596" y="232" font-size="9" fill="#78909c">FoldingFeature 支持</text>

  <!-- IPC arrows between layers -->
  <line x1="280" y1="290" x2="300" y2="290" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="290" y="305" font-size="8" fill="#78909c" text-anchor="middle">AIDL</text>
  <line x1="560" y1="290" x2="580" y2="290" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="570" y="305" font-size="8" fill="#78909c" text-anchor="middle">API</text>

  <!-- Bottom: SurfaceFlinger -->
  <rect x="300" y="310" width="260" height="26" rx="3" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text x="430" y="328" font-size="10" fill="#37474f" font-weight="600" text-anchor="middle">SurfaceFlinger (Native)</text>
  <line x1="430" y1="274" x2="430" y2="310" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="438" y="296" font-size="8" fill="#78909c">SurfaceControl</text>
</svg>
