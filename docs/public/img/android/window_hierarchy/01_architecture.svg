<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- App Process -->
  <rect x="20" y="20" width="740" height="70" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="40" y="42" font-size="10" fill="#4a7fb5" font-weight="600">App Process</text>
  <rect x="40" y="50" width="140" height="28" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="110" y="69" font-size="10" fill="#343a40" text-anchor="middle">WM Jetpack</text>
  <text x="200" y="69" font-size="9" fill="#868e96">运行在 App 进程，AOSP 开发维护</text>

  <!-- SystemUI Process -->
  <rect x="20" y="110" width="740" height="70" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="40" y="132" font-size="10" fill="#4a7fb5" font-weight="600">SystemUI Process</text>
  <rect x="40" y="140" width="140" height="28" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="110" y="159" font-size="10" fill="#343a40" text-anchor="middle">WM Shell</text>
  <text x="200" y="159" font-size="9" fill="#868e96">UI 显示层，OEM 差异化定制（分屏/PIP/单手模式等）</text>

  <!-- SystemServer Process -->
  <rect x="20" y="200" width="740" height="70" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="40" y="222" font-size="10" fill="#343a40" font-weight="600">system_server Process</text>
  <rect x="40" y="230" width="140" height="28" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="110" y="249" font-size="10" fill="#343a40" text-anchor="middle">WM Core</text>
  <text x="200" y="249" font-size="9" fill="#868e96">核心管理层（WMS / ATMS），窗口层级与状态管理</text>

  <!-- SurfaceFlinger -->
  <rect x="20" y="290" width="740" height="36" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="40" y="313" font-size="10" fill="#343a40" font-weight="600">Native Process</text>
  <rect x="200" y="295" width="140" height="26" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="270" y="313" font-size="10" fill="#343a40" text-anchor="middle">SurfaceFlinger</text>

  <!-- Arrows -->
  <line x1="110" y1="90" x2="110" y2="110" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="110" y1="180" x2="110" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="110" y1="270" x2="270" y2="295" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- IPC labels -->
  <text x="120" y="103" font-size="8" fill="#868e96">WindowManager API</text>
  <text x="120" y="193" font-size="8" fill="#868e96">IWindowOrganizerController (AIDL)</text>
  <text x="130" y="283" font-size="8" fill="#868e96">SurfaceControl (Binder)</text>
</svg>
