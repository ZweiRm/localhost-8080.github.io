<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- ConfigurationContainer -->
  <rect x="220" y="10" width="260" height="44" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="350" y="28" font-size="11" fill="#343a40" font-weight="600" text-anchor="middle">ConfigurationContainer&lt;E&gt;</text>
  <text x="350" y="44" font-size="9" fill="#868e96" text-anchor="middle">abstract | 配置容器基类</text>

  <!-- WindowContainer -->
  <rect x="220" y="80" width="260" height="44" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="350" y="98" font-size="11" fill="#343a40" font-weight="600" text-anchor="middle">WindowContainer&lt;E&gt;</text>
  <text x="350" y="114" font-size="9" fill="#868e96" text-anchor="middle">mChildren: ArrayList&lt;E&gt;</text>
  <line x1="350" y1="54" x2="350" y2="80" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- RootWindowContainer -->
  <rect x="10" y="160" width="200" height="44" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="110" y="178" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">RootWindowContainer</text>
  <text x="110" y="194" font-size="9" fill="#868e96" text-anchor="middle">WC&lt;DisplayContent&gt;</text>
  <line x1="280" y1="124" x2="110" y2="160" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- DisplayArea -->
  <rect x="250" y="160" width="200" height="44" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="350" y="178" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">DisplayArea&lt;T&gt;</text>
  <text x="350" y="194" font-size="9" fill="#868e96" text-anchor="middle">Type: ABOVE | BELOW | ANY</text>
  <line x1="350" y1="124" x2="350" y2="160" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- WindowState -->
  <rect x="490" y="160" width="200" height="44" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="590" y="178" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">WindowState</text>
  <text x="590" y="194" font-size="9" fill="#868e96" text-anchor="middle">对应一个窗口</text>
  <line x1="420" y1="124" x2="590" y2="160" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- DisplayArea.Dimmable / RootDisplayArea -->
  <rect x="180" y="240" width="160" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="260" y="262" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">RootDisplayArea</text>
  <line x1="320" y1="204" x2="260" y2="240" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="230" y="232" font-size="8" fill="#868e96">extends Dimmable</text>

  <!-- DisplayArea.Tokens -->
  <rect x="380" y="240" width="160" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="460" y="262" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">DisplayArea.Tokens</text>
  <line x1="380" y1="204" x2="460" y2="240" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="430" y="232" font-size="8" fill="#868e96">DA&lt;WindowToken&gt;</text>

  <!-- DisplayContent -->
  <rect x="120" y="300" width="160" height="34" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="200" y="322" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">DisplayContent</text>
  <line x1="260" y1="274" x2="200" y2="300" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- TaskDisplayArea -->
  <rect x="310" y="300" width="160" height="34" rx="3" fill="#eef1f5" stroke="#4a7fb5"/>
  <text x="390" y="322" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">TaskDisplayArea</text>
  <line x1="350" y1="204" x2="390" y2="300" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="400" y="293" font-size="8" fill="#868e96">DA&lt;WindowContainer&gt;</text>

  <!-- WindowToken / ActivityRecord -->
  <rect x="500" y="300" width="160" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="580" y="322" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">WindowToken</text>
  <line x1="590" y1="204" x2="580" y2="300" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Task -->
  <rect x="310" y="360" width="100" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="360" y="382" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">Task</text>
  <line x1="390" y1="334" x2="360" y2="360" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ActivityRecord -->
  <rect x="430" y="360" width="120" height="34" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="490" y="382" font-size="10" fill="#343a40" font-weight="600" text-anchor="middle">ActivityRecord</text>
  <line x1="540" y1="334" x2="490" y2="360" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="530" y="354" font-size="8" fill="#868e96">extends WindowToken</text>
</svg>
