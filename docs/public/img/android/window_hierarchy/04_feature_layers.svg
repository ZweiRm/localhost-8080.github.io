<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <!-- Layer axis -->
  <text x="10" y="15" font-size="9" fill="#343a40" font-weight="600">Layer</text>
  <line x1="60" y1="12" x2="800" y2="12" stroke="#ced4da" stroke-width="0.5"/>

  <!-- Layer numbers -->
  <g font-size="7" fill="#868e96" text-anchor="middle">
    <text x="70" y="10">0</text><text x="90" y="10">1</text><text x="110" y="10">2</text>
    <text x="150" y="10">3-12</text>
    <text x="210" y="10">13</text><text x="230" y="10">14</text><text x="250" y="10">15</text>
    <text x="270" y="10">16</text><text x="290" y="10">17</text><text x="310" y="10">18-23</text>
    <text x="370" y="10">24</text><text x="390" y="10">25</text><text x="420" y="10">26-27</text>
    <text x="460" y="10">28</text><text x="490" y="10">29-31</text>
    <text x="540" y="10">32</text><text x="570" y="10">33</text><text x="600" y="10">34</text>
    <text x="630" y="10">35</text>
  </g>

  <!-- Feature bars -->
  <!-- WindowedMagnification: 0-31, ID=4 -->
  <rect x="65" y="25" width="460" height="22" rx="2" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="290" y="40" font-size="9" fill="#4a7fb5" font-weight="600" text-anchor="middle">WindowedMagnification (ID=4) : Layer 0 ~ 31</text>

  <!-- HideDisplayCutout: 0-14, 16, 18-23, 26-31 (except 15,17,24,25) -->
  <rect x="65" y="52" width="170" height="22" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="150" y="67" font-size="8" fill="#343a40" text-anchor="middle">HideDisplayCutout (6)</text>
  <rect x="265" y="52" width="10" height="22" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <rect x="305" y="52" width="50" height="22" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <rect x="405" y="52" width="120" height="22" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <rect x="530" y="52" width="110" height="22" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="585" y="67" font-size="8" fill="#343a40" text-anchor="middle">32~35</text>

  <!-- OneHanded: 0-14, 15, 16, 17, 18-23, 26-31, 32, 34-35 (except 24,25,33) -->
  <rect x="65" y="79" width="170" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="150" y="94" font-size="8" fill="#2e7d32" text-anchor="middle">OneHanded (3)</text>
  <rect x="245" y="79" width="10" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <rect x="265" y="79" width="10" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <rect x="285" y="79" width="10" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <rect x="305" y="79" width="50" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <rect x="405" y="79" width="120" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <rect x="530" y="79" width="15" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <rect x="590" y="79" width="50" height="22" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>

  <!-- FullscreenMagnification: 0-12, 15-27, 29-31, 33-35 (except 13,14,28,24,25) -->
  <rect x="65" y="106" width="150" height="22" rx="2" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="140" y="121" font-size="8" fill="#343a40" text-anchor="middle">FullscreenMagnification (5)</text>
  <rect x="245" y="106" width="120" height="22" rx="2" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <rect x="405" y="106" width="60" height="22" rx="2" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <rect x="485" y="106" width="40" height="22" rx="2" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <rect x="560" y="106" width="80" height="22" rx="2" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>

  <!-- ImePlaceholder: 13-14 only -->
  <rect x="205" y="133" width="30" height="22" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="220" y="148" font-size="8" fill="#c0392b" text-anchor="middle">IME (7)</text>
  <text x="260" y="148" font-size="8" fill="#868e96">Layer 13~14</text>

  <!-- Legend note -->
  <text x="65" y="175" font-size="8" fill="#868e96">默认屏幕的 Feature 层级分布（仅 HideDisplayCutout 和 OneHanded 限默认屏幕）</text>
  <text x="65" y="188" font-size="8" fill="#868e96">Layer 2 = APPLICATION_LAYER (应用窗口) | Layer 13-14 = IME 窗口</text>
</svg>
