<svg xmlns="http://www.w3.org/2000/svg" width="750" height="500" viewBox="0 0 750 500">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#2e7d32"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Phase 1: Configuration初始化 -->
  <rect x="20" y="15" width="320" height="150" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="30" y="35" font-size="12" font-weight="600" fill="#343a40">Phase 1: Configuration初始化</text>

  <rect x="40" y="50" width="160" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="70" font-size="10" fill="#495057" text-anchor="middle">创建新Configuration</text>

  <line x1="120" y1="80" x2="120" y2="95" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="30" y="95" width="200" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="130" y="115" font-size="10" fill="#495057" text-anchor="middle">computeScreenConfiguration()</text>

  <line x1="130" y1="125" x2="130" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="30" y="140" width="290" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="175" y="160" font-size="10" fill="#495057" text-anchor="middle">根据DisplayInfo和Policy计算初始值</text>

  <!-- Arrow from Phase 1 to Phase 2 -->
  <line x1="175" y1="170" x2="175" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Phase 2: 更新全局Configuration -->
  <rect x="20" y="200" width="490" height="140" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="30" y="220" font-size="12" font-weight="600" fill="#343a40">Phase 2: 更新全局Configuration</text>

  <!-- Path A -->
  <text x="40" y="245" font-size="9" fill="#868e96">Path A: 直接通知进程</text>
  <rect x="40" y="250" width="200" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="140" y="270" font-size="10" fill="#495057" text-anchor="middle">遍历所有WindowProcessController</text>
  <line x1="240" y1="265" x2="260" y2="265" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="260" y="250" width="230" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="375" y="270" font-size="10" fill="#495057" text-anchor="middle">下发ConfigurationChangeItem给APP进程</text>

  <!-- Path B -->
  <text x="40" y="300" font-size="9" fill="#868e96">Path B: 遍历窗口树</text>
  <rect x="40" y="305" width="200" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="140" y="325" font-size="10" fill="#495057" text-anchor="middle">从RootWindowContainer开始</text>
  <line x1="240" y1="320" x2="260" y2="320" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="260" y="305" width="230" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="375" y="325" font-size="10" fill="#495057" text-anchor="middle">深度遍历窗口树,更新每个节点Configuration</text>

  <!-- Phase 3: ActivityRecord处理 -->
  <rect x="20" y="360" width="490" height="125" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="30" y="380" font-size="12" font-weight="600" fill="#343a40">Phase 3: ActivityRecord处理</text>

  <line x1="375" y1="335" x2="375" y2="355" stroke="#555" stroke-width="1.2"/>
  <line x1="375" y1="355" x2="160" y2="355" stroke="#555" stroke-width="1.2"/>
  <line x1="160" y1="355" x2="160" y2="390" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Diamond -->
  <polygon points="160,390 210,415 160,440 110,415" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="160" y="413" font-size="9" fill="#495057" text-anchor="middle">判断是否需要</text>
  <text x="160" y="423" font-size="9" fill="#495057" text-anchor="middle">Relaunch</text>

  <!-- Yes branch -->
  <line x1="210" y1="415" x2="240" y2="415" stroke="#555" stroke-width="1.2"/>
  <text x="222" y="410" font-size="9" fill="#868e96">Yes</text>
  <rect x="240" y="400" width="170" height="30" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="325" y="420" font-size="10" fill="#495057" text-anchor="middle">relaunchActivityLocked()</text>

  <!-- No branch -->
  <line x1="160" y1="440" x2="160" y2="460" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="165" y="455" font-size="9" fill="#868e96">No</text>
  <rect x="40" y="460" width="250" height="26" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="165" y="478" font-size="10" fill="#495057" text-anchor="middle">下发ActivityConfigurationChangeItem</text>

  <!-- Multi-window branch (right side) -->
  <rect x="540" y="15" width="190" height="150" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="550" y="35" font-size="12" font-weight="600" fill="#343a40">多窗口场景</text>

  <rect x="555" y="48" width="160" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="635" y="68" font-size="10" fill="#495057" text-anchor="middle">setBounds/setWindowMode</text>

  <line x1="635" y1="78" x2="635" y2="95" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="555" y="95" width="160" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="635" y="115" font-size="10" fill="#495057" text-anchor="middle">从变化节点开始更新</text>

  <!-- Multi-window to ActivityRecord processing -->
  <line x1="635" y1="125" x2="635" y2="165" stroke="#555" stroke-width="1.2"/>

  <!-- Branch to Phase 3 (ActivityRecord处理) -->
  <line x1="635" y1="165" x2="635" y2="415" stroke="#555" stroke-width="1.2"/>
  <line x1="635" y1="415" x2="510" y2="415" stroke="#555" stroke-width="1.2"/>
  <text x="545" y="408" font-size="9" fill="#868e96">ActivityRecord</text>
  <line x1="510" y1="415" x2="415" y2="415" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Branch to WPC notification -->
  <line x1="635" y1="165" x2="700" y2="165" stroke="#555" stroke-width="1.2"/>
  <line x1="700" y1="165" x2="700" y2="265" stroke="#555" stroke-width="1.2"/>
  <line x1="700" y1="265" x2="495" y2="265" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="705" y="220" font-size="9" fill="#868e96" transform="rotate(90,705,220)">WPC通知</text>
</svg>