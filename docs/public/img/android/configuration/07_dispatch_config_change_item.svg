<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450">
  <defs>
    <marker id="seq-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Participants -->
  <rect x="30" y="10" width="60" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="60" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ATMS</text>
  <line x1="60" y1="40" x2="60" y2="440" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="160" y="10" width="150" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="235" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">RootWindowContainer</text>
  <line x1="235" y1="40" x2="235" y2="440" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="380" y="10" width="110" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="435" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ActivityRecord</text>
  <line x1="435" y1="40" x2="435" y2="440" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="555" y="10" width="170" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="640" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">WindowProcessController</text>
  <line x1="640" y1="40" x2="640" y2="440" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="780" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="830" y="25" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">Configuration</text>
  <text x="830" y="36" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">ChangeItem</text>
  <line x1="830" y1="40" x2="830" y2="440" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Entry -->
  <rect x="10" y="52" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="15" y="64" font-size="8" fill="#495057" text-anchor="middle" transform="rotate(-90,15,64)">entry</text>
  <line x1="20" y1="60" x2="55" y2="60" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="25" y="55" font-size="9" fill="#495057">updateGlobalConfigurationLocked()</text>

  <!-- Activation bars -->
  <rect x="55" y="55" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>

  <!-- Path 1 label -->
  <rect x="10" y="95" width="880" height="120" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="20" y="110" font-size="10" font-weight="600" fill="#343a40">Path 1: 直接WPC通知</text>

  <!-- 1.1 onConfigurationChanged → RootWindowContainer -->
  <rect x="230" y="115" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="75" y="125" font-size="9" fill="#868e96">1.1</text>
  <line x1="65" y1="128" x2="230" y2="128" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="110" y="124" font-size="9" fill="#495057">onConfigurationChanged()</text>

  <!-- 调用WPC#onConfigurationChanged → WPC -->
  <rect x="635" y="140" width="10" height="60" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="245" y="150" font-size="9" fill="#868e96">1.1</text>
  <line x1="240" y1="153" x2="635" y2="153" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="400" y="149" font-size="9" fill="#495057">调用WPC#onConfigurationChanged()</text>

  <!-- 1.2 dispatchConfiguration (self WPC) -->
  <text x="650" y="170" font-size="9" fill="#868e96">1.2</text>
  <polyline points="645,173 675,173 675,188 645,188" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="680" y="181" font-size="9" fill="#495057">dispatchConfiguration()</text>

  <!-- 1.3 new ConfigurationChangeItem -->
  <text x="650" y="197" font-size="9" fill="#868e96">1.3</text>
  <line x1="645" y1="200" x2="825" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="700" y="196" font-size="9" fill="#495057">new ConfigurationChangeItem</text>
  <rect x="825" y="195" width="10" height="12" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>

  <!-- Path 2 label -->
  <rect x="10" y="225" width="880" height="205" rx="3" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="20" y="242" font-size="10" font-weight="600" fill="#343a40">Path 2: 窗口树遍历触发</text>

  <!-- 2.1 onConfigurationChanged → RootWindowContainer -->
  <rect x="230" y="252" width="10" height="20" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="75" y="262" font-size="9" fill="#868e96">2.1</text>
  <line x1="65" y1="265" x2="230" y2="265" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="110" y="261" font-size="9" fill="#495057">onConfigurationChanged()</text>

  <!-- 2.2 via tree → ActivityRecord -->
  <rect x="430" y="280" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="245" y="292" font-size="9" fill="#868e96">2.2</text>
  <line x1="240" y1="295" x2="430" y2="295" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="300" y="291" font-size="9" fill="#495057">onConfigurationChanged() (via tree)</text>

  <!-- 2.3 onMergedOverrideConfigurationChanged → WPC -->
  <rect x="635" y="315" width="10" height="110" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="445" y="327" font-size="9" fill="#868e96">2.3</text>
  <line x1="440" y1="330" x2="635" y2="330" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="480" y="326" font-size="9" fill="#495057">onMergedOverrideConfigurationChanged() (via listener)</text>

  <!-- 2.4 onRequestedOverrideConfigurationChanged (self WPC) -->
  <text x="650" y="350" font-size="9" fill="#868e96">2.4</text>
  <polyline points="645,353 675,353 675,368 645,368" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="680" y="361" font-size="8" fill="#495057">onRequestedOverrideConfigurationChanged()</text>

  <!-- 2.5 onConfigurationChanged (self WPC) -->
  <text x="650" y="378" font-size="9" fill="#868e96">2.5</text>
  <polyline points="645,381 675,381 675,396 645,396" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="680" y="389" font-size="9" fill="#495057">onConfigurationChanged()</text>

  <!-- 2.6 dispatchConfiguration (self WPC) -->
  <text x="650" y="405" font-size="9" fill="#868e96">2.6</text>
  <polyline points="645,408 675,408 675,423 645,423" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="680" y="416" font-size="9" fill="#495057">dispatchConfiguration()</text>

  <!-- 2.7 new ConfigurationChangeItem -->
  <text x="650" y="430" font-size="9" fill="#868e96">2.7</text>
  <line x1="645" y1="433" x2="825" y2="433" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="700" y="429" font-size="9" fill="#495057">new ConfigurationChangeItem</text>
  <rect x="825" y="428" width="10" height="12" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>
</svg>