<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="seq-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Participants -->
  <rect x="30" y="10" width="110" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="85" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">DisplayContent</text>
  <line x1="85" y1="40" x2="85" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="200" y="10" width="60" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="230" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ATMS</text>
  <line x1="230" y1="40" x2="230" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="340" y="10" width="110" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="395" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ActivityRecord</text>
  <line x1="395" y1="40" x2="395" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="580" y="10" width="160" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="660" y="25" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">ActivityConfiguration</text>
  <text x="660" y="36" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">ChangeItem</text>
  <line x1="660" y1="40" x2="660" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Entry -->
  <rect x="10" y="55" width="10" height="20" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <line x1="20" y1="65" x2="80" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>

  <!-- Activation bars -->
  <rect x="80" y="55" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="225" y="95" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="390" y="135" width="10" height="240" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>

  <!-- 0: updateDisplayOverrideConfigurationLocked -->
  <text x="15" y="62" font-size="9" fill="#868e96">0</text>
  <text x="90" y="72" font-size="9" fill="#495057">updateDisplayOverrideConfigurationLocked()</text>

  <!-- 1: ensureConfigAndVisibilityAfterUpdate → ATMS -->
  <text x="90" y="100" font-size="9" fill="#868e96">1</text>
  <line x1="90" y1="103" x2="225" y2="103" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="120" y="99" font-size="9" fill="#495057">ensureConfigAndVisibilityAfterUpdate()</text>

  <!-- 2: ensureActivityConfiguration → ActivityRecord -->
  <text x="240" y="142" font-size="9" fill="#868e96">2</text>
  <line x1="235" y1="145" x2="390" y2="145" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="275" y="141" font-size="9" fill="#495057">ensureActivityConfiguration()</text>

  <!-- Note box -->
  <rect x="420" y="155" width="280" height="55" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="430" y="170" font-size="9" fill="#495057">1. 根据上次下发的Configuration计算本次变化</text>
  <text x="430" y="183" font-size="9" fill="#495057">2. 判断是否需要relaunch</text>
  <text x="430" y="196" font-size="9" fill="#495057">3. 下发Configuration</text>
  <line x1="400" y1="175" x2="420" y2="175" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- 3: updateReportedConfigurationAndSend (self) -->
  <text x="405" y="230" font-size="9" fill="#868e96">3</text>
  <polyline points="400,233 430,233 430,248 400,248" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="435" y="241" font-size="9" fill="#495057">updateReportedConfigurationAndSend()</text>

  <!-- 4: shouldRelaunchLocked (self) -->
  <text x="405" y="265" font-size="9" fill="#868e96">4</text>
  <polyline points="400,268 430,268 430,283 400,283" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="435" y="276" font-size="9" fill="#495057">shouldRelaunchLocked()</text>

  <!-- 5: scheduleConfigurationChanged (self) -->
  <text x="405" y="300" font-size="9" fill="#868e96">5</text>
  <polyline points="400,303 430,303 430,318 400,318" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="435" y="311" font-size="9" fill="#495057">scheduleConfigurationChanged()</text>

  <!-- 6: new ActivityConfigurationChangeItem -->
  <text x="405" y="340" font-size="9" fill="#868e96">6</text>
  <line x1="400" y1="343" x2="655" y2="343" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="470" y="339" font-size="9" fill="#495057">new ActivityConfigurationChangeItem</text>
  <rect x="655" y="338" width="10" height="12" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>

  <!-- Return dashes -->
  <line x1="390" y1="375" x2="235" y2="375" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="225" y1="380" x2="90" y2="380" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
</svg>