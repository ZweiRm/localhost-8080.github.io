<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <defs>
    <marker id="inherit" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0,0 12,5 0,10" fill="white" stroke="#555" stroke-width="1"/>
    </marker>
    <marker id="dashed-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Context (abstract) -->
  <rect x="140" y="15" width="140" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="210" y="32" font-size="9" fill="#868e96" text-anchor="middle" font-style="italic">&lt;&lt;abstract&gt;&gt;</text>
  <text x="210" y="46" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">Context</text>

  <!-- ContextWrapper -->
  <rect x="100" y="110" width="140" height="50" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="170" y="132" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">ContextWrapper</text>
  <line x1="100" y1="138" x2="240" y2="138" stroke="#ced4da" stroke-width="0.8"/>
  <text x="110" y="152" font-size="9" fill="#868e96">mBase: Context</text>

  <!-- Inheritance: ContextWrapper → Context -->
  <line x1="170" y1="110" x2="170" y2="68" stroke="#555" stroke-width="1.2"/>
  <line x1="170" y1="68" x2="210" y2="68" stroke="#555" stroke-width="1.2"/>
  <line x1="210" y1="68" x2="210" y2="55" stroke="#555" stroke-width="1.2" marker-end="url(#inherit)"/>

  <!-- ContextImpl -->
  <rect x="320" y="110" width="140" height="40" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="390" y="135" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">ContextImpl</text>

  <!-- ContextImpl implements Context -->
  <line x1="390" y1="110" x2="390" y2="68" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="390" y1="68" x2="280" y2="68" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="280" y1="68" x2="256" y2="55" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#inherit)"/>

  <!-- Dashed delegation arrow: ContextWrapper.mBase → ContextImpl -->
  <line x1="240" y1="145" x2="320" y2="135" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#dashed-arrow)"/>
  <text x="270" y="128" font-size="9" fill="#868e96" text-anchor="middle">delegates to</text>

  <!-- Application -->
  <rect x="20" y="210" width="120" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="80" y="232" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">Application</text>
  <!-- Inheritance arrow -->
  <line x1="80" y1="210" x2="80" y2="185" stroke="#555" stroke-width="1.2"/>
  <line x1="80" y1="185" x2="170" y2="185" stroke="#555" stroke-width="1.2"/>
  <line x1="170" y1="185" x2="170" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#inherit)"/>

  <!-- Service -->
  <rect x="155" y="210" width="100" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="205" y="232" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">Service</text>
  <!-- Inheritance arrow -->
  <line x1="205" y1="210" x2="205" y2="185" stroke="#555" stroke-width="1.2"/>
  <line x1="205" y1="185" x2="170" y2="185" stroke="#555" stroke-width="1.2"/>

  <!-- ContextThemeWrapper -->
  <rect x="110" y="285" width="180" height="35" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="200" y="307" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">ContextThemeWrapper</text>
  <!-- Inheritance arrow -->
  <line x1="200" y1="285" x2="200" y2="270" stroke="#555" stroke-width="1.2"/>
  <line x1="200" y1="270" x2="140" y2="270" stroke="#555" stroke-width="1.2"/>
  <line x1="140" y1="270" x2="140" y2="185" stroke="#555" stroke-width="1.2"/>

  <!-- Activity -->
  <rect x="150" y="360" width="100" height="35" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="200" y="382" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">Activity</text>
  <!-- Inheritance arrow -->
  <line x1="200" y1="360" x2="200" y2="320" stroke="#555" stroke-width="1.2" marker-end="url(#inherit)"/>
</svg>