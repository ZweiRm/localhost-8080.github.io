<svg xmlns="http://www.w3.org/2000/svg" width="850" height="380" viewBox="0 0 850 380">
  <defs>
    <marker id="seq-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Participants -->
  <rect x="30" y="10" width="100" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.2"/>
  <text x="80" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ActivityThread</text>
  <line x1="80" y1="40" x2="80" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="195" y="10" width="140" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="265" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ConfigurationController</text>
  <line x1="265" y1="40" x2="265" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="395" y="10" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="460" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ResourcesManager</text>
  <line x1="460" y1="40" x2="460" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="580" y="10" width="110" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="635" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ResourcesImpl</text>
  <line x1="635" y1="40" x2="635" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="745" y="10" width="90" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="790" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">Application</text>
  <line x1="790" y1="40" x2="790" y2="370" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ConfigurationChangeItem label -->
  <rect x="10" y="52" width="140" height="16" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.6"/>
  <text x="80" y="64" font-size="8" fill="#495057" text-anchor="middle">ConfigurationChangeItem</text>

  <!-- Activation bars -->
  <rect x="75" y="68" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="260" y="100" width="10" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="455" y="170" width="10" height="50" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="630" y="210" width="10" height="55" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="785" y="300" width="10" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>

  <!-- 0: handleConfigurationChanged → ActivityThread -->
  <text x="15" y="78" font-size="9" fill="#868e96">0</text>
  <line x1="20" y1="80" x2="75" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="90" y="85" font-size="9" fill="#495057">handleConfigurationChanged()</text>

  <!-- 1: handleConfigurationChanged → ConfigurationController -->
  <text x="90" y="108" font-size="9" fill="#868e96">1</text>
  <line x1="85" y1="110" x2="260" y2="110" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="130" y="107" font-size="9" fill="#495057">handleConfigurationChanged()</text>

  <!-- 2: handleConfigurationChangedInner (self) -->
  <text x="275" y="133" font-size="9" fill="#868e96">2</text>
  <polyline points="270,136 300,136 300,151 270,151" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="305" y="144" font-size="9" fill="#495057">handleConfigurationChangedInner()</text>

  <!-- 3: applyConfigurationToResources → ResourcesManager -->
  <text x="275" y="170" font-size="9" fill="#868e96">3</text>
  <line x1="270" y1="173" x2="455" y2="173" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="330" y="169" font-size="9" fill="#495057">applyConfigurationToResources()</text>

  <!-- 4: updateConfiguration → ResourcesImpl (for each) -->
  <text x="470" y="215" font-size="9" fill="#868e96">4</text>
  <line x1="465" y1="218" x2="630" y2="218" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="510" y="214" font-size="9" fill="#495057">updateConfiguration() (for each)</text>

  <!-- Highlight box: 更新ResourcesImpl中Configuration -->
  <rect x="650" y="222" width="185" height="20" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="742" y="236" font-size="9" fill="#495057" text-anchor="middle">更新ResourcesImpl中Configuration</text>

  <!-- 5: updateConfigurationImpl (self ResourcesImpl) -->
  <text x="645" y="250" font-size="9" fill="#868e96">5</text>
  <polyline points="640,253 670,253 670,268 640,268" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="675" y="261" font-size="9" fill="#495057">updateConfigurationImpl()</text>

  <!-- Return dashes from ResourcesImpl → ResourcesManager -->
  <line x1="630" y1="275" x2="465" y2="275" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Return from ResourcesManager → ConfigurationController -->
  <line x1="455" y1="285" x2="270" y2="285" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 6: onConfigurationChanged → Application -->
  <text x="275" y="308" font-size="9" fill="#868e96">6</text>
  <line x1="270" y1="310" x2="785" y2="310" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="500" y="306" font-size="9" fill="#495057">onConfigurationChanged()</text>

  <!-- Highlight box: 调用非Activity Context的onConfigurationChanged() -->
  <rect x="555" y="325" width="280" height="20" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="695" y="339" font-size="9" fill="#495057" text-anchor="middle">调用非Activity Context的onConfigurationChanged()</text>

  <!-- Return -->
  <line x1="785" y1="350" x2="270" y2="350" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
</svg>