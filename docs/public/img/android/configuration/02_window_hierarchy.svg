<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480">
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- RootWindowContainer -->
  <rect x="180" y="10" width="220" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="290" y="30" font-size="11" font-weight="600" fill="#343a40" text-anchor="middle">RootWindowContainer</text>
  <line x1="290" y1="40" x2="290" y2="55" stroke="#555" stroke-width="1.2"/>

  <!-- DisplayContent -->
  <rect x="190" y="55" width="200" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="290" y="75" font-size="10" fill="#495057" text-anchor="middle">DisplayContent "Display 0"</text>
  <line x1="290" y1="85" x2="290" y2="100" stroke="#555" stroke-width="1.2"/>

  <!-- WindowedMagnification -->
  <rect x="180" y="100" width="220" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="290" y="120" font-size="10" fill="#495057" text-anchor="middle">WindowedMagnification</text>
  <line x1="290" y1="130" x2="290" y2="145" stroke="#555" stroke-width="1.2"/>

  <!-- HideDisplayCutout -->
  <rect x="195" y="145" width="190" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="165" font-size="10" fill="#495057" text-anchor="middle">HideDisplayCutout</text>
  <line x1="290" y1="175" x2="290" y2="190" stroke="#555" stroke-width="1.2"/>

  <!-- OneHanded -->
  <rect x="225" y="190" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="210" font-size="10" fill="#495057" text-anchor="middle">OneHanded</text>
  <line x1="290" y1="220" x2="290" y2="235" stroke="#555" stroke-width="1.2"/>

  <!-- FullscreenMagnification -->
  <rect x="190" y="235" width="200" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="255" font-size="10" fill="#495057" text-anchor="middle">FullscreenMagnification</text>
  <line x1="290" y1="265" x2="290" y2="280" stroke="#555" stroke-width="1.2"/>

  <!-- DefaultTaskDisplayArea -->
  <rect x="180" y="280" width="220" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="300" font-size="10" fill="#495057" text-anchor="middle">DefaultTaskDisplayArea</text>
  <line x1="290" y1="310" x2="290" y2="325" stroke="#555" stroke-width="1.2"/>

  <!-- Task -->
  <rect x="245" y="325" width="90" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="345" font-size="10" fill="#495057" text-anchor="middle">Task</text>
  <line x1="290" y1="355" x2="290" y2="370" stroke="#555" stroke-width="1.2"/>

  <!-- ActivityRecord (highlighted) -->
  <rect x="215" y="370" width="150" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="290" y="390" font-size="10" font-weight="600" fill="#495057" text-anchor="middle">ActivityRecord</text>
  <line x1="290" y1="400" x2="290" y2="415" stroke="#555" stroke-width="1.2"/>

  <!-- WindowState -->
  <rect x="225" y="415" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="290" y="435" font-size="10" fill="#495057" text-anchor="middle">WindowState</text>

  <!-- Indentation guide lines (left side) -->
  <line x1="170" y1="25" x2="180" y2="25" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="170" y1="25" x2="170" y2="70" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="170" y1="70" x2="190" y2="70" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="160" y1="70" x2="160" y2="115" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="160" y1="115" x2="180" y2="115" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="150" y1="115" x2="150" y2="160" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="150" y1="160" x2="195" y2="160" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="140" y1="160" x2="140" y2="205" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="140" y1="205" x2="225" y2="205" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="130" y1="205" x2="130" y2="250" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="130" y1="250" x2="190" y2="250" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="120" y1="250" x2="120" y2="295" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="120" y1="295" x2="180" y2="295" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="110" y1="295" x2="110" y2="340" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="110" y1="340" x2="245" y2="340" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="100" y1="340" x2="100" y2="385" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="100" y1="385" x2="215" y2="385" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="90" y1="385" x2="90" y2="430" stroke="#ced4da" stroke-width="0.8"/>
  <line x1="90" y1="430" x2="225" y2="430" stroke="#ced4da" stroke-width="0.8"/>

  <!-- Depth labels -->
  <text x="55" y="30" font-size="9" fill="#868e96" text-anchor="end">depth 0</text>
  <text x="55" y="75" font-size="9" fill="#868e96" text-anchor="end">depth 1</text>
  <text x="55" y="120" font-size="9" fill="#868e96" text-anchor="end">depth 2</text>
  <text x="55" y="165" font-size="9" fill="#868e96" text-anchor="end">depth 3</text>
  <text x="55" y="210" font-size="9" fill="#868e96" text-anchor="end">depth 4</text>
  <text x="55" y="255" font-size="9" fill="#868e96" text-anchor="end">depth 5</text>
  <text x="55" y="300" font-size="9" fill="#868e96" text-anchor="end">depth 6</text>
  <text x="55" y="345" font-size="9" fill="#868e96" text-anchor="end">depth 7</text>
  <text x="55" y="390" font-size="9" fill="#868e96" text-anchor="end">depth 8</text>
  <text x="55" y="435" font-size="9" fill="#868e96" text-anchor="end">depth 9</text>
</svg>