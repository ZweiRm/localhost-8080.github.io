<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="seq-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="seq-arrow-self" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Participants -->
  <!-- ActivityThread -->
  <rect x="30" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="80" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ActivityThread</text>
  <line x1="80" y1="40" x2="80" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- LoadedApk -->
  <rect x="175" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="225" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">LoadedApk</text>
  <line x1="225" y1="40" x2="225" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ContextImpl -->
  <rect x="325" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="375" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">ContextImpl</text>
  <line x1="375" y1="40" x2="375" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Instrumentation -->
  <rect x="465" y="10" width="110" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="520" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">Instrumentation</text>
  <line x1="520" y1="40" x2="520" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Application -->
  <rect x="615" y="10" width="90" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="660" y="30" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">Application</text>
  <line x1="660" y1="40" x2="660" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ContextWrapper (shown as parent of Application) -->
  <rect x="725" y="10" width="60" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="755" y="25" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">Context</text>
  <text x="755" y="35" font-size="9" font-weight="600" fill="#343a40" text-anchor="middle">Wrapper</text>
  <line x1="755" y1="40" x2="755" y2="390" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Activation bars -->
  <rect x="75" y="60" width="10" height="40" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="220" y="100" width="10" height="200" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="370" y="130" width="10" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="515" y="250" width="10" height="50" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <rect x="655" y="290" width="10" height="60" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>

  <!-- 0: handleBindApplication -->
  <text x="15" y="70" font-size="9" fill="#868e96">0</text>
  <rect x="35" y="55" width="35" height="16" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.6"/>
  <text x="52" y="66" font-size="8" fill="#495057" text-anchor="middle">entry</text>
  <polyline points="70,65 80,65" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="85" y="72" font-size="9" fill="#495057">handleBindApplication()</text>

  <!-- 1: makeApplicationInner -->
  <text x="90" y="110" font-size="9" fill="#868e96">1</text>
  <line x1="85" y1="115" x2="220" y2="115" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="105" y="112" font-size="9" fill="#495057">makeApplicationInner()</text>

  <!-- 2: createAppContext -->
  <text x="230" y="140" font-size="9" fill="#868e96">2</text>
  <line x1="230" y1="145" x2="370" y2="145" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="260" y="142" font-size="9" fill="#495057">createAppContext()</text>

  <!-- 3: new ContextImpl (self-call) -->
  <text x="385" y="166" font-size="9" fill="#868e96">3</text>
  <polyline points="380,170 410,170 410,185 380,185" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="415" y="178" font-size="9" fill="#495057">new ContextImpl()</text>

  <!-- 4: setResources (self-call on ContextImpl) -->
  <text x="385" y="196" font-size="9" fill="#868e96">4</text>
  <polyline points="380,200 410,200 410,215 380,215" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#seq-arrow)"/>
  <text x="415" y="208" font-size="9" fill="#495057">setResources(LoadedApk.getResources())</text>

  <!-- Return dashed -->
  <line x1="370" y1="225" x2="230" y2="225" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#seq-arrow)"/>

  <!-- 5: newApplication -->
  <text x="230" y="255" font-size="9" fill="#868e96">5</text>
  <line x1="230" y1="260" x2="515" y2="260" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="340" y="257" font-size="9" fill="#495057">newApplication()</text>

  <!-- 6: attach -->
  <text x="530" y="280" font-size="9" fill="#868e96">6</text>
  <line x1="525" y1="285" x2="655" y2="285" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="570" y="282" font-size="9" fill="#495057">attach()</text>

  <!-- 7: attachBaseContext -->
  <text x="665" y="315" font-size="9" fill="#868e96">7</text>
  <line x1="665" y1="320" x2="750" y2="320" stroke="#555" stroke-width="1.2" marker-end="url(#seq-arrow)"/>
  <text x="680" y="312" font-size="9" fill="#495057">attachBaseContext(contextImpl)</text>
  <rect x="750" y="315" width="10" height="20" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>

  <!-- Return dashed lines -->
  <line x1="750" y1="340" x2="665" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="655" y1="350" x2="525" y2="350" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="515" y1="360" x2="230" y2="360" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
</svg>