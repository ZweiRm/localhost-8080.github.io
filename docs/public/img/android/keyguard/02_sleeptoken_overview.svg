<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 780" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="arr2r" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="7,0 0,2.5 7,5" fill="#555"/>
    </marker>
  </defs>

  <text x="460" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">SleepToken 核心流程（时序图）</text>

  <!-- Participants -->
  <rect x="20" y="40" width="120" height="30" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="80" y="60" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4a7fb5">PhoneWindowManager</text>

  <rect x="170" y="40" width="120" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="230" y="60" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">KeyguardController</text>

  <rect x="320" y="40" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="385" y="60" text-anchor="middle" font-size="9.5" fill="#495057">SleepTokenAcquirer</text>

  <rect x="490" y="40" width="90" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="535" y="60" text-anchor="middle" font-size="9.5" fill="#495057">ATMS</text>

  <rect x="620" y="40" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="685" y="55" text-anchor="middle" font-size="9" fill="#495057">ActivityTask</text>
  <text x="685" y="66" text-anchor="middle" font-size="9" fill="#495057">Supervisor</text>

  <rect x="790" y="40" width="110" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="845" y="60" text-anchor="middle" font-size="9" fill="#495057">RootWindowCtn</text>

  <!-- Lifelines -->
  <line x1="80" y1="70" x2="80" y2="760" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="70" x2="230" y2="760" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="385" y1="70" x2="385" y2="760" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="535" y1="70" x2="535" y2="760" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="685" y1="70" x2="685" y2="760" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="845" y1="70" x2="845" y2="760" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ========= Scenario 1: 解锁 ========= -->
  <rect x="5" y="90" width="50" height="18" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="1"/>
  <text x="30" y="103" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2e7d32">解锁</text>

  <text x="5" y="125" font-size="9" fill="#343a40">1 keyguardGoingAway()</text>
  <line x1="80" y1="128" x2="228" y2="128" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>

  <text x="235" y="145" font-size="8.5" fill="#868e96">2 updateKeyguardSleepToken()</text>
  <line x1="230" y1="148" x2="230" y2="155" stroke="#555" stroke-width="0.8"/>
  <line x1="230" y1="155" x2="383" y2="155" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="310" y="168" font-size="8.5" fill="#868e96">3 release()</text>

  <line x1="385" y1="175" x2="533" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <rect x="490" y="170" width="80" height="14" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="530" y="180" text-anchor="middle" font-size="7.5" fill="#2e7d32">移除SleepToken</text>
  <text x="455" y="195" font-size="8.5" fill="#868e96">4 removeSleepToken()</text>

  <line x1="535" y1="205" x2="683" y2="205" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="610" y="218" font-size="8.5" fill="#868e96">5 updateSleepIfNeeded()</text>

  <line x1="685" y1="228" x2="843" y2="228" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="765" y="241" font-size="8.5" fill="#868e96">6 applySleepTokens()</text>

  <!-- ========= Scenario 2: 锁屏 ========= -->
  <rect x="5" y="270" width="50" height="18" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="30" y="283" text-anchor="middle" font-size="8.5" font-weight="600" fill="#343a40">锁屏</text>

  <text x="5" y="305" font-size="9" fill="#343a40">1 setKeyguardShown()</text>
  <line x1="80" y1="308" x2="228" y2="308" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>

  <text x="235" y="325" font-size="8.5" fill="#868e96">2 updateKeyguardSleepToken()</text>
  <line x1="230" y1="328" x2="230" y2="335" stroke="#555" stroke-width="0.8"/>
  <line x1="230" y1="335" x2="383" y2="335" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="310" y="348" font-size="8.5" fill="#868e96">3 acquire()</text>

  <line x1="385" y1="358" x2="533" y2="358" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <rect x="480" y="353" width="80" height="14" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="520" y="363" text-anchor="middle" font-size="7.5" fill="#343a40">创建SleepToken</text>

  <line x1="535" y1="378" x2="683" y2="378" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="610" y="391" font-size="8.5" fill="#868e96">4 updateSleepIfNeeded()</text>

  <line x1="685" y1="398" x2="843" y2="398" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="765" y="411" font-size="8.5" fill="#868e96">5 goingToSleepLocked()</text>

  <line x1="845" y1="418" x2="845" y2="432" stroke="#555" stroke-width="0.8"/>
  <text x="850" y="445" font-size="8.5" fill="#868e96">6 applySleepTokens()</text>

  <!-- ========= Scenario 3: 灭屏 ========= -->
  <rect x="5" y="470" width="50" height="18" rx="2" fill="#fff0f0" stroke="#e07070" stroke-width="1"/>
  <text x="30" y="483" text-anchor="middle" font-size="8.5" font-weight="600" fill="#c0392b">灭屏</text>

  <text x="5" y="505" font-size="9" fill="#343a40">1 screenTurnedOff()</text>
  <line x1="80" y1="508" x2="80" y2="518" stroke="#555" stroke-width="0.8"/>
  <text x="85" y="530" font-size="8.5" fill="#868e96">2 acquire()</text>
  <line x1="80" y1="533" x2="383" y2="533" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>

  <line x1="385" y1="543" x2="533" y2="543" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <rect x="480" y="538" width="80" height="14" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="520" y="548" text-anchor="middle" font-size="7.5" fill="#343a40">创建SleepToken</text>

  <line x1="535" y1="560" x2="683" y2="560" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="610" y="573" font-size="8.5" fill="#868e96">3 updateSleepIfNeeded()</text>

  <line x1="685" y1="580" x2="843" y2="580" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="765" y="593" font-size="8.5" fill="#868e96">4 goingToSleepLocked()</text>

  <text x="850" y="613" font-size="8.5" fill="#868e96">5 applySleepTokens()</text>

  <!-- ========= Scenario 4: 亮屏 ========= -->
  <rect x="5" y="640" width="50" height="18" rx="2" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="30" y="653" text-anchor="middle" font-size="8.5" font-weight="600" fill="#4a7fb5">亮屏</text>

  <text x="5" y="680" font-size="9" fill="#343a40">1 screenTurningOn()</text>
  <line x1="80" y1="683" x2="80" y2="693" stroke="#555" stroke-width="0.8"/>
  <text x="85" y="706" font-size="8.5" fill="#868e96">2 screenTurningOn()</text>
  <line x1="80" y1="710" x2="383" y2="710" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="310" y="723" font-size="8.5" fill="#868e96">3 release()</text>

  <line x1="385" y1="730" x2="533" y2="730" stroke="#555" stroke-width="1" marker-end="url(#arr2)"/>
  <rect x="480" y="725" width="80" height="14" rx="2" fill="#eef5f1" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="520" y="735" text-anchor="middle" font-size="7.5" fill="#2e7d32">移除SleepToken</text>
  <text x="455" y="750" font-size="8.5" fill="#868e96">4 removeSleepToken()</text>
</svg>