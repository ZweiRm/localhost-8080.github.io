<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 455" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#343a40">应用间 Binder 通信（bindService + AIDL）</text>

  <!-- AMS (top center) -->
  <rect x="265" y="45" width="190" height="55" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="360" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#4a148c">AMS (system_server)</text>
  <text x="360" y="86" text-anchor="middle" font-size="9" fill="#868e96">管理 Service 生命周期与连接</text>

  <!-- Client App (left) -->
  <rect x="30" y="140" width="250" height="180" rx="4" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="155" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#4a7fb5">Client App 进程</text>

  <rect x="50" y="175" width="210" height="30" rx="3" fill="white" stroke="#adb5bd"/>
  <text x="155" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">Activity / Fragment</text>

  <rect x="50" y="215" width="210" height="30" rx="3" fill="#e8eaf6" stroke="#3f51b5"/>
  <text x="155" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#283593">ServiceConnection 回调</text>

  <rect x="50" y="255" width="210" height="30" rx="3" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="155" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#1b5e20">IMyService.Stub.Proxy</text>

  <rect x="50" y="293" width="210" height="20" rx="3" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text x="155" y="307" text-anchor="middle" font-size="9" fill="#868e96">bindService(intent)</text>

  <!-- Server App (right) -->
  <rect x="440" y="140" width="250" height="180" rx="4" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="565" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">Server App 进程</text>

  <rect x="460" y="175" width="210" height="30" rx="3" fill="#fff3e0" stroke="#f57c00"/>
  <text x="565" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">MyService extends Service</text>

  <rect x="460" y="215" width="210" height="30" rx="3" fill="#fff3e0" stroke="#f57c00"/>
  <text x="565" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">onBind() → IBinder</text>

  <rect x="460" y="255" width="210" height="55" rx="3" fill="#fff8e1" stroke="#f9a825"/>
  <text x="565" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#f57f17">IMyService.Stub 实现</text>
  <text x="565" y="292" text-anchor="middle" font-size="9" fill="#868e96">实际业务逻辑</text>

  <!-- Arrow 1: Client → AMS (bindService) -->
  <path d="M155,175 L155,125 Q155,110 170,110 L265,75" stroke="#7b1fa2" stroke-width="1.2" fill="none" marker-end="url(#a1)"/>
  <rect x="80" y="108" width="100" height="16" rx="2" fill="white" fill-opacity="0.85"/>
  <text x="130" y="120" text-anchor="middle" font-size="9" font-weight="600" fill="#7b1fa2">1. bindService()</text>

  <!-- Arrow 2: AMS → Server (onCreate + onBind) -->
  <path d="M455,75 L565,110 Q565,125 565,140" stroke="#7b1fa2" stroke-width="1.2" fill="none" marker-end="url(#a1)"/>
  <rect x="480" y="93" width="130" height="16" rx="2" fill="white" fill-opacity="0.85"/>
  <text x="545" y="105" text-anchor="middle" font-size="9" font-weight="600" fill="#7b1fa2">2. onCreate + onBind()</text>

  <!-- Arrow 3: Server → AMS → Client (return IBinder via onServiceConnected) -->
  <path d="M460,230 L410,230 Q390,230 390,210 L390,90 Q390,75 375,75 L360,75" stroke="#7b1fa2" stroke-width="1.2" fill="none" stroke-dasharray="5,3"/>
  <path d="M340,75 Q320,75 320,90 L320,210 Q320,230 300,230 L280,230" stroke="#7b1fa2" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <rect x="310" y="123" width="100" height="16" rx="2" fill="white" fill-opacity="0.85"/>
  <text x="360" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#7b1fa2">3. 返回 IBinder</text>

  <!-- Arrow 4: Client ↔ Server (direct Binder IPC, bypassing AMS) -->
  <line x1="260" y1="270" x2="460" y2="280" stroke="#c62828" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#a1)"/>
  <rect x="305" y="258" width="110" height="16" rx="2" fill="white" fill-opacity="0.85"/>
  <text x="360" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">4. Binder IPC 调用</text>

  <!-- Flow description -->
  <rect x="30" y="345" width="660" height="100" rx="4" fill="#f5f5f5" stroke="#bdbdbd" stroke-dasharray="4,2"/>
  <text x="360" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">完整流程</text>
  <text x="360" y="388" text-anchor="middle" font-size="10" fill="#343a40">1. Client 调用 bindService()，请求通过 Binder 发送到 AMS</text>
  <text x="360" y="404" text-anchor="middle" font-size="10" fill="#343a40">2. AMS 查找或启动目标 Service，调用 onCreate() 和 onBind()，获得 IBinder</text>
  <text x="360" y="420" text-anchor="middle" font-size="10" fill="#343a40">3. AMS 将 IBinder 通过 ServiceConnection.onServiceConnected() 回调给 Client</text>
  <text x="360" y="436" text-anchor="middle" font-size="10" fill="#343a40">4. Client 通过 Proxy 直接发起跨进程调用，不再经过 AMS</text>
</svg>