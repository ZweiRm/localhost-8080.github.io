<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="tri" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="none" stroke="#555" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#343a40">AIDL 生成的 Proxy/Stub 类结构</text>

  <!-- IInterface -->
  <rect x="280" y="44" width="160" height="36" rx="3" fill="#e8eaf6" stroke="#3f51b5"/>
  <text x="360" y="58" text-anchor="middle" font-size="9" fill="#868e96">«interface»</text>
  <text x="360" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#283593">IInterface</text>

  <!-- IMyService (AIDL interface) -->
  <rect x="270" y="110" width="180" height="50" rx="3" fill="#e8eaf6" stroke="#3f51b5"/>
  <text x="360" y="126" text-anchor="middle" font-size="9" fill="#868e96">«interface» AIDL 定义</text>
  <text x="360" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#283593">IMyService</text>
  <line x1="360" y1="80" x2="360" y2="110" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>

  <!-- Stub (abstract) -->
  <rect x="100" y="200" width="220" height="80" rx="3" fill="#fff3e0" stroke="#f57c00"/>
  <text x="210" y="218" text-anchor="middle" font-size="9" fill="#868e96">«abstract» 服务端基类</text>
  <text x="210" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">IMyService.Stub</text>
  <text x="210" y="254" text-anchor="middle" font-size="10" fill="#343a40">extends Binder</text>
  <text x="210" y="270" text-anchor="middle" font-size="10" fill="#343a40">implements IMyService</text>
  <line x1="310" y1="160" x2="210" y2="200" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>

  <!-- Proxy -->
  <rect x="400" y="200" width="220" height="80" rx="3" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="510" y="218" text-anchor="middle" font-size="9" fill="#868e96">客户端代理</text>
  <text x="510" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">IMyService.Stub.Proxy</text>
  <text x="510" y="254" text-anchor="middle" font-size="10" fill="#343a40">holds IBinder (mRemote)</text>
  <text x="510" y="270" text-anchor="middle" font-size="10" fill="#343a40">implements IMyService</text>
  <line x1="400" y1="160" x2="510" y2="200" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>

  <!-- Concrete Impl -->
  <rect x="120" y="320" width="180" height="50" rx="3" fill="#fff8e1" stroke="#f9a825"/>
  <text x="210" y="340" text-anchor="middle" font-size="9" fill="#868e96">开发者实现</text>
  <text x="210" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#f57f17">MyServiceImpl</text>
  <line x1="210" y1="280" x2="210" y2="320" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>

  <!-- Communication arrow -->
  <line x1="400" y1="240" x2="320" y2="240" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <text x="360" y="233" text-anchor="middle" font-size="9" fill="#c62828">transact() / onTransact()</text>
  <text x="360" y="260" text-anchor="middle" font-size="9" fill="#868e96">跨进程 Binder 通信</text>

  <!-- Key flow annotation -->
  <rect x="60" y="400" width="600" height="65" rx="4" fill="#f5f5f5" stroke="#bdbdbd" stroke-dasharray="4,2"/>
  <text x="360" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">调用链路</text>
  <text x="360" y="440" text-anchor="middle" font-size="10" fill="#343a40">Client → Proxy.method() → transact(TRANSACTION_method) → Binder 驱动 → Stub.onTransact() → Impl.method()</text>
  <text x="360" y="456" text-anchor="middle" font-size="9" fill="#868e96">Proxy 将方法调用序列化为 Parcel，Stub 反序列化后调用真正的实现</text>
</svg>