<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 140">
  <defs>
    <marker id="arrow2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#555"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>

  <!-- States -->
  <rect x="10" y="40" width="120" height="50" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="70" y="60" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">NO_SURFACE</text>
  <text x="70" y="75" font-size="8" fill="#868e96" text-anchor="middle">无 Surface</text>

  <rect x="175" y="40" width="130" height="50" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="1.2"/>
  <text x="240" y="60" font-size="10" font-weight="600" fill="#c0392b" text-anchor="middle">DRAW_PENDING</text>
  <text x="240" y="75" font-size="8" fill="#868e96" text-anchor="middle">等待绘制（Surface 隐藏）</text>

  <rect x="350" y="40" width="160" height="50" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="430" y="60" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">COMMIT_DRAW_PENDING</text>
  <text x="430" y="75" font-size="8" fill="#868e96" text-anchor="middle">首次绘制完成，待提交</text>

  <rect x="555" y="40" width="130" height="50" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="620" y="60" font-size="10" font-weight="600" fill="#343a40" text-anchor="middle">READY_TO_SHOW</text>
  <text x="620" y="75" font-size="8" fill="#868e96" text-anchor="middle">待显示</text>

  <rect x="730" y="40" width="110" height="50" rx="3" fill="#eef5f1" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="785" y="60" font-size="10" font-weight="600" fill="#2e7d32" text-anchor="middle">HAS_DRAWN</text>
  <text x="785" y="75" font-size="8" fill="#868e96" text-anchor="middle">已显示</text>

  <!-- Arrows between states -->
  <line x1="130" y1="65" x2="173" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <text x="151" y="58" font-size="7.5" fill="#495057" text-anchor="middle">relayoutWindow</text>

  <line x1="305" y1="65" x2="348" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <text x="326" y="58" font-size="7.5" fill="#495057" text-anchor="middle">finishDrawing</text>

  <line x1="510" y1="65" x2="553" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <text x="531" y="58" font-size="7.5" fill="#495057" text-anchor="middle">requestTraversal</text>

  <line x1="685" y1="65" x2="728" y2="65" stroke="#555" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <text x="706" y="58" font-size="7.5" fill="#495057" text-anchor="middle">performShow</text>

  <!-- Trigger labels below -->
  <text x="151" y="110" font-size="7.5" fill="#868e96" text-anchor="middle">createSurface</text>
  <text x="326" y="110" font-size="7.5" fill="#868e96" text-anchor="middle">App 绘制完成</text>
  <text x="531" y="110" font-size="7.5" fill="#868e96" text-anchor="middle">布局遍历</text>
  <text x="706" y="110" font-size="7.5" fill="#868e96" text-anchor="middle">所有窗口就绪</text>

  <line x1="151" y1="90" x2="151" y2="102" stroke="#868e96" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="326" y1="90" x2="326" y2="102" stroke="#868e96" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="531" y1="90" x2="531" y2="102" stroke="#868e96" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="706" y1="90" x2="706" y2="102" stroke="#868e96" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>