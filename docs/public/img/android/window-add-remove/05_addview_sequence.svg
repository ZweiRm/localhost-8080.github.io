<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Participant boxes -->
  <rect x="20" y="10" width="120" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="80" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WindowManagerImpl</text>

  <rect x="175" y="10" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="240" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WindowManagerGlobal</text>

  <rect x="345" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="395" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">ViewRootImpl</text>

  <rect x="480" y="10" width="60" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="510" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">View</text>

  <rect x="575" y="10" width="110" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="630" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">TraversalRunnable</text>

  <rect x="720" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="770" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WindowSession</text>

  <!-- Lifelines -->
  <line x1="80" y1="40" x2="80" y2="500" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="240" y1="40" x2="240" y2="500" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="395" y1="40" x2="395" y2="500" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="510" y1="40" x2="510" y2="500" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="630" y1="40" x2="630" y2="500" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="770" y1="40" x2="770" y2="500" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- WMS at far right -->
  <rect x="840" y="430" width="30" height="50" rx="2" fill="#fef8ee" stroke="#adb5bd" stroke-width="1"/>
  <text x="855" y="455" text-anchor="middle" font-size="8" fill="#343a40" transform="rotate(-90,855,455)">WMS</text>

  <!-- Step 1: addView -->
  <line x1="80" y1="65" x2="240" y2="65" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="160" y="60" text-anchor="middle" font-size="8.5" fill="#495057">addView</text>

  <!-- Step 1a: applyTokens (self) -->
  <rect x="55" y="52" width="5" height="20" rx="1" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="30" y="78" font-size="7.5" fill="#868e96">applyTokens</text>

  <!-- Step 2: Global checks, creates ViewRootImpl -->
  <rect x="220" y="70" width="40" height="60" rx="1" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="170" y="90" font-size="7.5" fill="#868e96">mViews.add(view)</text>
  <text x="170" y="100" font-size="7.5" fill="#868e96">mRoots.add(root)</text>
  <text x="170" y="110" font-size="7.5" fill="#868e96">mParams.add(wparams)</text>

  <!-- Step 3: new ViewRootImpl -->
  <line x1="240" y1="100" x2="395" y2="100" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="317" y="95" text-anchor="middle" font-size="8.5" fill="#495057">new ViewRootImpl</text>

  <!-- Step 4: setLayoutParams on view -->
  <line x1="240" y1="145" x2="510" y2="145" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="375" y="140" text-anchor="middle" font-size="8.5" fill="#495057">setLayoutParams(wparams)</text>

  <!-- Note: async layout -->
  <rect x="440" y="155" width="140" height="30" rx="3" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="510" y="168" text-anchor="middle" font-size="8" fill="#c0392b">请求布局异步刷新</text>
  <text x="510" y="178" text-anchor="middle" font-size="8" fill="#c0392b">View</text>

  <!-- Step 5: setView -->
  <line x1="240" y1="200" x2="395" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="317" y="195" text-anchor="middle" font-size="8.5" fill="#495057">setView</text>

  <!-- Step 6: requestLayout -->
  <rect x="375" y="210" width="40" height="30" rx="1" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="395" y="230" text-anchor="middle" font-size="7.5" fill="#495057">requestLayout</text>

  <!-- Step 7: scheduleTraversals -->
  <line x1="395" y1="260" x2="630" y2="260" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="512" y="255" text-anchor="middle" font-size="8.5" fill="#495057">scheduleTraversals</text>

  <!-- Step 8: run -->
  <line x1="630" y1="290" x2="395" y2="290" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="512" y="285" text-anchor="middle" font-size="8.5" fill="#495057">run</text>

  <!-- Step 9: doTraversal -> performTraversals -->
  <rect x="375" y="300" width="40" height="30" rx="1" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="395" y="320" text-anchor="middle" font-size="7.5" fill="#495057">doTraversal</text>

  <!-- Step 10: performTraversals -->
  <text x="395" y="355" text-anchor="middle" font-size="7.5" fill="#495057">performTraversals</text>

  <!-- Step 11: addToDisplayAsUser -->
  <line x1="395" y1="400" x2="770" y2="400" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="583" y="395" text-anchor="middle" font-size="8.5" fill="#495057">addToDisplayAsUser</text>

  <!-- Step 12: addWindow to WMS -->
  <line x1="770" y1="440" x2="840" y2="440" stroke="#555" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="805" y="435" text-anchor="middle" font-size="8" fill="#495057">addWindow</text>
</svg>