<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- WMS box (system_server) -->
  <rect x="20" y="20" width="140" height="50" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="90" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">WMS</text>
  <text x="90" y="10" text-anchor="middle" font-size="8.5" fill="#868e96">system_server 进程</text>

  <!-- Arrow WMS -> WindowManager -->
  <line x1="90" y1="70" x2="90" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow1)"/>
  <text x="100" y="105" font-size="9" fill="#868e96">处理</text>

  <!-- WindowManager box -->
  <rect x="20" y="135" width="140" height="50" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="90" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">WindowManager</text>
  <text x="90" y="205" text-anchor="middle" font-size="8.5" fill="#868e96">APP 进程</text>

  <!-- Arrow WindowManager -> Window -->
  <line x1="160" y1="160" x2="290" y2="120" stroke="#555" stroke-width="1.2" marker-end="url(#arrow1)"/>
  <text x="230" y="130" font-size="9" fill="#868e96">管理</text>

  <!-- Window box (outer) -->
  <rect x="295" y="60" width="200" height="130" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="395" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#343a40">Window</text>

  <!-- View box (inner) -->
  <rect x="330" y="100" width="130" height="60" rx="3" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="395" y="135" text-anchor="middle" font-size="11" fill="#495057">View</text>

  <!-- Legend-like label -->
  <text x="395" y="250" text-anchor="middle" font-size="9" fill="#868e96">Window 是 View 的容器，始终由 Surface 支撑</text>
</svg>