<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow6" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="10" y="10" width="120" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="70" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WindowManagerImpl</text>

  <rect x="170" y="10" width="130" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="235" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WindowManagerGlobal</text>

  <rect x="340" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="390" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">ViewRootImpl</text>

  <rect x="480" y="10" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="530" y="30" text-anchor="middle" font-size="9" font-weight="600" fill="#343a40">Session(Binder)</text>

  <rect x="620" y="10" width="60" height="30" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2"/>
  <text x="650" y="30" text-anchor="middle" font-size="9.5" font-weight="600" fill="#343a40">WMS</text>

  <!-- Lifelines -->
  <line x1="70" y1="40" x2="70" y2="420" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="235" y1="40" x2="235" y2="420" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="390" y1="40" x2="390" y2="420" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="530" y1="40" x2="530" y2="420" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="650" y1="40" x2="650" y2="420" stroke="#ced4da" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Step 1 -->
  <line x1="70" y1="70" x2="235" y2="70" stroke="#555" stroke-width="1" marker-end="url(#arrow6)"/>
  <text x="152" y="65" text-anchor="middle" font-size="8.5" fill="#495057">removeView(view, false)</text>

  <!-- Step 2: findViewLocked + removeViewLocked -->
  <rect x="215" y="80" width="40" height="30" rx="1" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="235" y="95" text-anchor="middle" font-size="7.5" fill="#495057">findViewLocked</text>
  <text x="235" y="125" text-anchor="middle" font-size="8" fill="#495057">removeViewLocked</text>

  <!-- Step 3: die -->
  <line x1="235" y1="140" x2="390" y2="140" stroke="#555" stroke-width="1" marker-end="url(#arrow6)"/>
  <text x="312" y="135" text-anchor="middle" font-size="8.5" fill="#495057">die(immediate)</text>

  <!-- Decision diamond -->
  <path d="M 370,165 L 390,155 L 410,165 L 390,175 Z" fill="#fff0f0" stroke="#e07070" stroke-width="0.8"/>
  <text x="390" y="168" text-anchor="middle" font-size="7" fill="#c0392b">?</text>

  <!-- immediate path -->
  <text x="430" y="162" font-size="7.5" fill="#868e96">immediate &amp;&amp;</text>
  <text x="430" y="172" font-size="7.5" fill="#868e96">!mIsInTraversal</text>

  <!-- Step 4a: doDie (sync) -->
  <line x1="390" y1="175" x2="390" y2="195" stroke="#555" stroke-width="1"/>
  <rect x="365" y="195" width="50" height="25" rx="1" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="390" y="211" text-anchor="middle" font-size="8" font-weight="600" fill="#343a40">doDie()</text>

  <!-- Step 4b: async MSG_DIE -->
  <text x="450" y="210" font-size="7.5" fill="#868e96">or MSG_DIE async</text>

  <!-- Step 5: dispatchDetachedFromWindow -->
  <rect x="340" y="230" width="100" height="50" rx="2" fill="#f8f9fa" stroke="#ced4da" stroke-width="0.8"/>
  <text x="390" y="248" text-anchor="middle" font-size="7.5" fill="#495057">dispatchDetached</text>
  <text x="390" y="260" text-anchor="middle" font-size="7.5" fill="#495057">FromWindow</text>
  <text x="390" y="273" text-anchor="middle" font-size="7" fill="#868e96">释放资源</text>

  <!-- Step 6: mWindowSession.remove(mWindow.asBinder()) -->
  <line x1="390" y1="300" x2="530" y2="300" stroke="#555" stroke-width="1" marker-end="url(#arrow6)"/>
  <text x="460" y="293" text-anchor="middle" font-size="8" fill="#495057">remove(mWindow</text>
  <text x="460" y="303" text-anchor="middle" font-size="8" fill="#495057">.asBinder())</text>

  <!-- Step 7: WMS.removeClientToken -->
  <line x1="530" y1="330" x2="650" y2="330" stroke="#555" stroke-width="1" marker-end="url(#arrow6)"/>
  <text x="590" y="325" text-anchor="middle" font-size="8" fill="#495057">removeClientToken</text>

  <!-- Step 8: win.removeIfPossible -->
  <rect x="630" y="345" width="40" height="30" rx="1" fill="#fef8ee" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="650" y="360" text-anchor="middle" font-size="7.5" fill="#495057">removeIf</text>
  <text x="650" y="370" text-anchor="middle" font-size="7.5" fill="#495057">Possible</text>

  <!-- Step 9: doRemoveView back -->
  <line x1="390" y1="395" x2="235" y2="395" stroke="#555" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow6)"/>
  <text x="312" y="390" text-anchor="middle" font-size="8" fill="#868e96">doRemoveView(this)</text>
</svg>