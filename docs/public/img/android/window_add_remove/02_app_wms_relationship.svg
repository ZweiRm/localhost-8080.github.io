<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- system_server region -->
  <rect x="200" y="10" width="200" height="60" rx="3" fill="#fef8ee" stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="300" y="30" text-anchor="middle" font-size="8.5" fill="#868e96">system_server 进程</text>
  <rect x="250" y="35" width="100" height="30" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="300" y="55" text-anchor="middle" font-size="11" font-weight="600" fill="#343a40">WMS</text>

  <!-- Binder lines -->
  <line x1="165" y1="130" x2="270" y2="70" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>
  <text x="200" y="95" font-size="9" fill="#868e96">Binder</text>
  <line x1="435" y1="130" x2="330" y2="70" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>
  <text x="395" y="95" font-size="9" fill="#868e96">Binder</text>

  <!-- Dashed line separating processes -->
  <line x1="10" y1="110" x2="610" y2="110" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- App Process 1 -->
  <rect x="30" y="120" width="270" height="220" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="165" y="138" text-anchor="middle" font-size="8.5" fill="#868e96">应用进程 A</text>

  <rect x="80" y="150" width="170" height="36" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="165" y="173" text-anchor="middle" font-size="10" fill="#495057">WindowManagerGlobal</text>

  <!-- Arrows from WMImpl to Global -->
  <line x1="165" y1="220" x2="165" y2="190" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="80" y="225" width="170" height="36" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="165" y="248" text-anchor="middle" font-size="10" fill="#495057">WindowManagerImpl</text>

  <line x1="165" y1="295" x2="165" y2="265" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="110" y="298" width="110" height="32" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="165" y="319" text-anchor="middle" font-size="10" fill="#343a40">APP</text>

  <!-- App Process 2 -->
  <rect x="320" y="120" width="270" height="220" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="455" y="138" text-anchor="middle" font-size="8.5" fill="#868e96">应用进程 B</text>

  <rect x="370" y="150" width="170" height="36" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="455" y="173" text-anchor="middle" font-size="10" fill="#495057">WindowManagerGlobal</text>

  <line x1="455" y1="220" x2="455" y2="190" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="370" y="225" width="170" height="36" rx="3" fill="white" stroke="#adb5bd" stroke-width="1"/>
  <text x="455" y="248" text-anchor="middle" font-size="10" fill="#495057">WindowManagerImpl</text>

  <line x1="455" y1="295" x2="455" y2="265" stroke="#555" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="400" y="298" width="110" height="32" rx="3" fill="#eef1f5" stroke="#4a7fb5" stroke-width="1"/>
  <text x="455" y="319" text-anchor="middle" font-size="10" fill="#343a40">APP</text>
</svg>